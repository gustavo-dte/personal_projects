---
# Tasks for executing uninstall via Azure RunCommand API
# This is the core replacement for direct WinRM execution
# File: ansible/roles/onprem-tools-uninstallation/tasks/uninstall_via_azure_runcommand.yml
# Uses az CLI instead of azure.azcollection to avoid Python dependency issues

- name: Display VM and uninstall details
  ansible.builtin.debug:
    msg: |
      VM: {{ vm_name }}
      Resource Group: {{ azure_resource_group }}
      Subscription: {{ azure_subscription_id }}
      Tools to uninstall: {{ uninstall_list | join(', ') }}
      Dry Run: {{ dry_run | default(false) }}

- name: Query VM information via Azure CLI
  ansible.builtin.command:
    cmd: >
      az vm show
      --resource-group "{{ azure_resource_group }}"
      --name "{{ vm_name }}"
      --subscription "{{ azure_subscription_id }}"
      --query "name"
      -o tsv
  register: vm_query_result
  failed_when: false
  changed_when: false

- name: Debug VM query result
  ansible.builtin.debug:
    msg: "VM query result: rc={{ vm_query_result.rc }}, stdout={{ vm_query_result.stdout | trim }}"

- name: Set VM found fact
  ansible.builtin.set_fact:
    _vm_found: "{{ vm_query_result.rc == 0 and vm_query_result.stdout | trim | length > 0 }}"

- name: Display VM query result
  ansible.builtin.debug:
    msg: "VM {{ vm_name }}: {{ azure_resource_group }} : {{ azure_subscription_id }} : {{ 'found' if _vm_found else 'NOT FOUND' }}"

- name: Fail if VM not found (hardening; set fail_if_vm_not_found to false to skip)
  ansible.builtin.fail:
    msg: "VM '{{ vm_name }}' not found in resource group '{{ azure_resource_group }}' (subscription {{ azure_subscription_id }}). Check manifest VM name matches Azure resource name."
  when:
    - fail_if_vm_not_found | default(true)
    - not _vm_found

- name: Notify dry run mode
  ansible.builtin.debug:
    msg: "DRY RUN MODE: Would execute uninstall on {{ vm_name }} via Azure RunCommand"
  when: dry_run | default(false)

- name: Copy uninstall-tools.ps1 script to temp location
  ansible.builtin.copy:
    src: uninstall-tools.ps1
    dest: /tmp/uninstall_tools_{{ vm_name }}.ps1
    mode: '0644'
  when:
    - not (dry_run | default(false))
    - _vm_found | default(false)

- name: Execute tool detection and uninstall via Azure RunCommand using the script file
  ansible.builtin.command:
    cmd: >
      timeout 300 az vm run-command invoke
      --resource-group "{{ azure_resource_group }}"
      --name "{{ vm_name }}"
      --command-id RunPowerShellScript
      --scripts @/tmp/uninstall_tools_{{ vm_name }}.ps1
      --subscription "{{ azure_subscription_id }}"
      --output json
  register: run_command_result
  failed_when: false
  when:
    - not (dry_run | default(false))
    - _vm_found | default(false)

- name: Remove temp script file
  ansible.builtin.file:
    path: /tmp/uninstall_tools_{{ vm_name }}.ps1
    state: absent
  when:
    - not (dry_run | default(false))
    - _vm_found | default(false)

- name: Display Azure RunCommand output
  ansible.builtin.debug:
    msg: "{{ run_command_result.stdout | default('No output from RunCommand') }}"
  when:
    - not dry_run | default(false)
    - run_command_result.stdout is defined or (run_command_result.rc is defined and run_command_result.rc != 0)

- name: Display error if RunCommand failed
  ansible.builtin.debug:
    msg: "RunCommand failed with rc={{ run_command_result.rc | default('unknown') }}: {{ run_command_result.stderr | default('') }}"
  when:
    - not dry_run | default(false)
    - run_command_result.rc is defined and run_command_result.rc != 0

- name: Extract tool status from PowerShell output
  ansible.builtin.set_fact:
    _output_text: "{{ run_command_result.stdout | default('') }}"
  when:
    - not dry_run | default(false)
    - run_command_result.stdout is defined

- name: Parse tool status - VMware Tools
  ansible.builtin.set_fact:
    _vmware_status: "{{ _output_text.split('VMware Tools : ')[1].split('\n')[0] if 'VMware Tools : ' in _output_text else 'UNKNOWN' }}"
  when:
    - not dry_run | default(false)
    - _output_text | length > 0

- name: Parse tool status - Puppet Agent
  ansible.builtin.set_fact:
    _puppet_status: "{{ _output_text.split('Puppet Agent : ')[1].split('\n')[0] if 'Puppet Agent : ' in _output_text else 'UNKNOWN' }}"
  when:
    - not dry_run | default(false)
    - _output_text | length > 0

- name: Parse tool status - EMC PowerPath
  ansible.builtin.set_fact:
    _emc_status: "{{ _output_text.split('EMC PowerPath : ')[1].split('\n')[0] if 'EMC PowerPath : ' in _output_text else 'UNKNOWN' }}"
  when:
    - not dry_run | default(false)
    - _output_text | length > 0

- name: Parse tool status - HP Insight Management Agent
  ansible.builtin.set_fact:
    _hp_status: "{{ _output_text.split('HP Insight Management Agent : ')[1].split('\n')[0] if 'HP Insight Management Agent : ' in _output_text else 'UNKNOWN' }}"
  when:
    - not dry_run | default(false)
    - _output_text | length > 0

- name: Parse tool status - EMC Avamar
  ansible.builtin.set_fact:
    _avamar_status: "{{ _output_text.split('EMC Avamar for Windows : ')[1].split('\n')[0] if 'EMC Avamar for Windows : ' in _output_text else 'UNKNOWN' }}"
  when:
    - not dry_run | default(false)
    - _output_text | length > 0

- name: Display uninstall summary
  ansible.builtin.debug:
    msg: |
      ===== Uninstall Summary for {{ vm_name }} =====
      Puppet Agent → {{ _puppet_status | default('UNKNOWN') }}
      VMware Tools → {{ _vmware_status | default('UNKNOWN') }}
      EMC PowerPath → {{ _emc_status | default('UNKNOWN') }}
      HP Insight → {{ _hp_status | default('UNKNOWN') }}
      EMC Avamar → {{ _avamar_status | default('UNKNOWN') }}
  when: not dry_run | default(false)

- name: Summary for dry-run execution
  ansible.builtin.debug:
    msg: |
      ===== Dry Run Summary for {{ vm_name }} =====
      Would execute uninstall via Azure RunCommand
      Tools to uninstall:
      {% for tool in uninstall_list %}
      - {{ tool }}
      {% endfor %}
  when: dry_run | default(false)
