---
# Windows Domain Join role metadata
galaxy_info:
  author: Cloud Platform Team
  description: Join Windows Servers to Active Directory domain
  company: DTE Energy
  license: MIT
  min_ansible_version: "2.9"
  platforms:
    - name: Windows
      versions:
        - all

dependencies:
  - common  # Depends on the common role for manifest loading

# Collections required by this role
# Note: Tasks within a role do NOT inherit collections from the play
# Collections must be declared here for role tasks to use collection modules
collections:
  - ansible.windows
  - azure.azcollection
  - microsoft.ad

# Allow this role to be used as a dependency
allow_duplicates: false
