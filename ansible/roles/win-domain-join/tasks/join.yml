---
# join.yml
#
# Per-VM domain join orchestrator.
#
# SEQUENCE:
#   Step 1 — Read state     : Azure Run Command (SYSTEM) reads hostname + domain
#   Step 2 — Domain join    : Azure Run Command with domain admin credentials
#                             -> az vm restart
#   Step 3 — Verify         : Azure Run Command confirms PartOfDomain=true
#
# Credential usage:
#   All operations use Azure Run Command (SYSTEM context)
#   Domain join requires: cpoe-automation@dtenet.com (DOMAIN_ADMIN_PASSWORD GitHub Secret)
#
# Note: Disjoin and rename tasks are handled separately by disjoin_rename.yml

# ==============================================================================
# Step 1: Read current VM state via Azure Run Command (no WinRM creds needed)
# ==============================================================================

- name: "Step 1 - Resolve credentials and read VM state from Azure"
  ansible.builtin.include_tasks: prepare_winrm.yaml

- name: "Step 1 - Compute workflow conditions"
  ansible.builtin.set_fact:
    _needs_join: >-
      {{ (force_rejoin | default(false) | bool)
         or not (current_domain_status.part_of_domain | default(false) | bool)
         or (current_domain_status.domain | default('')) != domain_name }}

- name: "Step 1 - Display workflow plan"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  DOMAIN JOIN PLAN FOR: {{ target_vm_name }}
      +=============================================================+
      |  Connect IP       : {{ target_vm_host }}
      |  OS hostname now  : {{ current_hostname_info.old_name | default('unknown') }}
      |  Domain now       : {{ current_domain_status.domain | default('WORKGROUP') }}
      |  Part of domain   : {{ current_domain_status.part_of_domain | default(false) }}
      +-------------------------------------------------------------+
      |  Target hostname  : {{ target_vm_name }}
      |  Target domain    : {{ domain_name }}
      |  Force rejoin     : {{ force_rejoin | default(false) }}
      +-------------------------------------------------------------+
      |  Step 2 join      : {{ _needs_join | bool }}
      {% if dry_run | default(false) | bool %}
      |  *** DRY RUN - no changes will be made ***
      {% endif %}
      +=============================================================+

- name: "Step 1 - Skip (nothing to do)"
  ansible.builtin.debug:
    msg: "VM '{{ target_vm_name }}' is already in domain '{{ domain_name }}'. Nothing to do."
  when:
    - not (dry_run | default(false) | bool)
    - not (_needs_join | bool)

# ==============================================================================
# Step 2: Join domain via Azure Run Command (SYSTEM + domain admin creds)
# Reboot via Azure CLI
# ==============================================================================

- name: "Step 2 - Domain join block"
  when:
    - not (dry_run | default(false) | bool)
    - _needs_join | bool
  block:
    - name: "[CREDENTIALS] Step 2 - Domain join"
      ansible.builtin.debug:
        msg: |
          +-------------------------------------------------------------+
          |  STEP 2 - DOMAIN JOIN
          |    Method        : Azure Run Command (SYSTEM context)
          |    Azure VM      : {{ target_vm_name }}
          |    RG            : {{ azure_resource_group | default(manifest_data.target_resource_group) }}
          |    Domain admin  : {{ domain_admin_username }}
          |    Domain pass   : DOMAIN_ADMIN_PASSWORD GitHub Secret
          |    Target domain : {{ domain_name }}
          |    Target OU     : {{ domain_ou_path | default('(default)') }}
          +-------------------------------------------------------------+

    - name: "Step 2 - Join domain via Azure Run Command"
      ansible.builtin.shell: |
        az vm run-command invoke \
          --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
          --name "{{ target_vm_name }}" \
          --command-id RunPowerShellScript \
          --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
          --parameters "DomainName={{ domain_name }}" "DomainUser={{ domain_admin_username }}" "DomainPass={{ domain_admin_value }}" {% if domain_ou_path is defined and domain_ou_path | length > 0 %}"OUPath={{ domain_ou_path }}"{% endif %} \
          --scripts '
            param($DomainName, $DomainUser, $DomainPass{% if domain_ou_path is defined and domain_ou_path | length > 0 %}, $OUPath{% endif %})
            $ErrorActionPreference = "Stop"
            
            # Check if already in target domain
            $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain
            if ($cs.PartOfDomain -and ($cs.Domain -ieq $DomainName)) {
              Write-Output "ALREADY_JOINED:$DomainName"
              exit 0
            }
            
            try {
              $secPass = ConvertTo-SecureString $DomainPass -AsPlainText -Force
              $domainCred = New-Object System.Management.Automation.PSCredential($DomainUser, $secPass)
              
              $joinParams = @{
                DomainName = $DomainName
                Credential = $domainCred
                Force = $true
                ErrorAction = "Stop"
              }
              {% if domain_ou_path is defined and domain_ou_path | length > 0 %}
              $joinParams["OUPath"] = $OUPath
              {% endif %}
              
              Add-Computer @joinParams
              Write-Output "JOIN_SUCCESS:$DomainName"
            }
            catch {
              Write-Output ("JOIN_FAILED:" + $_.Exception.Message)
              exit 1
            }
          ' \
          --query "value[0].message" -o tsv 2>&1
      delegate_to: localhost
      register: _join_result
      no_log: true
      failed_when: false

    - name: "Step 2 - Debug join result (non-sensitive)"
      ansible.builtin.debug:
        msg: |
          Domain join result for {{ target_vm_name }}:
            rc      : {{ _join_result.rc | default('N/A') }}
            output  : {{ _join_result.stdout | default('(empty)') | trim }}

    - name: "Step 2 - Fail if domain join failed"
      ansible.builtin.fail:
        msg: |
          Domain join failed for {{ target_vm_name }}.
          Output : {{ _join_result.stdout | default('') | trim }}
          stderr : {{ _join_result.stderr | default('') | truncate(300) }}
      when: >-
        (_join_result.rc | default(0) | int != 0)
        or ('JOIN_FAILED:' in (_join_result.stdout | default('')))

    - name: "Step 2 - Reboot via Azure CLI after domain join"
      ansible.builtin.shell: >-
        az vm restart
        --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
        --name "{{ target_vm_name }}"
        --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
      delegate_to: localhost
      register: _join_restart
      failed_when: _join_restart.rc | default(0) | int != 0

    - name: "Step 2 - Wait 90 seconds for VM to stabilize after reboot"
      ansible.builtin.pause:
        seconds: 90

# ==============================================================================
# Step 3: Verify domain membership via Azure Run Command
# ==============================================================================

- name: "Step 3 - Verify domain membership"
  when:
    - not (dry_run | default(false) | bool)
    - _needs_join | bool
  block:
    - name: "Step 3 - Read domain status via Azure Run Command"
      ansible.builtin.shell: |
        az vm run-command invoke \
          --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
          --name "{{ target_vm_name }}" \
          --command-id RunPowerShellScript \
          --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
          --scripts '
            $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Name, Domain, PartOfDomain
            $domain = if ($cs.PartOfDomain) {
              try { [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name }
              catch { $cs.Domain }
            } else { "WORKGROUP" }
            Write-Output ("hostname=" + $cs.Name + ";domain=" + $domain + ";joined=" + $cs.PartOfDomain)
          ' \
          --query "value[0].message" -o tsv 2>/dev/null
      delegate_to: localhost
      register: _verify_result
      changed_when: false
      failed_when: false

    - name: "Step 3 - Display final VM state"
      ansible.builtin.debug:
        msg: |
          +=============================================================+
          |  FINAL STATE: {{ target_vm_name }}
          +=============================================================+
          |  {{ _verify_result.stdout | default('(no output)') | trim }}
          +=============================================================+

    - name: "Step 3 - Fail if VM not in target domain"
      ansible.builtin.fail:
        msg: |
          VM {{ target_vm_name }} is NOT in domain '{{ domain_name }}' after join + reboot.
          Azure Run Command output: {{ _verify_result.stdout | default('') | trim }}
          Check DC connectivity, OU path, and domain admin credentials.
      when:
        - _verify_result.stdout is defined
        - >-
            ('joined=True' not in (_verify_result.stdout | default('')))
            or (domain_name | lower not in (_verify_result.stdout | default('') | lower))

# ==============================================================================
# Dry-run preview
# ==============================================================================

- name: "[DRY RUN] Preview for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      [DRY RUN] Would execute for {{ item.name }}:
      {% if _needs_join | bool %}
        Step 2: Join domain '{{ domain_name }}' via Azure Run Command
                -> az vm restart
        Step 3: Verify PartOfDomain via Azure Run Command
      {% endif %}
      No changes were made.
  when: dry_run | default(false) | bool
