---
# join.yml
#
# Per-VM domain join orchestrator — all operations via WinRM.
#
# Steps:
#   1. prepare_vm_state  — sync secret, resolve WinRM user (SE-Admin or Administrator)
#   2. Domain join       — Add-Computer via WinRM
#                          -> az vm restart -> wait WinRM
#   3. Verify            — WinRM as .\SE-Admin confirms PartOfDomain=true
#
# Credential routing (set by prepare_vm_state.yaml):
#   force_rejoin=true                       → .\SE-Admin (domain account active)
#   force_rejoin=false + sync_secret=true   → .\Administrator (synced from Delinea)
#   force_rejoin=false + sync_secret=false  → .\SE-Admin with fallback to .\Administrator
#
# Step 3 always uses .\SE-Admin — after join + reboot SE-Admin is restored.
#
# Required vars (set by main.yaml loop):
#   target_vm_name, target_vm_host, se_admin_username, se_admin_password
#   domain_name, domain_admin_username, domain_admin_value, domain_ou_path
#   azure_resource_group, azure_vm_name, azure_subscription_id, sync_password

# ------------------------------------------------------------------------------
# Step 1: Sync secret + resolve WinRM user
# ------------------------------------------------------------------------------

- name: "Step 1 - Enable WinRM + resolve credentials"
  ansible.builtin.include_tasks: prepare_vm_state.yaml

- name: "Compute join conditions"
  ansible.builtin.set_fact:
    _needs_join: >-
      {{ (force_rejoin | default(false) | bool)
         or not (current_domain_status.part_of_domain | default(false) | bool)
         or (current_domain_status.domain | default('')) != domain_name }}

- name: "Step 1 - Display workflow plan"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  DOMAIN JOIN PLAN FOR: {{ target_vm_name }}
      +=============================================================+
      |  Connect IP       : {{ target_vm_host }}
      |  OS hostname now  : {{ current_hostname_info.old_name | default('unknown') }}
      |  Domain now       : {{ current_domain_status.domain | default('WORKGROUP') }}
      |  Part of domain   : {{ current_domain_status.part_of_domain | default(false) }}
      +-------------------------------------------------------------+
      |  Target hostname  : {{ target_vm_name }}
      |  Target domain    : {{ domain_name }}
      |  Force rejoin     : {{ force_rejoin | default(false) }}
      |  Sync secret      : {{ sync_password | default(true) }}
      |  WinRM user       : .\{{ resolved_winrm_username | default(resolved_se_admin_username) }}
      +-------------------------------------------------------------+
      |  Needs join       : {{ _needs_join | bool }}
      {% if dry_run | default(false) | bool %}
      |  *** DRY RUN - no changes will be made ***
      {% endif %}
      +=============================================================+

- name: "Skip domain join (already in target domain)"
  ansible.builtin.debug:
    msg: "{{ target_vm_name }} is already in domain '{{ domain_name }}'. Nothing to do."
  when:
    - not (dry_run | default(false) | bool)
    - not (_needs_join | bool)

# ------------------------------------------------------------------------------
# Step 2: Domain join — try resolved_winrm_username, fall back if needed
# ------------------------------------------------------------------------------

- name: "Step 2 - Domain join block"
  when:
    - not (dry_run | default(false) | bool)
    - _needs_join | bool
  block:
    - name: "[CREDENTIALS] Step 2 - Domain join"
      ansible.builtin.debug:
        msg: |
          +-------------------------------------------------------------+
          |  STEP 2 - DOMAIN JOIN
          |   WinRM user     : .\{{ hostvars['localhost']['resolved_winrm_username'] | default(hostvars['localhost']['resolved_se_admin_username']) }}
          |   Secret len     : {{ hostvars['localhost']['resolved_se_admin_password'] | string | length }} chars
          |   Connect IP     : {{ target_vm_host }}:{{ winrm_port | default(5985) }}
          |   Join account   : {{ domain_admin_username }}
          |   Join secret    : DOMAIN_ADMIN_PASSWORD (GitHub Secret)
          |   Target domain  : {{ domain_name }}
          |   Target OU      : {{ domain_ou_path | default('(default)') }}
          +-------------------------------------------------------------+

    # --- Primary attempt: resolved_winrm_username (Administrator or SE-Admin) ---
    - name: "Step 2 - Join domain via WinRM (primary user)"
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain
        if ($cs.PartOfDomain -and ($cs.Domain -ieq $env:DOMAIN_NAME)) {
          Write-Output "ALREADY_JOINED:$env:DOMAIN_NAME"
          exit 0
        }
        try {
          $secPass    = ConvertTo-SecureString $env:DOMAIN_PASS -AsPlainText -Force
          $domainCred = New-Object System.Management.Automation.PSCredential(
                          $env:DOMAIN_USER, $secPass)
          $params = @{
            DomainName  = $env:DOMAIN_NAME
            Credential  = $domainCred
            Force       = $true
            ErrorAction = 'Stop'
          }
          if ($env:OU_PATH) { $params['OUPath'] = $env:OU_PATH }
          Add-Computer @params
          Write-Output "JOIN_OK:$env:DOMAIN_NAME"
        }
        catch {
          Write-Output "JOIN_FAILED:$($_.Exception.Message)"
          exit 1
        }
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_user: ".\\{{ hostvars['localhost']['resolved_winrm_username'] | default(hostvars['localhost']['resolved_se_admin_username']) }}"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"  # pragma: allowlist secret
      environment:
        DOMAIN_NAME: "{{ domain_name }}"
        DOMAIN_USER: "{{ domain_admin_username }}"
        DOMAIN_PASS: "{{ domain_admin_value }}"
        OU_PATH: "{{ domain_ou_path | default('') }}"
      register: _join_primary
      failed_when: false
      ignore_unreachable: true
      no_log: true

    # --- Fallback attempt: the other account ---
    - name: "Step 2 - Join domain via WinRM (fallback user)"
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain
        if ($cs.PartOfDomain -and ($cs.Domain -ieq $env:DOMAIN_NAME)) {
          Write-Output "ALREADY_JOINED:$env:DOMAIN_NAME"
          exit 0
        }
        try {
          $secPass    = ConvertTo-SecureString $env:DOMAIN_PASS -AsPlainText -Force
          $domainCred = New-Object System.Management.Automation.PSCredential(
                          $env:DOMAIN_USER, $secPass)
          $params = @{
            DomainName  = $env:DOMAIN_NAME
            Credential  = $domainCred
            Force       = $true
            ErrorAction = 'Stop'
          }
          if ($env:OU_PATH) { $params['OUPath'] = $env:OU_PATH }
          Add-Computer @params
          Write-Output "JOIN_OK:$env:DOMAIN_NAME"
        }
        catch {
          Write-Output "JOIN_FAILED:$($_.Exception.Message)"
          exit 1
        }
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] if (hostvars['localhost']['resolved_winrm_username'] | default('') == 'Administrator') else 'Administrator' }}"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"  # pragma: allowlist secret
      environment:
        DOMAIN_NAME: "{{ domain_name }}"
        DOMAIN_USER: "{{ domain_admin_username }}"
        DOMAIN_PASS: "{{ domain_admin_value }}"
        OU_PATH: "{{ domain_ou_path | default('') }}"
      register: _join_fallback
      no_log: true
      when:
        - _join_primary is defined
        - (_join_primary is failed or _join_primary is unreachable)

    # --- Merge result ---
    - name: "Step 2 - Set join result from whichever connection succeeded"
      ansible.builtin.set_fact:
        _join_result: "{{ _join_primary if (_join_primary is not unreachable and _join_primary is not failed) else _join_fallback }}"

    - name: "Fail if both join attempts were unreachable"
      ansible.builtin.fail:
        msg: >-
          Domain join failed for {{ target_vm_name }} ({{ target_vm_host }}).
          Both .\{{ hostvars['localhost']['resolved_winrm_username'] | default(hostvars['localhost']['resolved_se_admin_username']) }}
          and fallback account WinRM connections were rejected.
          Check WinRM listener state, NSG rules, and account access.
      when:
        - _join_primary is defined
        - (_join_primary is unreachable or _join_primary is failed)
        - (_join_fallback is not defined or _join_fallback is unreachable or _join_fallback is failed)

    - name: "Fail if domain join command failed"
      ansible.builtin.fail:
        msg: >-
          Domain join failed for {{ target_vm_name }}.
          Output: {{ _join_result.stdout | default('') | trim }}
          Check DC connectivity, OU path, and join account configuration.
      when: >-
        (_join_result.rc | default(0) | int != 0)
        or ('JOIN_FAILED:' in (_join_result.stdout | default('')))

    - name: "Step 2 - Reboot after domain join"
      ansible.builtin.shell: >-
        az vm restart
        --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
        --name "{{ azure_vm_name | default(target_vm_name) }}"
        --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
      delegate_to: localhost
      register: _az_join_reboot
      failed_when: _az_join_reboot.rc | default(0) | int != 0

    - name: "Step 2 - Wait for WinRM after domain join reboot"
      ansible.builtin.wait_for:
        host: "{{ target_vm_host }}"
        port: "{{ winrm_port | default(5985) }}"
        delay: 30
        timeout: 3600
        state: started
      when: _az_join_reboot.rc | default(0) | int == 0

# ------------------------------------------------------------------------------
# Step 3: Verify domain membership
# After join + reboot SE-Admin is restored. Try .\SE-Admin first.
# Fall back to .\Administrator if SE-Admin is not yet available.
# ------------------------------------------------------------------------------

- name: "Step 3 - Verify domain membership"
  when:
    - not (dry_run | default(false) | bool)
    - _needs_join | bool
  block:
    - name: "Step 3 - Try SE-Admin WinRM connection (expected to succeed after domain join)"
      ansible.windows.win_shell: |
        $cs = Get-CimInstance -ClassName Win32_ComputerSystem `
                -Property Name, Domain, PartOfDomain
        $domain = if ($cs.PartOfDomain) {
          try   { [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name }
          catch { $cs.Domain }
        } else { 'WORKGROUP' }
        Write-Output "hostname=$($cs.Name);domain=$domain;joined=$($cs.PartOfDomain)"
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] }}"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"  # pragma: allowlist secret
      register: _verify_seadmin
      retries: 5
      delay: 30
      until: _verify_seadmin is succeeded
      failed_when: false
      ignore_unreachable: true
      no_log: true

    - name: "Step 3 - Fallback: Read domain status via .\\Administrator (if SE-Admin failed)"
      ansible.windows.win_shell: |
        $cs = Get-CimInstance -ClassName Win32_ComputerSystem `
                -Property Name, Domain, PartOfDomain
        $domain = if ($cs.PartOfDomain) {
          try   { [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name }
          catch { $cs.Domain }
        } else { 'WORKGROUP' }
        Write-Output "hostname=$($cs.Name);domain=$domain;joined=$($cs.PartOfDomain)"
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] }}"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"  # pragma: allowlist secret
      register: _verify_admin
      retries: 3
      delay: 20
      until: _verify_admin is succeeded
      no_log: true
      when:
        - _verify_seadmin is defined
        - (_verify_seadmin is failed or _verify_seadmin is unreachable)

    - name: "Step 3 - Set verify result from whichever connection succeeded"
      ansible.builtin.set_fact:
        _verify_result: "{{ _verify_seadmin if (_verify_seadmin is succeeded) else _verify_admin }}"

    - name: "Step 3 - Fail if neither SE-Admin nor Administrator could connect"
      ansible.builtin.fail:
        msg: >-
          Step 3 verify failed for {{ target_vm_name }} ({{ target_vm_host }}).
          Both .\SE-Admin and .\Administrator WinRM connections were rejected after domain join.
          Check WinRM listener state and account access on the domain-joined VM.
      when:
        - _verify_result is defined
        - _verify_result is failed or _verify_result is unreachable

    - name: "Step 3 - Display final VM state"
      ansible.builtin.debug:
        msg: |
          +=============================================================+
          |  FINAL STATE: {{ target_vm_name }}
          +=============================================================+
          |  {{ _verify_result.stdout | default('(no output)') | trim }}
          |  WinRM user : .\{{ hostvars['localhost']['resolved_se_admin_username'] if (_verify_seadmin is succeeded) else 'Administrator' }}
          +=============================================================+

    - name: "Step 3 - Fail if VM not in target domain"
      ansible.builtin.fail:
        msg: |
          VM {{ target_vm_name }} is NOT in domain '{{ domain_name }}' after join + reboot.
          WinRM verify output: {{ _verify_result.stdout | default('') | trim }}
          Check DC connectivity, OU path, and join account configuration.
      when:
        - _verify_result is defined
        - _verify_result is succeeded
        - >-
            ('joined=True' not in (_verify_result.stdout | default('')))
            or (domain_name | lower not in (_verify_result.stdout | default('') | lower))