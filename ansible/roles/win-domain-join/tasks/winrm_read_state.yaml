---
# winrm_read_state.yaml
# Recursive retry helper for Read VM state via WinRM.
# Called from prepare_vm_state.yaml rescue block when WinRM is UNREACHABLE.
# Ansible 2.15+ does not retry on UNREACHABLE with until/retries, so we use
# block/rescue recursion with a counter (_winrm_attempt) to retry up to 10 times.

- name: "Read VM state via WinRM — attempt {{ _winrm_attempt }}"
  block:
    - name: "Read VM state via WinRM ( {{ resolved_se_admin_username }} )"
      ansible.windows.win_shell: |
        $cs = Get-CimInstance -ClassName Win32_ComputerSystem `
                -Property Name, Domain, PartOfDomain, Workgroup
        $domain = if ($cs.PartOfDomain) {
          try   { [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name }
          catch { $cs.Domain }
        } else { $null }
        @{
          hostname       = $cs.Name
          domain         = if ($domain) { $domain } else { 'WORKGROUP' }
          part_of_domain = [bool]$cs.PartOfDomain
          workgroup_name = if ($cs.Workgroup) { $cs.Workgroup } else { 'WORKGROUP' }
        } | ConvertTo-Json -Compress
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ _effective_winrm_transport | default('ntlm') }}"
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] }}"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
      register: _vm_state_result
      no_log: true
  rescue:
    - name: "WinRM unreachable — fail after 10 attempts"
      ansible.builtin.fail:
        msg: "WinRM still unreachable for {{ target_vm_name }} ({{ target_vm_host }}) after 10 attempts (5 minutes). Check VM agent status and SE-Admin credentials."
      when: _winrm_attempt | int >= 10

    - name: "WinRM unreachable — pause 30s before next attempt"
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting for VM agent to apply password (attempt {{ _winrm_attempt }}/10)..."

    - name: "WinRM unreachable — increment attempt counter"
      ansible.builtin.set_fact:
        _winrm_attempt: "{{ _winrm_attempt | int + 1 }}"

    - name: "WinRM unreachable — re-run read state"
      ansible.builtin.include_tasks: winrm_read_state.yaml
