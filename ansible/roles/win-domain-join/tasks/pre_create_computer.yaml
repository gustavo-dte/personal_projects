---
# Pre-create AD computer object before disjoin
# Creates computer object in target OU; stops playbook if create or verify fails
# Only included when domain_ou_path is set and domain_migration_needed (see join_vm.yaml)

- name: Pre-create AD computer object (before disjoin)
  block:
    - name: "Pre-create: Ensure RSAT-AD-PowerShell on VM (required for microsoft.ad.computer / Get-ADRootDSE)"
      ansible.windows.win_feature:
        name: RSAT-AD-PowerShell
        state: present
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ winrm_transport }}"
        ansible_winrm_port: "{{ winrm_port }}"
        ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_winrm_read_timeout: 70
        ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
        ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"

    - name: "Pre-create: Create AD computer object for {{ target_vm_name }} in OU"
      microsoft.ad.computer:
        name: "{{ target_vm_name }}"
        path: "{{ domain_ou_path | trim }}"
        state: present
        domain_server: "{{ domain_name }}"
        domain_username: "{{ domain_admin_username }}"
        domain_password: "{{ domain_admin_password }}"
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ winrm_transport }}"
        ansible_winrm_port: "{{ winrm_port }}"
        ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_winrm_read_timeout: 70
        ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
        ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
      register: precreate_computer_result
      no_log: true

    - name: Fail when pre-create AD computer object failed
      ansible.builtin.fail:
        msg: |
          Pre-create AD computer object failed for {{ target_vm_name }}.
          The playbook stops here. Fix the error and re-run.
          Error: {{ precreate_computer_result.msg | default('Unknown error') | string }}
      when:
        - precreate_computer_result is defined
        - precreate_computer_result.failed | default(false) | bool

    # Trust Create result when it succeeds - microsoft.ad.computer creates in the specified path
    # Skip separate Verify to avoid DN format mismatch failures (AD may return path in different format)
    - name: "Pre-create: AD computer object verified (Create succeeded)"
      ansible.builtin.debug:
        msg: "AD computer object {{ target_vm_name }}$ created in OU {{ domain_ou_path | trim }}. Proceeding to disjoin/rename/join."
      when:
        - precreate_computer_result is defined
        - not (precreate_computer_result.failed | default(false) | bool)
  when: not (dry_run | default(false) | bool)
