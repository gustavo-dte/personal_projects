---
# Post-join reachability checks from runner:
# - TCP check by IP (log-only on failure)
# - TCP check by new machine name (tests DNS resolution)
# - If name check fails, force DNS registration and retry

- name: Pause for AD DNS replication before first reachability check
  ansible.builtin.pause:
    seconds: "{{ post_join_dns_settle_seconds | default(60) | int }}"
  when: post_join_dns_settle_seconds | default(0) | int > 0

- name: Set post-join reachability targets
  ansible.builtin.set_fact:
    target_vm_fqdn: "{{ target_vm_name }}.{{ domain_name }}"

- name: Test TCP connectivity to VM by IP from runner (log-only on failure)
  ansible.builtin.wait_for:
    host: "{{ target_vm_host }}"
    port: "{{ winrm_port }}"
    timeout: 10
    state: started
  register: tcp_check_by_ip_result
  failed_when: false

- name: Log warning when VM is not reachable by IP from runner
  ansible.builtin.debug:
    msg: |
      WARNING: VM is not reachable by IP from runner: {{ target_vm_host }}:{{ winrm_port }}
      Logged only for now per requirement. Investigate separately (NSG/routes/firewall/runner network path).
  when: tcp_check_by_ip_result is failed

# Try FQDN first (runner often needs FQDN to resolve AD hosts). Use separate registers to avoid overwrite when task skipped.
- name: Test TCP connectivity to VM by FQDN from runner
  ansible.builtin.wait_for:
    host: "{{ target_vm_fqdn }}"
    port: "{{ winrm_port }}"
    timeout: 10
    state: started
  register: tcp_check_by_fqdn_result
  failed_when: false

- name: Test TCP connectivity to VM by short name when FQDN failed
  ansible.builtin.wait_for:
    host: "{{ target_vm_name }}"
    port: "{{ winrm_port }}"
    timeout: 10
    state: started
  register: tcp_check_by_short_result
  failed_when: false
  when: tcp_check_by_fqdn_result is failed

- name: Set name check failed (both FQDN and short name failed)
  ansible.builtin.set_fact:
    name_check_failed: "{{ tcp_check_by_fqdn_result is failed and tcp_check_by_short_result is failed }}"
  when: tcp_check_by_short_result is defined

- name: Set name check failed when FQDN failed and short name task was skipped
  ansible.builtin.set_fact:
    name_check_failed: true
  when: tcp_check_by_fqdn_result is failed and tcp_check_by_short_result is not defined

- name: Set name check failed false when FQDN or short name succeeded
  ansible.builtin.set_fact:
    name_check_failed: false
  when: tcp_check_by_fqdn_result is succeeded or (tcp_check_by_short_result is defined and not (tcp_check_by_short_result.skipped | default(false)) and tcp_check_by_short_result is succeeded)

- name: Log initial name check failure details
  ansible.builtin.debug:
    msg: |
      Name-based reachability (DNS resolution + TCP connectivity) failed for {{ target_vm_name }} (FQDN: {{ target_vm_fqdn }}).
      Running ipconfig /registerdns on VM and retrying name check.
  when: name_check_failed | default(false) | bool

- name: Run ipconfig /registerdns when name check fails
  ansible.windows.win_shell: ipconfig /registerdns
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: register_dns_result
  changed_when: false
  when: name_check_failed | default(false) | bool

- name: Pause to allow DNS registration to propagate
  ansible.builtin.pause:
    seconds: "{{ dns_retry_wait_seconds | default(60) | int }}"
  when: name_check_failed | default(false) | bool

- name: Re-test TCP connectivity to VM by FQDN after registerdns
  ansible.builtin.wait_for:
    host: "{{ target_vm_fqdn }}"
    port: "{{ winrm_port }}"
    timeout: 10
    state: started
  register: tcp_check_retry_fqdn_result
  failed_when: false
  when: name_check_failed | default(false) | bool

- name: Re-test TCP connectivity to VM by short name when FQDN retry failed
  ansible.builtin.wait_for:
    host: "{{ target_vm_name }}"
    port: "{{ winrm_port }}"
    timeout: 10
    state: started
  register: tcp_check_retry_short_result
  failed_when: false
  when:
    - name_check_failed | default(false) | bool
    - tcp_check_retry_fqdn_result is failed

- name: Set name check retry failed
  ansible.builtin.set_fact:
    name_check_retry_failed: "{{ tcp_check_retry_fqdn_result is failed and tcp_check_retry_short_result is failed }}"
  when:
    - name_check_failed | default(false) | bool
    - tcp_check_retry_fqdn_result is defined
    - tcp_check_retry_short_result is defined

- name: Set name check retry failed when only FQDN retry ran and failed
  ansible.builtin.set_fact:
    name_check_retry_failed: "{{ tcp_check_retry_fqdn_result is failed }}"
  when:
    - name_check_failed | default(false) | bool
    - tcp_check_retry_fqdn_result is defined
    - tcp_check_retry_short_result is not defined

- name: Set name check retry failed false when retry succeeded
  ansible.builtin.set_fact:
    name_check_retry_failed: false
  when:
    - name_check_failed | default(false) | bool
    - tcp_check_retry_fqdn_result is defined
    - (tcp_check_retry_fqdn_result is succeeded) or (tcp_check_retry_short_result is defined and tcp_check_retry_short_result is succeeded)

# Warn only - runner may be outside AD DNS scope; domain join succeeded
- name: Warn when name-based reachability still fails after registerdns
  ansible.builtin.debug:
    msg: |
      WARNING: Name-based reachability still failing after ipconfig /registerdns (runner may be outside AD DNS scope).
      - Name: {{ target_vm_name }}
      - FQDN: {{ target_vm_fqdn }}
      - IP: {{ target_vm_host }}
      - Port: {{ winrm_port }}
      Domain join succeeded; investigate DNS resolution from runner separately.
  when: name_check_retry_failed | default(false) | bool
