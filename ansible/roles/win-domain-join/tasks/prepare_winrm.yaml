---
# prepare_winrm.yaml
# ====================
# Resolves credentials and reads current VM state (hostname, domain membership)
# using Azure Run Command (SYSTEM) - no WinRM credentials needed at this stage.
#
# Credential roles per step:
#   Step 1 (probe/disjoin) : Azure Run Command as SYSTEM - no creds required
#   Step 2 (rename)        : Azure Run Command as SYSTEM - no creds required
#   Step 3 (join)          : WinRM as .\Administrator (local, post-disjoin/rename)
#                            domain join itself uses cpoe-automation (domain admin)
#
# WinRM (SE-Admin) is NOT used for disjoin - domain-joined VMs may have
# stale/wrong Delinea passwords and local Administrator is often disabled.

# ------------------------------------------------------------------------------
# Credential resolution
# ------------------------------------------------------------------------------

- name: Resolve SE-Admin WinRM credentials (used post-disjoin as local .\Administrator)
  ansible.builtin.set_fact:
    resolved_winrm_username: "{{ item_winrm_username if (item_winrm_username is defined and item_winrm_username | string | length > 0) else (winrm_username | default('SE-Admin')) }}"
    resolved_winrm_value: "{{ item_winrm_value if (item_winrm_value is defined and item_winrm_value | string | length > 0) else (winrm_value | default('')) }}"
    _domain_netbios: "{{ manifest_data.domainNameSetup.domain | default('') | split('.') | first | upper }}"
  no_log: true

- name: Set resolved_winrm_password alias
  ansible.builtin.set_fact:
    resolved_winrm_password: "{{ resolved_winrm_value }}"
  no_log: true

- name: Validate WinRM credentials are provided
  ansible.builtin.assert:
    that:
      - resolved_winrm_username | length > 0
      - resolved_winrm_value | length > 0
    fail_msg: |
      WinRM credentials are missing for {{ target_vm_name }} ({{ target_vm_host }})
      - Username : {{ 'PROVIDED' if (resolved_winrm_username | length > 0) else 'MISSING' }}
      - Password : {{ 'PROVIDED' if (resolved_winrm_value | length > 0) else 'MISSING' }}
      Ensure winrm_username / winrm_value are passed via GitHub Secrets or manifest.
    quiet: false

# ------------------------------------------------------------------------------
# Credential debug - printed for EVERY run so logs are unambiguous
# ------------------------------------------------------------------------------

- name: "[CREDENTIALS] All steps - credential plan for {{ target_vm_name }}"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  CREDENTIAL PLAN FOR: {{ target_vm_name }}
      +=============================================================+
      |  Connect IP     : {{ target_vm_host }}
      |  WinRM port     : {{ winrm_port }}  transport: {{ winrm_transport }}
      +-------------------------------------------------------------+
      |  STEP 1 - Hostname/domain probe
      |    Method       : Azure Run Command (SYSTEM - no creds)
      |    Azure VM     : {{ target_vm_name }}
      +-------------------------------------------------------------+
      |  STEP 2 - Disjoin
      |    Method       : Azure Run Command (SYSTEM - no creds)
      |    Azure VM     : {{ target_vm_name }}
      +-------------------------------------------------------------+
      |  STEP 3 - Rename
      |    Method       : Azure Run Command (SYSTEM - no creds)
      |    Azure VM     : {{ target_vm_name }}
      +-------------------------------------------------------------+
      |  STEP 4 - Domain join (WinRM as local Administrator)
      |    ansible_user : .\{{ rename_winrm_username | default('Administrator') }}
      |    Password src : Delinea secret for {{ item.vm_winrm_connect_hostname | default(item.name) }}
      |    Password len : {{ resolved_winrm_value | string | length }} chars
      +-------------------------------------------------------------+
      |  DOMAIN ADMIN (cpoe-automation, join.yml)
      |    Username     : {{ manifest_data.domainNameSetup.domain_admin_username | default('cpoe-automation@dtenet.com') }}
      |    Password src : DOMAIN_ADMIN_PASSWORD GitHub Secret
      +=============================================================+

# ------------------------------------------------------------------------------
# Dry-run / skip-hostname-setup shortcut
# ------------------------------------------------------------------------------

- name: Set placeholder facts for dry run or skip_hostname_setup
  ansible.builtin.set_fact:
    current_domain_status: { domain: 'WORKGROUP', part_of_domain: false, workgroup_name: 'WORKGROUP' }
    current_hostname_info: { old_name: "{{ item.name }}" }
    actual_vm_hostname: "{{ item.name }}"
    formatted_winrm_username: ".\\{{ rename_winrm_username | default('Administrator') }}"
  when: (dry_run | default(false) | bool) or (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Read hostname + domain status via Azure Run Command (SYSTEM, no WinRM creds)
# ------------------------------------------------------------------------------

- name: "Step 1 - Read hostname and domain status via Azure Run Command"
  ansible.builtin.shell: |
    az vm run-command invoke \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ target_vm_name }}" \
      --command-id RunPowerShellScript \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
      --scripts '
        $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Name, Domain, PartOfDomain, Workgroup
        $domainName = if ($cs.PartOfDomain) {
          try { [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name }
          catch { $cs.Domain }
        } else { $null }
        @{
          hostname       = $cs.Name
          domain         = if ($domainName) { $domainName } else { "WORKGROUP" }
          part_of_domain = [bool]$cs.PartOfDomain
          workgroup_name = $cs.Workgroup
        } | ConvertTo-Json -Compress
      ' \
      --query "value[0].message" -o tsv 2>/dev/null
  delegate_to: localhost
  register: az_preflight_result
  changed_when: false
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Step 1 - Debug: raw Azure Run Command output"
  ansible.builtin.debug:
    msg: |
      Azure Run Command preflight output for {{ target_vm_name }}:
        rc     : {{ az_preflight_result.rc | default('N/A') }}
        stdout : {{ az_preflight_result.stdout | default('(empty)') | trim }}
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Step 1 - Fail if Azure Run Command returned no output"
  ansible.builtin.fail:
    msg: |
      Azure Run Command returned no output for {{ target_vm_name }}.
      Verify the VM is running and the managed identity has RunCommand permissions.
      rc     = {{ az_preflight_result.rc | default('N/A') }}
      stderr = {{ az_preflight_result.stderr | default('') | truncate(300) }}
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - az_preflight_result.stdout is not defined or az_preflight_result.stdout | trim | length == 0

- name: "Step 1 - Extract JSON block from Run Command output"
  ansible.builtin.set_fact:
    _preflight_json: "{{ az_preflight_result.stdout | trim | regex_search('\\{[^}]+\\}') }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Step 1 - Set current_hostname_info and current_domain_status from Azure facts"
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ (_preflight_json | from_json).hostname }}"
    current_hostname_info:
      old_name: "{{ (_preflight_json | from_json).hostname }}"
    current_domain_status:
      domain: "{{ (_preflight_json | from_json).domain }}"
      part_of_domain: "{{ (_preflight_json | from_json).part_of_domain }}"
      workgroup_name: "{{ (_preflight_json | from_json).workgroup_name | default('WORKGROUP') }}"
    # Post-disjoin WinRM uses .\Administrator with SE-Admin password from Delinea
    formatted_winrm_username: ".\\{{ rename_winrm_username | default('Administrator') }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - _preflight_json is defined
    - _preflight_json | length > 0

- name: "Step 1 - Display VM state read from Azure"
  ansible.builtin.debug:
    msg: |
      +-------------------------------------------------------------+
      |  VM STATE (read via Azure Run Command as SYSTEM)
      |   Azure resource : {{ target_vm_name }}
      |   OS hostname    : {{ actual_vm_hostname | default('unknown') }}
      |   Domain         : {{ current_domain_status.domain | default('unknown') }}
      |   Part of domain : {{ current_domain_status.part_of_domain | default('unknown') }}
      |   Connect IP     : {{ target_vm_host }}
      |   Disjoin needed : {{ current_domain_status.part_of_domain | default(false) | bool }}
      +-------------------------------------------------------------+
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
