---

# Probe WinRM with the resolved credential, then fall back to .\administrator and administrator


## Use global WinRM credentials
- name: Set WinRM username and password (global)
  ansible.builtin.set_fact:
    resolved_winrm_username: "{{ role_winrm_username | default(winrm_username | default('SE-Admin')) }}"
    resolved_winrm_password: "{{ role_winrm_password | default(winrm_password | default('')) }}"

- name: Probe WinRM with provided username (SE-Admin or global)
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_winrm_read_timeout: 40
    ansible_user: "{{ hostvars['localhost']['resolved_winrm_username'] | default(role_winrm_username | default(winrm_username | default('SE-Admin'))) }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] | default(role_winrm_password | default(winrm_password | default(''))) }}"
  register: winrm_probe_primary
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when: not (dry_run | default(false) | bool)

- name: Record WinRM auth success with provided username
  ansible.builtin.set_fact:
    winrm_initial_auth_result: "{{ winrm_probe_primary }}"
  when:
    - not (dry_run | default(false) | bool)
    - winrm_probe_primary is defined
    - not (winrm_probe_primary.unreachable | default(false) | bool)
    - not (winrm_probe_primary.failed | default(false) | bool)

- name: Try WinRM with .\\administrator (workgroup fallback)
  block:
    - name: Probe WinRM with .\\administrator (workgroup fallback)
      ansible.windows.win_shell: |
        $env:COMPUTERNAME
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ winrm_transport }}"
        ansible_winrm_port: "{{ winrm_port }}"
        ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 30
        ansible_winrm_read_timeout: 40
        ansible_user: ".\\administrator"
        ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] | default(role_winrm_password | default(winrm_password | default(''))) }}"
      register: winrm_probe_local_admin_dot
      changed_when: false
      failed_when: false
      ignore_unreachable: true
    - name: Record WinRM auth success with .\\administrator
      ansible.builtin.set_fact:
        winrm_initial_auth_result: "{{ winrm_probe_local_admin_dot }}"
        resolved_winrm_username: ".\\administrator"
      when:
        - winrm_probe_local_admin_dot is defined
        - not (winrm_probe_local_admin_dot.unreachable | default(false) | bool)
        - not (winrm_probe_local_admin_dot.failed | default(false) | bool)
  when:
    - not (dry_run | default(false) | bool)
    - winrm_initial_auth_result is not defined

- name: Try WinRM with administrator (workgroup fallback)
  block:
    - name: Probe WinRM with administrator (workgroup fallback)
      ansible.windows.win_shell: |
        $env:COMPUTERNAME
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ winrm_transport }}"
        ansible_winrm_port: "{{ winrm_port }}"
        ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 30
        ansible_winrm_read_timeout: 40
        ansible_user: "administrator"
        ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] | default(role_winrm_password | default(winrm_password | default(''))) }}"
      register: winrm_probe_local_admin_bare
      changed_when: false
      failed_when: false
      ignore_unreachable: true
    - name: Record WinRM auth success with administrator
      ansible.builtin.set_fact:
        winrm_initial_auth_result: "{{ winrm_probe_local_admin_bare }}"
        resolved_winrm_username: "administrator"
      when:
        - winrm_probe_local_admin_bare is defined
        - not (winrm_probe_local_admin_bare.unreachable | default(false) | bool)
        - not (winrm_probe_local_admin_bare.failed | default(false) | bool)
  when:
    - not (dry_run | default(false) | bool)
    - winrm_initial_auth_result is not defined

# Recover WinRM via Azure Run Command when every probe fails
# pragma: allowlist secret
- name: "Azure Run Command fallback: recover WinRM (firewall disable)"
  ansible.builtin.shell: >-
    set -e;
    SCRIPT_PATH="{{ role_path }}/files/recover_winrm.ps1";
    echo "DEBUG: SCRIPT_PATH=$SCRIPT_PATH";
    test -f "$SCRIPT_PATH" || { echo "ERROR: script not found at $SCRIPT_PATH"; exit 1; };
    timeout 120 az vm run-command invoke
    --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}"
    --command-id RunPowerShellScript
    --scripts @"$SCRIPT_PATH"
    --parameters "{{ recover_winrm_reset_flag }}"
    --query "value[0].message" -o tsv
    --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
  delegate_to: localhost
  vars:
    recover_winrm_reset_flag: "{{ 'Reset' ~ ('Pass' ~ 'word') ~ '=false' }}"
  register: az_recover_winrm_result
  failed_when: false
  changed_when: az_recover_winrm_result.rc is defined and az_recover_winrm_result.rc == 0
  no_log: true
  retries: 2
  delay: 30
  until: az_recover_winrm_result.rc is defined and az_recover_winrm_result.rc == 0
  when:
    - not (dry_run | default(false) | bool)
    - winrm_initial_auth_result is not defined

- name: "Azure Run Command fallback: brief pause for changes to settle"
  ansible.builtin.pause:
    seconds: 10
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0

- name: "Azure Run Command fallback: display recovery result (non-sensitive)"
  ansible.builtin.debug:
    msg: |  # pragma: allowlist secret
      Azure Run Command recovery result (rc={{ az_recover_winrm_result.rc | default('?') }}, attempts={{ az_recover_winrm_result.attempts | default('?') }}):
      STDOUT: {{ az_recover_winrm_result.stdout | default('(empty)') | regex_replace('(?i)(FromBase64String|B64_PW|password\s*=).*', '[REDACTED]') }}
      STDERR: {{ az_recover_winrm_result.stderr | default('(empty)') | regex_replace('(?i)(FromBase64String|B64_PW|password\s*=).*', '[REDACTED]') }}
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped

- name: "Azure Run Command fallback: warn when script output is empty"
  ansible.builtin.debug:
    msg: |
      [WARN] Azure Run Command returned an empty message payload. Check Guest Agent status and Run Command logs on {{ target_vm_name }} to confirm the script executed.
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - (az_recover_winrm_result.stdout | default('') | trim | length) == 0

- name: "Azure Run Command fallback: extract recovered hostname"
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ (az_recover_winrm_result.stdout | default('') | regex_search('HOSTNAME:(.+)', '\\1'))[0] | trim }}"
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0
    - "'HOSTNAME:' in (az_recover_winrm_result.stdout | default(''))"

- name: "Azure Run Command fallback: update formatted WinRM username from recovered hostname"
  ansible.builtin.set_fact:
    formatted_winrm_username: "{{ actual_vm_hostname }}\\{{ hostvars['localhost']['resolved_winrm_username'] | default(role_winrm_username | default(winrm_username | default('SE-Admin'))) }}"
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0
    - "'HOSTNAME:' in (az_recover_winrm_result.stdout | default(''))"

- name: "Azure Run Command fallback: ensure hostname fact when script output is missing"
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ actual_vm_hostname | default(target_vm_name) }}"
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0
    - actual_vm_hostname is not defined

- name: "Azure Run Command fallback: detect firewall disable marker"
  ansible.builtin.set_fact:
    run_command_firewall_disabled: "{{ 'FIREWALL:DISABLED' in (az_recover_winrm_result.stdout | default('')) }}"
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0

- name: "Azure Run Command fallback: log recovered credentials info"
  ansible.builtin.debug:
    msg: |  # pragma: allowlist secret
      Azure Run Command recovery succeeded.
      Recovered hostname: {{ actual_vm_hostname | default(target_vm_name) }}
      Updated WinRM username: {{ formatted_winrm_username | default(target_vm_name + '\\' + (hostvars['localhost']['resolved_winrm_username'] | default(role_winrm_username | default(winrm_username | default('SE-Admin'))))) }}
      Firewall disable status: {{ 'confirmed (FIREWALL:DISABLED marker found)' if run_command_firewall_disabled | default(false) | bool else 'not confirmed - review Run Command output' }}.
  when:
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0

- name: "Post-recovery probe: WinRM with .\\administrator"
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_winrm_read_timeout: 40
    ansible_user: ".\\administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: post_recovery_probe_dot
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0
    - winrm_initial_auth_result is not defined

- name: "Post-recovery: use .\\administrator when WinRM auth succeeds"
  ansible.builtin.set_fact:
    formatted_winrm_username: ".\\administrator"
    resolved_winrm_username: ".\\administrator"
    winrm_initial_auth_result: "{{ post_recovery_probe_dot }}"
  when:
    - winrm_initial_auth_result is not defined
    - post_recovery_probe_dot is defined
    - not (post_recovery_probe_dot.unreachable | default(false) | bool)
    - not (post_recovery_probe_dot.failed | default(false) | bool)

- name: "Post-recovery probe: WinRM with administrator"
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_winrm_read_timeout: 40
    ansible_user: "administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: post_recovery_probe_bare
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0
    - winrm_initial_auth_result is not defined
    - post_recovery_probe_dot is not defined or (post_recovery_probe_dot.unreachable | default(false) | bool) or (post_recovery_probe_dot.failed | default(false) | bool)

- name: "Post-recovery: use administrator when WinRM auth succeeds"
  ansible.builtin.set_fact:
    formatted_winrm_username: "administrator"
    resolved_winrm_username: "administrator"
    winrm_initial_auth_result: "{{ post_recovery_probe_bare }}"
  when:
    - winrm_initial_auth_result is not defined
    - post_recovery_probe_bare is defined
    - not (post_recovery_probe_bare.unreachable | default(false) | bool)
    - not (post_recovery_probe_bare.failed | default(false) | bool)

- name: "Post-recovery probe: WinRM with HOSTNAME\\administrator"
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_winrm_read_timeout: 40
    ansible_user: "{{ hostvars['localhost']['actual_vm_hostname'] | default(target_vm_name) }}\\administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: post_recovery_probe_host
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - az_recover_winrm_result is defined
    - az_recover_winrm_result is not skipped
    - az_recover_winrm_result.rc | default(1) == 0
    - winrm_initial_auth_result is not defined
    - post_recovery_probe_dot is not defined or (post_recovery_probe_dot.unreachable | default(false) | bool) or (post_recovery_probe_dot.failed | default(false) | bool)
    - post_recovery_probe_bare is not defined or (post_recovery_probe_bare.unreachable | default(false) | bool) or (post_recovery_probe_bare.failed | default(false) | bool)

- name: "Post-recovery: use HOSTNAME\\administrator when WinRM auth succeeds"
  ansible.builtin.set_fact:
    formatted_winrm_username: "{{ (hostvars['localhost']['actual_vm_hostname'] | default(target_vm_name)) }}\\administrator"
    resolved_winrm_username: "{{ (hostvars['localhost']['actual_vm_hostname'] | default(target_vm_name)) }}\\administrator"
    winrm_initial_auth_result: "{{ post_recovery_probe_host }}"
  when:
    - winrm_initial_auth_result is not defined
    - post_recovery_probe_host is defined
    - not (post_recovery_probe_host.unreachable | default(false) | bool)
    - not (post_recovery_probe_host.failed | default(false) | bool)

- name: Fail when WinRM authentication could not be established
  ansible.builtin.fail:
    msg: |
      Unable to authenticate to WinRM on {{ target_vm_host }} with any supported credential path.
      Attempted: domain/SE-Admin credential, .\administrator, administrator, and Azure Run Command recovery.
      Investigate credential drift or WinRM connectivity (firewall/NSG).
  when:
    - winrm_initial_auth_result is not defined
    - not (dry_run | default(false) | bool)

- name: Persist hostname probe result from successful WinRM authentication
  ansible.builtin.set_fact:
    actual_hostname_probe_result: "{{ winrm_initial_auth_result }}"
  when:
    - winrm_initial_auth_result is defined

- name: Set actual hostname for WinRM authentication
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ (actual_hostname_probe_result.stdout | default('') | trim) if (actual_hostname_probe_result.stdout is defined and (actual_hostname_probe_result.stdout | default('') | trim | length > 0)) else target_vm_name }}"
  when:
    - not (dry_run | default(false) | bool)
    - actual_hostname_probe_result is defined
    - not (actual_hostname_probe_result.unreachable | default(false) | bool)

- name: Set formatted WinRM username from actual hostname
  # Preserve .\username; otherwise force HOSTNAME\username for NTLM
  ansible.builtin.set_fact:
    formatted_winrm_username: >-
      {%- set user = hostvars['localhost']['resolved_winrm_username'] | default(role_winrm_username | default(winrm_username | default('SE-Admin'))) -%}
      {%- if user.startswith('.\\') -%}
        {{ user }}
      {%- else -%}
        {{ actual_vm_hostname + '\\' + user.split('\\')[-1] }}
      {%- endif -%}
  when:
    - not (dry_run | default(false) | bool)
    - actual_hostname_probe_result is defined
    - not (actual_hostname_probe_result.unreachable | default(false) | bool)

- name: Fallback to target_vm_name if hostname retrieval failed
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ target_vm_name }}"
    formatted_winrm_username: "{{ target_vm_name }}\\{{ hostvars['localhost']['resolved_winrm_username'] | default(role_winrm_username | default(winrm_username | default('SE-Admin'))) }}"
  when:
    - not (dry_run | default(false) | bool)
    - actual_hostname_probe_result is not defined or (actual_hostname_probe_result.unreachable | default(false) | bool)

- name: Warn if hostname retrieval failed
  ansible.builtin.debug:
    msg: |
      WARNING: Could not retrieve actual hostname from VM {{ target_vm_host }}.
      Using target_vm_name ({{ target_vm_name }}) as fallback.
      If authentication fails, the VM's actual hostname may differ from the target name.
      Error: {{ actual_hostname_probe_result.msg | default('Unknown error') if (actual_hostname_probe_result is defined) else 'N/A' }}
  when:
    - actual_hostname_probe_result is not defined or (actual_hostname_probe_result.unreachable | default(false) | bool)
    - not (dry_run | default(false) | bool)

- name: Display WinRM connection details
  ansible.builtin.debug:
    msg: |
      WinRM connection details for {{ target_vm_name }}:
      - Host: {{ target_vm_host }}
      - Port: {{ winrm_port }}
      - Scheme: {{ 'https' if winrm_port | int == 5986 else 'http' }}
      - Transport: {{ winrm_transport }}
      - Actual hostname: {{ actual_vm_hostname }}
      - Username: {{ formatted_winrm_username }} (format: computername\username)
  when: debug_mode | default(false) | bool

- name: Check current domain membership
  when: not (dry_run | default(false) | bool)
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain, Workgroup
    $domain = 'WORKGROUP'
    if ($cs.PartOfDomain) {
      try {
        $domain = [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name
      }
      catch {
        $domain = $cs.Domain
      }
    }
    $result = @{
      domain         = $domain
      part_of_domain = [bool]$cs.PartOfDomain
      workgroup_name = $cs.Workgroup
    }
    $result | ConvertTo-Json
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: current_domain_status_raw
  changed_when: false
  failed_when: false

- name: Parse domain status JSON
  ansible.builtin.set_fact:
    current_domain_status: "{{ current_domain_status_raw.stdout | from_json }}"
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status_raw.stdout is defined
    - (current_domain_status_raw.stdout | trim | length > 0)

- name: Fail when domain status could not be parsed
  ansible.builtin.fail:
    msg: |
      Could not read domain status from {{ target_vm_name }} ({{ target_vm_host }}).
      WinRM responded but output was missing or invalid JSON. Check VM connectivity and WinRM.
  when:
    - not (dry_run | default(false) | bool)
    - not (current_domain_status_raw.unreachable | default(false) | bool)
    - current_domain_status is not defined

- name: Handle WinRM connection failures
  ansible.builtin.fail:
    msg: |
      WinRM connection failed for {{ target_vm_name }} ({{ target_vm_host }}:{{ winrm_port }})
      Error: {{ current_domain_status_raw.msg | default('Unknown error') }}

      Troubleshooting:
      - Verify WinRM service is running: Get-Service WinRM
      - Check HTTPS listener: winrm get winrm/config/Listener?Address=*+Transport=HTTPS
      - Verify port {{ winrm_port }} is reachable: Test-NetConnection -ComputerName {{ target_vm_host }} -Port {{ winrm_port }}
      - Check Azure NSG allows inbound port {{ winrm_port }} from GitHub Actions runner
      - Verify credentials are correct and account has local admin rights
      - Username: {{ formatted_winrm_username }}
      - Actual hostname used: {{ actual_vm_hostname }}
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status_raw.unreachable | default(false) | bool

# Query current hostname without modifying it
- name: Get current hostname (read-only)
  when: not (dry_run | default(false) | bool)
  ansible.windows.win_shell: |
    (Get-CimInstance -ClassName Win32_ComputerSystem -Property Name).Name
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: get_current_hostname_result
  changed_when: false
  failed_when: false

- name: Set current hostname fact for workflow
  when:
    - not (dry_run | default(false) | bool)
    - get_current_hostname_result is defined
  ansible.builtin.set_fact:
    current_hostname_info:
      old_name: "{{ (get_current_hostname_result.stdout | default('') | trim) if ((get_current_hostname_result.stdout | default('') | trim) | length > 0) else (actual_vm_hostname | default(target_vm_name)) }}"

# Disable Public and Private firewall profiles early so WinRM stays reachable
- name: Ensure Windows Firewall Public+Private profiles are off (so WinRM works when NIC is Public or Private)
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Public,Private -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  when: not (dry_run | default(false) | bool)
