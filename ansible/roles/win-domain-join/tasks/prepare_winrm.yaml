---
# WinRM setup and validation for domain join
# Resolves credentials, hostname, domain status; ensures firewall allows WinRM
#
# Initial hostname probe authentication (for domain-joined VMs):
#   Uses SE-Admin domain account with value from Delinea Secret Server
#   
# Note: Local administrator accounts (.\administrator, administrator) are NOT tried here.
#       They are only used AFTER disjoin when the VM is in WORKGROUP state,
#       specifically during the hostname rename step.
# All attempts use the same value from Delinea Secret Server

- name: Determine WinRM username to use
  ansible.builtin.set_fact:
    resolved_winrm_username: "{{ item_winrm_username if (item_winrm_username is defined and item_winrm_username | string | length > 0) else (winrm_username | default('SE-Admin')) }}"
    resolved_winrm_value: "{{ item_winrm_value if (item_winrm_value is defined and item_winrm_value | string | length > 0) else (winrm_value | default('')) }}"
    resolved_winrm_password: "{{ item_winrm_value if (item_winrm_value is defined and item_winrm_value | string | length > 0) else (winrm_value | default('')) }}"
  no_log: true

- name: Set WinRM credentials with proper format (current_hostname\username for initial connection)
  ansible.builtin.set_fact:
    # Use vm_winrm_connect_hostname (current hostname) if available, otherwise target_vm_name
    # This is critical because the VM might not yet be renamed to target_vm_name
    winrm_hostname_for_auth: "{{ vm_winrm_connect_hostname if (vm_winrm_connect_hostname is defined and vm_winrm_connect_hostname | string | length > 0) else target_vm_name }}"
    formatted_winrm_username: "{{ (vm_winrm_connect_hostname if (vm_winrm_connect_hostname is defined and vm_winrm_connect_hostname | string | length > 0) else target_vm_name) }}\\{{ resolved_winrm_username }}"
    winrm_username: "{{ (vm_winrm_connect_hostname if (vm_winrm_connect_hostname is defined and vm_winrm_connect_hostname | string | length > 0) else target_vm_name) }}\\{{ resolved_winrm_username }}"
    winrm_value: "{{ resolved_winrm_value }}"
  no_log: true

- name: Validate WinRM credentials are provided
  ansible.builtin.assert:
    that:
      - resolved_winrm_username | length > 0
      - resolved_winrm_value | length > 0
    fail_msg: |
      WinRM credentials are missing for {{ target_vm_name }} ({{ target_vm_host }})
      - Username: {{ 'PROVIDED' if (resolved_winrm_username | length > 0) else 'MISSING' }}
      - Password: {{ 'PROVIDED' if (resolved_winrm_value | length > 0) else 'MISSING' }}
      
      Expected environment variable: winrm_value_{{ target_vm_name | lower }}
      
      Please ensure:
      1. The workflow step "Fetch WinRM passwords from Delinea" ran successfully, OR
      2. vm_winrm_value is set in the manifest for this VM, OR
      3. winrm_value is passed as a playbook variable
      
      Check the "Debug per-VM WinRM password lookup" task output above for details.
    quiet: false

- name: Set placeholder facts for dry run or skip hostname setup
  ansible.builtin.set_fact:
    current_domain_status: { domain: 'WORKGROUP', part_of_domain: false, workgroup_name: 'WORKGROUP' }
    current_hostname_info: { old_name: "{{ target_vm_name }}" }
    actual_vm_hostname: "{{ target_vm_name }}"
    formatted_winrm_username: "{{ target_vm_name }}\\{{ resolved_winrm_username }}"
  when: dry_run | default(false) | bool or skip_hostname_setup | default(false) | bool

- name: Probe WinRM with provided username (SE-Admin or configured global)
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['resolved_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_value'] }}"  # pragma: allowlist secret
  register: winrm_probe_primary
  changed_when: false
  failed_when: false
  ignore_unreachable: true

- name: Record WinRM auth success with provided username
  ansible.builtin.set_fact:
    winrm_initial_auth_result: "{{ winrm_probe_primary }}"
    actual_vm_hostname: "{{ winrm_probe_primary.stdout | default('') | trim }}"
    winrm_successful_username: "{{ hostvars['localhost']['winrm_hostname_for_auth'] }}\\{{ hostvars['localhost']['resolved_winrm_username'] }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_probe_primary is defined
    - not (winrm_probe_primary.unreachable | default(false) | bool)
    - not (winrm_probe_primary.failed | default(false) | bool)

- name: Fallback - Try WinRM with local administrator (.\administrator)
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_initial_auth_result is not defined  # Primary auth failed
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: ".\\administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_value'] }}"  # pragma: allowlist secret
  register: winrm_probe_local_admin
  changed_when: false
  failed_when: false
  ignore_unreachable: true

- name: Record WinRM auth success with local administrator (.\administrator)
  ansible.builtin.set_fact:
    winrm_initial_auth_result: "{{ winrm_probe_local_admin }}"
    actual_vm_hostname: "{{ winrm_probe_local_admin.stdout | default('') | trim }}"
    winrm_successful_username: ".\\administrator"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_probe_local_admin is defined
    - not (winrm_probe_local_admin.unreachable | default(false) | bool)
    - not (winrm_probe_local_admin.failed | default(false) | bool)

- name: Fallback - Try WinRM with plain administrator account
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_initial_auth_result is not defined  # Both previous auth attempts failed
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_value'] }}"  # pragma: allowlist secret
  register: winrm_probe_plain_admin
  changed_when: false
  failed_when: false
  ignore_unreachable: true

- name: Record WinRM auth success with plain administrator
  ansible.builtin.set_fact:
    winrm_initial_auth_result: "{{ winrm_probe_plain_admin }}"
    actual_vm_hostname: "{{ winrm_probe_plain_admin.stdout | default('') | trim }}"
    winrm_successful_username: "administrator"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_probe_plain_admin is defined
    - not (winrm_probe_plain_admin.unreachable | default(false) | bool)
    - not (winrm_probe_plain_admin.failed | default(false) | bool)

- name: Fail if all WinRM authentication attempts failed
  ansible.builtin.fail:
    msg: |
      ERROR: All WinRM authentication attempts failed for {{ target_vm_name }} ({{ target_vm_host }}).
      
      Attempted usernames (with se-admin password from Delinea):
        1. {{ hostvars['localhost']['winrm_hostname_for_auth'] | default(target_vm_name) }}\{{ hostvars['localhost']['resolved_winrm_username'] | default('SE-Admin') }} (domain account)
        2. .\administrator (local administrator)
        3. administrator (plain administrator)
      
      Current hostname: {{ hostvars['localhost']['vm_winrm_connect_hostname'] | default('(not specified)') }}
      Target hostname: {{ target_vm_name }}
      
      Possible causes:
        - Wrong password retrieved from Delinea Secret Server (check field name: 'se-password')
        - WinRM not enabled on target VM
        - Firewall blocking port {{ winrm_port }}
        - VM is off or unreachable
        - Administrator accounts are disabled on the VM
        - Password does not match any of the attempted accounts
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_initial_auth_result is not defined

- name: Fallback to target_vm_name if hostname retrieval failed but auth succeeded
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ target_vm_name }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_initial_auth_result is defined
    - (actual_vm_hostname is not defined or actual_vm_hostname | length == 0)

- name: Set formatted WinRM username from successful authentication
  ansible.builtin.set_fact:
    formatted_winrm_username: "{{ winrm_successful_username }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_successful_username is defined

- name: Display successful WinRM authentication method
  ansible.builtin.debug:
    msg: |
      ✓ WinRM authentication successful for {{ target_vm_name }}:
      - Authenticated as: {{ winrm_successful_username }}
      - Actual hostname: {{ actual_vm_hostname }}
      - Connection: {{ target_vm_host }}:{{ winrm_port }}
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - winrm_successful_username is defined

- name: Display WinRM connection details
  ansible.builtin.debug:
    msg: |
      WinRM connection details for {{ target_vm_name }}:
      - Host: {{ target_vm_host }}
      - Port: {{ winrm_port }}
      - Scheme: {{ 'https' if winrm_port | int == 5986 else 'http' }}
      - Transport: {{ winrm_transport }}
      - Actual hostname: {{ actual_vm_hostname }}
      - Successful username: {{ winrm_successful_username | default('not determined') }}
      - Formatted username: {{ formatted_winrm_username }} (format: computername\username or .\username or username)
  when: debug_mode | default(false) | bool

- name: Check current domain membership
  when: not (dry_run | default(false) | bool)
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain, Workgroup
    $domainName = if ($cs.PartOfDomain) {
      try {
        [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name
      }
      catch {
        $cs.Domain
      }
    }
    else {
      $null
    }
    @{
      domain = if ($domainName) { $domainName } else { 'WORKGROUP' }
      part_of_domain = $cs.PartOfDomain
      workgroup_name = $cs.Workgroup
    } | ConvertTo-Json
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_value'] }}"  # pragma: allowlist secret
  register: current_domain_status_raw
  changed_when: false
  failed_when: false

- name: Parse domain status JSON
  ansible.builtin.set_fact:
    current_domain_status: "{{ current_domain_status_raw.stdout | from_json }}"
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status_raw.stdout is defined
    - (current_domain_status_raw.stdout | trim | length > 0)

- name: Fail when domain status could not be parsed
  ansible.builtin.fail:
    msg: |
      Could not read domain status from {{ target_vm_name }} ({{ target_vm_host }}).
      WinRM responded but output was missing or invalid JSON. Check VM connectivity and WinRM.
  when:
    - not (dry_run | default(false) | bool)
    - not (current_domain_status_raw.unreachable | default(false) | bool)
    - current_domain_status is not defined

- name: Handle WinRM connection failures
  ansible.builtin.fail:
    msg: |
      WinRM connection failed for {{ target_vm_name }} ({{ target_vm_host }}:{{ winrm_port }})
      Error: {{ current_domain_status_raw.msg | default('Unknown error') }}

      Troubleshooting:
      - Verify WinRM service is running: Get-Service WinRM
      - Check HTTPS listener: winrm get winrm/config/Listener?Address=*+Transport=HTTPS
      - Verify port {{ winrm_port }} is reachable: Test-NetConnection -ComputerName {{ target_vm_host }} -Port {{ winrm_port }}
      - Check Azure NSG allows inbound port {{ winrm_port }} from GitHub Actions runner
      - Verify credentials are correct and account has local admin rights
      - Username: {{ formatted_winrm_username }}
      - Actual hostname used: {{ actual_vm_hostname }}
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status_raw.unreachable | default(false) | bool

# Read-only: get current computer name (do not use win_hostname here - it would set the name, not read it)
- name: Get current hostname (read-only)
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
  ansible.windows.win_shell: |
    (Get-CimInstance -ClassName Win32_ComputerSystem -Property Name).Name
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_value'] }}"  # pragma: allowlist secret
  register: get_current_hostname_result
  changed_when: false
  failed_when: false

- name: Set current hostname fact for workflow
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - get_current_hostname_result is defined
  ansible.builtin.set_fact:
    current_hostname_info:
      old_name: "{{ (get_current_hostname_result.stdout | default('') | trim) if ((get_current_hostname_result.stdout | default('') | trim) | length > 0) else (actual_vm_hostname | default(target_vm_name)) }}"

# Ensure Public profile firewall is off early so WinRM stays reachable when NIC is in Public profile
- name: Ensure Windows Firewall Public profile is off (so WinRM works when NIC is Public)
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Public -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_value'] }}"  # pragma: allowlist secret
  when: not (dry_run | default(false) | bool)
