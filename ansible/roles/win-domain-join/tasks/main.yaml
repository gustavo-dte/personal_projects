---
# main.yaml — entry point for win-domain-join role
#
# Modes (controlled by extra vars):
#   disjoin_only=true          Disjoin VMs from domain, no rename
#   disjoin_and_rename=true    Disjoin + rename to target_vm_name
#   (default)                  Full pipeline: disjoin + rename + domain join

# ------------------------------------------------------------------------------
# Load manifest
# ------------------------------------------------------------------------------

- name: Load manifest
  ansible.builtin.include_role:
    name: common
    tasks_from: load_manifest
  vars:
    manifest: "{{ manifest }}"

# ------------------------------------------------------------------------------
# Resolve VM IPs and SE-Admin credentials
# ------------------------------------------------------------------------------

- name: Prepare VM connectivity and credentials
  when:
    - (manifest_data.vms | default([])) | length > 0
    - not (dry_run | default(false)) | bool
  block:
    - name: Build VM IP map from manifest static IPs
      ansible.builtin.set_fact:
        vm_ip_map: "{{ vm_ip_map | default({}) | combine({item.name: item.vm_ip}) }}"
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.vm_ip is defined
        - item.vm_ip | length > 0

    - name: Get VM private IP from Azure CLI
      ansible.builtin.shell: |
        IP=$(az vm show \
          --resource-group "{{ item.vm_resource_group | default(manifest_data.target_resource_group) }}" \
          --name "{{ item.target_vm_name }}" \
          --subscription "{{ item.vm_subscription_id | default(manifest_data.target_subscription_id) }}" \
          --show-details \
          --query "privateIps" -o tsv 2>/dev/null | tr ',' '\n' | head -1 | tr -d '[:space:]')

        if [ -n "$IP" ]; then
          echo "$IP"
          exit 0
        fi

        NIC_ID=$(az vm nic list \
          --resource-group "{{ item.vm_resource_group | default(manifest_data.target_resource_group) }}" \
          --vm-name "{{ item.target_vm_name }}" \
          --subscription "{{ item.vm_subscription_id | default(manifest_data.target_subscription_id) }}" \
          --query "[0].id" -o tsv 2>/dev/null)

        if [ -z "$NIC_ID" ]; then
          echo ""
          exit 0
        fi

        az network nic show \
          --ids "$NIC_ID" \
          --subscription "{{ item.vm_subscription_id | default(manifest_data.target_subscription_id) }}" \
          --query "ipConfigurations[0].privateIPAddress" -o tsv 2>/dev/null
      delegate_to: localhost
      register: _vm_ip_results
      changed_when: false
      failed_when: false
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.name }} ({{ item.target_vm_name }})"
      when:
        - item.target_vm_name is defined
        - item.vm_ip is not defined or item.vm_ip | length == 0
        - item.name not in (vm_ip_map | default({}))

    - name: Build VM IP map from Azure CLI results
      ansible.builtin.set_fact:
        vm_ip_map: "{{ vm_ip_map | default({}) | combine({item.item.name: item.stdout | trim}) }}"
      loop: "{{ _vm_ip_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.name | default('unknown') }}"
      when:
        - not (item.skipped | default(false) | bool)
        - item.stdout | default('') | trim | length > 0

    - name: Fail if private IP could not be resolved
      ansible.builtin.fail:
        msg: >-
          Could not resolve private IP for '{{ item.item.name }}'
          (Azure: {{ item.item.target_vm_name }},
           RG: {{ item.item.vm_resource_group | default(manifest_data.target_resource_group) }},
           Sub: {{ item.item.vm_subscription_id | default(manifest_data.target_subscription_id) }}).
          Verify target_vm_name, managed identity permissions, RG and subscription.
      loop: "{{ _vm_ip_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.name | default('unknown') }}"
      when:
        - not (item.skipped | default(false) | bool)
        - item.stdout is not defined or item.stdout | trim | length == 0

    - name: Build per-VM SE-Admin password map
      ansible.builtin.set_fact:
        vm_se_admin_passwords: >-
          {{
            vm_se_admin_passwords | default({}) | combine({
              item.name: (
                lookup('env', 'winrm_value_' + (item.target_vm_name | default(item.name) | lower), default='')
                if lookup('env', 'winrm_value_' + (item.target_vm_name | default(item.name) | lower), default='') | length > 0
                else (item.vm_se_admin_password | default(''))
              )
            })
          }}
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Fail if SE-Admin password missing for any VM
      ansible.builtin.fail:
        msg: >-
          SE-Admin password missing for VM '{{ item.name }}'.
          Expected env var: winrm_value_{{ item.target_vm_name | default(item.name) | lower }}
          Ensure resolve_delinea_secret_id.py ran successfully before this job.
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.name }}"
      when: vm_se_admin_passwords[item.name] | default('') | length == 0

# ------------------------------------------------------------------------------
# Disjoin-only path
# ------------------------------------------------------------------------------

- name: Disjoin-only path
  when: disjoin_only | default(false) | bool
  block:
    - name: Assert manifest has VMs for disjoin
      ansible.builtin.assert:
        that:
          - (manifest_data.vms | default([])) | length > 0
        fail_msg: "disjoin_only requires at least one VM in manifest vms[]."

    - name: Disjoin each VM from domain
      ansible.builtin.include_tasks: disjoin_rename.yml
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        target_vm_name: "{{ item.target_vm_name | default(item.name) }}"
        target_vm_host: "{{ vm_ip_map[item.name] | default(item.vm_ansible_host | default(item.name)) }}"
        se_admin_username: "{{ item.vm_winrm_username | default(item.vm_se_admin_username) }}"
        se_admin_password: "{{ vm_se_admin_passwords[item.name] }}"
        skip_rename: true
        azure_resource_group: "{{ item.vm_resource_group | default(manifest_data.target_resource_group) }}"
        azure_vm_name: "{{ item.target_vm_name | default(item.name) }}"
        azure_subscription_id: "{{ item.vm_subscription_id | default(manifest_data.target_subscription_id) }}"

# ------------------------------------------------------------------------------
# Disjoin-and-rename path
# ------------------------------------------------------------------------------

- name: Disjoin-and-rename path
  when: (disjoin_and_rename | default(false) | bool) or (force_rejoin | default(false) | bool)
  block:
    - name: Assert manifest has VMs for disjoin-and-rename
      ansible.builtin.assert:
        that:
          - (manifest_data.vms | default([])) | length > 0
        fail_msg: "disjoin_and_rename requires at least one VM in manifest vms[]."

    - name: Set domain admin username (for optional AD object removal)
      ansible.builtin.set_fact:
        domain_admin_username: "{{ manifest_data.domainNameSetup.domain_admin_username | trim }}"
      when:
        - manifest_data.domainNameSetup is defined
        - manifest_data.domainNameSetup.domain_admin_username is defined

    - name: Disjoin then rename each VM
      ansible.builtin.include_tasks: disjoin_rename.yml
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        target_vm_name: "{{ item.target_vm_name | default(item.name) }}"
        target_vm_host: "{{ vm_ip_map[item.name] | default(item.vm_ansible_host | default(item.name)) }}"
        se_admin_username: "{{ item.vm_winrm_username | default(item.vm_se_admin_username) }}"
        se_admin_password: "{{ vm_se_admin_passwords[item.name] }}"
        skip_rename: false
        azure_resource_group: "{{ item.vm_resource_group | default(manifest_data.target_resource_group) }}"
        azure_vm_name: "{{ item.target_vm_name | default(item.name) }}"
        azure_subscription_id: "{{ item.vm_subscription_id | default(manifest_data.target_subscription_id) }}"

# ------------------------------------------------------------------------------
# Domain join path
# ------------------------------------------------------------------------------

- name: Domain join path
  when: not (disjoin_only | default(false)) | bool
  block:
    - name: Assert domain join variables are present
      ansible.builtin.assert:
        that:
          - (manifest_data.domainNameSetup | default({})) | length > 0
          - (manifest_data.domainNameSetup.domain | default('')) | length > 0
          - (manifest_data.domainNameSetup.domain_admin_username | default('')) | length > 0
          - (domain_admin_value | default('')) | length > 0
        fail_msg: >-
          Missing domain join config.
          Required: domainNameSetup.domain, domainNameSetup.domain_admin_username (manifest),
          and domain_admin_value (GitHub Secret).

    - name: Set domain configuration facts
      ansible.builtin.set_fact:
        domain_name: "{{ manifest_data.domainNameSetup.domain }}"
        domain_admin_username: "{{ manifest_data.domainNameSetup.domain_admin_username | trim }}"
        domain_admin_value: "{{ domain_admin_value }}"
        domain_ou_path: "{{ domain_ou_path | default(manifest_data.domainNameSetup.domain_ou_path | default('')) }}"
        dry_run: "{{ dry_run | default(false) }}"
        force_rejoin: "{{ force_rejoin | default(false) }}"
      no_log: true

    - name: Join each VM to domain
      ansible.builtin.include_tasks: join.yml
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        target_vm_name: "{{ item.target_vm_name | default(item.name) }}"
        target_vm_host: "{{ vm_ip_map[item.name] | default(item.vm_ansible_host | default(item.name)) }}"
        se_admin_username: "{{ item.vm_winrm_username | default(item.vm_se_admin_username) }}"
        se_admin_password: "{{ vm_se_admin_passwords[item.name] }}"
        azure_resource_group: "{{ item.vm_resource_group | default(manifest_data.target_resource_group) }}"
        azure_vm_name: "{{ item.target_vm_name | default(item.name) }}"
        azure_subscription_id: "{{ item.vm_subscription_id | default(manifest_data.target_subscription_id) }}"
        skip_rename: "{{ not (force_rejoin | default(false) | bool) }}"