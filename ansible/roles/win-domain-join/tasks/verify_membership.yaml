---
# Post-join verification: verify domain membership and display final status

- name: Verify domain membership after reboot
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain, Workgroup
    $domainName = if ($cs.PartOfDomain) {
      try {
        [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name
      }
      catch {
        $cs.Domain
      }
    }
    else {
      $null
    }
    @{
      domain = if ($domainName) { $domainName } else { 'WORKGROUP' }
      part_of_domain = $cs.PartOfDomain
      workgroup_name = $cs.Workgroup
    } | ConvertTo-Json
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: post_reboot_domain_status_raw
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - wait_for_reboot | bool
    - >-
      (az_restart_succeeded | default(false)) or
      (winrm_reboot_succeeded | default(false))

- name: Parse post-reboot domain status JSON
  ansible.builtin.set_fact:
    post_reboot_domain_status: "{{ post_reboot_domain_status_raw.stdout | from_json }}"
  when:
    - not (dry_run | default(false) | bool)
    - post_reboot_domain_status_raw is defined
    - post_reboot_domain_status_raw.stdout is defined

- name: Display final domain status
  ansible.builtin.debug:
    msg: |
      ✅ Domain join completed successfully!
      {% if ((az_restart_succeeded | default(false)) or (winrm_reboot_succeeded | default(false))) and post_reboot_domain_status is defined %}
      Final domain status:
      - Domain: {{ post_reboot_domain_status.domain | default('N/A') }}
      - Computer Name: {{ target_vm_name }}
      {% elif not ((az_restart_succeeded | default(false)) or (winrm_reboot_succeeded | default(false))) %}
      ⚠️ Domain join succeeded, but automatic reboot failed.
      - Domain join is complete, but server must be manually rebooted for changes to take effect.
      - Computer Name: {{ target_vm_name }}
      {% else %}
      - Domain: {{ domain_name }}
      - Computer Name: {{ target_vm_name }}
      {% endif %}
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
