---
# disjoin_rename.yml
#
# Per-VM orchestrator: disjoin from domain + rename — all via WinRM.
#
# Steps:
#   Step 1 - prepare_vm_state  : probe WinRM port; if closed -> az vm extension set
#                                WinRM credential test + VM state probe (SE-Admin)
#   Step 2 - Disjoin           : WinRM .\SE-Admin (local account)
#                                Remove-Computer -LocalCredential + -UnjoinDomainCredential
#                                -> az vm restart -> wait_for WinRM
#   Step 3 - Rename            : WinRM .\Administrator + SE-Admin password
#                                Rename-Computer -> az vm restart -> wait_for WinRM -> verify
#
# Credential flow (Delinea fetched ONCE at pipeline start, reused throughout):
#   Disjoin : .\SE-Admin (WinRM + LocalCredential) + domain admin (UnjoinDomainCredential)
#   Rename  : .\Administrator  + resolved_se_admin_password
#
# Required vars (set per-VM by main.yaml loop):
#   target_vm_name             Azure resource name AND target OS hostname
#   target_vm_host             Private IP
#   winrm_port                 WinRM port (default 5985)
#   se_admin_username          SE-Admin username (from manifest vm_se_admin_username)
#   se_admin_password          SE-Admin password (from Delinea via GITHUB_ENV)
#   skip_rename                true = disjoin only; false = disjoin + rename
#   azure_resource_group       Azure resource group
#   azure_vm_name              Azure resource name
#   azure_subscription_id      Azure subscription ID

# ==============================================================================
# Step 1: Enable WinRM, test WinRM credentials, read VM state
# ==============================================================================

- name: "Step 1 - Enable WinRM + test credentials + read VM state"
  ansible.builtin.include_tasks: prepare_vm_state.yaml

- name: "Validate: target_vm_name is defined"
  ansible.builtin.assert:
    that:
      - target_vm_name is defined
      - target_vm_name | length > 0
    fail_msg: "target_vm_name is missing for VM '{{ item.name }}' in manifest."
  when: not (skip_rename | default(false) | bool)

- name: "Display plan for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  PLAN: {{ 'Disjoin-and-rename' if not (skip_rename | default(false) | bool) else 'Disjoin-only' }} for {{ item.name }}
      +=============================================================+
      |   Connect IP      : {{ target_vm_host }}
      |   Azure VM        : {{ target_vm_name }}
      |   OS hostname now : {{ current_hostname_info.old_name | default('unknown') }}
      |   Domain now      : {{ current_domain_status.domain | default('WORKGROUP') }}
      |   Part of domain  : {{ current_domain_status.part_of_domain | default(false) }}
      {% if not (skip_rename | default(false) | bool) %}
      |   Target hostname : {{ target_vm_name }}
      |   Rename needed   : {{ (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper) }}
      {% endif %}
      |   Disjoin needed  : {{ current_domain_status.part_of_domain | default(false) | bool }}
      {% if dry_run | default(false) | bool %}
      |   *** DRY RUN - no changes will be made ***
      {% endif %}
      +=============================================================+

# ==============================================================================
# Step 2: Disjoin from domain via WinRM as .\SE-Admin (local account)
# WinRM connects with LOCAL credentials because the password is for local account.
# Remove-Computer requires:
#   -LocalCredential: for local authorization to execute the command
#   -UnjoinDomainCredential: for domain authorization to remove computer from AD
# ==============================================================================

- name: "[CREDENTIALS] Step 2 - Disjoin"
  ansible.builtin.debug:
    msg: |
      +-------------------------------------------------------------+
      |  STEP 2 - DISJOIN (3 fallback attempts)
      |   Method           : WinRM + Remove-Computer (PowerShell)
      |                      then Ansible win_domain_membership module
      |   WinRM user       : .\{{ resolved_se_admin_username }} (LOCAL account)
      |   Attempt 1        : .\{{ resolved_se_admin_username }} + domain cred
      |   Attempt 2        : .\Administrator + domain cred
      |   Attempt 3        : Ansible module with domain cred
      |   Domain unjoin cred: {{ domain_admin_username }} (to remove from AD)
      |   Password src     : Delinea (local), GitHub Secret (domain)
      |   Password len     : {{ resolved_se_admin_password | string | length }} chars
      |   Connect IP       : {{ target_vm_host }}:{{ winrm_port | default(5985) }}
      +-------------------------------------------------------------+
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status.part_of_domain | default(false) | bool

- name: "Step 2 - Skip disjoin (VM already in WORKGROUP)"
  ansible.builtin.debug:
    msg: "Step 2: Disjoin skipped — '{{ item.name }}' is already in WORKGROUP."
  when:
    - not (dry_run | default(false) | bool)
    - not (current_domain_status.part_of_domain | default(false) | bool)

- name: "Step 2 - Disjoin via WinRM (.\\SE-Admin local, with domain unjoin creds)"
  ansible.windows.win_shell: |
    $ErrorActionPreference = "Stop"
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property PartOfDomain
    if (-not $cs.PartOfDomain) {
      Write-Output "ALREADY_WORKGROUP"
      exit 0
    }
    
    # Domain credential for AD unjoin authorization
    # Convert UPN (user@domain.com) to DOMAIN\Username if needed
    $domainUser = $env:DOMAIN_USER
    if ($domainUser -match '@') {
      # Extract username and domain from UPN format
      $username = ($domainUser -split '@')[0]
      $domain = ($domainUser -split '@')[1] -replace '\.com$', '' -replace '\.', ''
      $domainUser = "$domain\$username".ToUpper()
      Write-Output "DOMAIN_USER_CONVERTED: $($env:DOMAIN_USER) -> $domainUser"
    }
    $secPassDomain = ConvertTo-SecureString $env:DOMAIN_PASS -AsPlainText -Force
    $domainCred = New-Object System.Management.Automation.PSCredential(
                    $domainUser, $secPassDomain)
    
    # Try with SE-Admin first
    try {
      Write-Output "ATTEMPT_1: Using .\$env:LOCAL_USER for local credential"
      $secPassLocal = ConvertTo-SecureString $env:LOCAL_PASS -AsPlainText -Force
      $localCred = New-Object System.Management.Automation.PSCredential(
                     ".\$env:LOCAL_USER", $secPassLocal)
      
      Remove-Computer -WorkgroupName "WORKGROUP" `
                      -LocalCredential $localCred `
                      -UnjoinDomainCredential $domainCred `
                      -Force -ErrorAction Stop
      Write-Output "DISJOIN_OK: Succeeded with .\$env:LOCAL_USER"
      exit 0
    }
    catch {
      Write-Output "ATTEMPT_1_FAILED: .\$env:LOCAL_USER failed - $($_.Exception.Message)"
      
      # Fallback to Administrator with same password
      try {
        Write-Output "ATTEMPT_2: Retrying with .\Administrator (same password)"
        $localCredAdmin = New-Object System.Management.Automation.PSCredential(
                           ".\Administrator", $secPassLocal)
        
        Remove-Computer -WorkgroupName "WORKGROUP" `
                        -LocalCredential $localCredAdmin `
                        -UnjoinDomainCredential $domainCred `
                        -Force -ErrorAction Stop
        Write-Output "DISJOIN_OK: Succeeded with .\Administrator"
        exit 0
      }
      catch {
        Write-Output ("DISJOIN_FAILED: Both attempts failed. Last error: " + $_.Exception.Message)
        exit 1
      }
    }
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
  environment:
    LOCAL_USER: "{{ hostvars['localhost']['resolved_se_admin_username'] }}"
    LOCAL_PASS: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
    DOMAIN_USER: "{{ hostvars['localhost']['domain_admin_username'] }}"
    DOMAIN_PASS: "{{ hostvars['localhost']['domain_admin_value'] }}"
  register: winrm_disjoin_result
  failed_when: false
  # no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status.part_of_domain | default(false) | bool

- name: "Step 2 - Debug: disjoin output (PowerShell attempts)"
  ansible.builtin.debug:
    msg: |
      Disjoin result for {{ target_vm_name }}:
        output : {{ winrm_disjoin_result.stdout | default('(empty)') | trim }}
        stderr : {{ winrm_disjoin_result.stderr | default('') | trim }}
  when:
    - not (dry_run | default(false) | bool)
    - winrm_disjoin_result is defined
    - not (winrm_disjoin_result.skipped | default(false) | bool)

- name: "Step 2 - ATTEMPT 3: Fallback to Ansible win_domain_membership module"
  ansible.windows.win_domain_membership:
    workgroup_name: WORKGROUP
    state: workgroup
    domain_admin_user: "{{ hostvars['localhost']['domain_admin_username'] }}"
    domain_admin_password: "{{ hostvars['localhost']['domain_admin_value'] }}"
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
  register: ansible_module_disjoin_result
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - winrm_disjoin_result is defined
    - not (winrm_disjoin_result.skipped | default(false) | bool)
    - >-
        (winrm_disjoin_result.rc | default(0) | int != 0)
        or ('DISJOIN_FAILED:' in (winrm_disjoin_result.stdout | default('')))

- name: "Step 2 - Debug: Ansible module disjoin result"
  ansible.builtin.debug:
    msg: |
      Ansible module disjoin result:
        changed: {{ ansible_module_disjoin_result.changed | default(false) }}
        reboot_required: {{ ansible_module_disjoin_result.reboot_required | default(false) }}
        msg: {{ ansible_module_disjoin_result.msg | default('') }}
  when:
    - not (dry_run | default(false) | bool)
    - ansible_module_disjoin_result is defined
    - not (ansible_module_disjoin_result.skipped | default(false) | bool)

- name: "Step 2 - Fail if all disjoin attempts failed"
  ansible.builtin.fail:
    msg: |
      All disjoin attempts failed for {{ item.name }} ({{ target_vm_name }}).
      
      PowerShell attempts output:
      {{ winrm_disjoin_result.stdout | default('') | trim }}
      
      Ansible module result:
      {{ ansible_module_disjoin_result.msg | default('Not executed') }}
      ---
      Possible causes:
      - Incorrect local SE-Admin password (verify Delinea secret)
      - Domain admin credentials invalid (verify GitHub Secret)
      - Insufficient permissions for domain unjoin operation
  when:
    - not (dry_run | default(false) | bool)
    - winrm_disjoin_result is defined
    - not (winrm_disjoin_result.skipped | default(false) | bool)
    - >-
        (
          (winrm_disjoin_result.rc | default(0) | int != 0)
          or ('DISJOIN_FAILED:' in (winrm_disjoin_result.stdout | default('')))
        )
        and
        (
          ansible_module_disjoin_result.failed | default(true)
          or not ansible_module_disjoin_result.changed | default(false)
        )

- name: "Step 2 - Reboot VM via az vm restart after disjoin"
  ansible.builtin.shell: >-
    az vm restart
    --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ azure_vm_name | default(target_vm_name) }}"
    --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
  delegate_to: localhost
  register: az_disjoin_reboot
  failed_when: az_disjoin_reboot.rc | default(0) | int != 0
  when:
    - not (dry_run | default(false) | bool)
    - >-
        (
          winrm_disjoin_result is defined
          and not (winrm_disjoin_result.skipped | default(false) | bool)
          and (
            ('DISJOIN_OK' in (winrm_disjoin_result.stdout | default('')))
            or ('ALREADY_WORKGROUP' in (winrm_disjoin_result.stdout | default('')))
          )
        )
        or
        (
          ansible_module_disjoin_result is defined
          and not (ansible_module_disjoin_result.skipped | default(false) | bool)
          and (
            ansible_module_disjoin_result.changed | default(false)
            or ansible_module_disjoin_result.reboot_required | default(false)
          )
        )

- name: "Step 2 - Wait for WinRM to come back after disjoin reboot"
  ansible.builtin.wait_for:
    host: "{{ target_vm_host }}"
    port: "{{ winrm_port | default(5985) }}"
    delay: 30
    timeout: 600
    state: started
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_reboot is defined
    - not (az_disjoin_reboot.skipped | default(false) | bool)
    - az_disjoin_reboot.rc | default(0) | int == 0

- name: "Step 2 - Update domain status fact after disjoin"
  ansible.builtin.set_fact:
    current_domain_status:
      domain: 'WORKGROUP'
      part_of_domain: false
      workgroup_name: 'WORKGROUP'
  when:
    - not (dry_run | default(false) | bool)
    - winrm_disjoin_result is defined
    - not (winrm_disjoin_result.skipped | default(false) | bool)
    - "'DISJOIN_OK' in (winrm_disjoin_result.stdout | default(''))"

# ==============================================================================
# Step 3: Rename hostname via WinRM as .\Administrator + SE-Admin password
# Rename-Computer -Force, then az vm restart, then WinRM verify.
# ==============================================================================

- name: "Step 3 - Rename hostname"
  when: not (skip_rename | default(false) | bool)
  block:
    - name: "[CREDENTIALS] Step 3 - Rename"
      ansible.builtin.debug:
        msg: |
          +-------------------------------------------------------------+
          |  STEP 3 - RENAME
          |   Method      : WinRM + Rename-Computer
          |   WinRM user  : .\Administrator
          |   Password src: Delinea SE-Admin password (same fetch, reused)
          |   Password len: {{ resolved_se_admin_password | string | length }} chars
          |   Connect IP  : {{ target_vm_host }}:{{ winrm_port | default(5985) }}
          |   New name    : {{ target_vm_name }}
          +-------------------------------------------------------------+

    - name: "Step 3 - Skip rename (hostname already matches target)"
      ansible.builtin.debug:
        msg: "Step 3: Rename skipped — '{{ current_hostname_info.old_name }}' already matches '{{ target_vm_name }}'."
      when: (current_hostname_info.old_name | default('') | upper) == (target_vm_name | upper)

    - name: "Step 3 - Rename via WinRM (.\\.Administrator)"
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $current = $env:COMPUTERNAME
        if ($current -ieq "{{ target_vm_name }}") {
          Write-Output ("RENAME_ALREADY_CORRECT:name=" + $current)
          exit 0
        }
        try {
          Rename-Computer -NewName "{{ target_vm_name }}" -Force -ErrorAction Stop
          $pending = (Get-ItemProperty `
            -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\ComputerName\ComputerName' `
            -Name ComputerName).ComputerName
          Write-Output ("RENAME_CONFIRMED:pending=" + $pending)
        }
        catch {
          Write-Output ("RENAME_FAILED:" + $_.Exception.Message)
          exit 1
        }
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_winrm_read_timeout: 70
        ansible_user: ".\\Administrator"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
      register: winrm_rename_result
      failed_when: false
      no_log: true
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)

    - name: "Step 3 - Debug: rename output"
      ansible.builtin.debug:
        msg: |
          Rename result for {{ target_vm_name }}:
            output : {{ winrm_rename_result.stdout | default('(empty)') | trim }}
            stderr : {{ winrm_rename_result.stderr | default('') | trim }}
      when:
        - winrm_rename_result is defined
        - not (winrm_rename_result.skipped | default(false) | bool)

    - name: "Step 3 - Fail if rename failed"
      ansible.builtin.fail:
        msg: |
          Rename failed for {{ item.name }} ({{ target_vm_name }}).
          Output : {{ winrm_rename_result.stdout | default('') | trim }}
          stderr : {{ winrm_rename_result.stderr | default('') | truncate(300) }}
      when:
        - not (dry_run | default(false) | bool)
        - winrm_rename_result is defined
        - not (winrm_rename_result.skipped | default(false) | bool)
        - >-
            (winrm_rename_result.rc | default(1) | int != 0)
            or ('RENAME_FAILED:' in (winrm_rename_result.stdout | default('')))

    - name: "Step 3 - Reboot VM via az vm restart after rename"
      ansible.builtin.shell: >-
        az vm restart
        --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
        --name "{{ azure_vm_name | default(target_vm_name) }}"
        --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
      delegate_to: localhost
      register: az_rename_reboot
      failed_when: az_rename_reboot.rc | default(0) | int != 0
      when:
        - not (dry_run | default(false) | bool)
        - winrm_rename_result is defined
        - not (winrm_rename_result.skipped | default(false) | bool)
        - >-
            ('RENAME_CONFIRMED:' in (winrm_rename_result.stdout | default('')))
            or ('RENAME_ALREADY_CORRECT:' in (winrm_rename_result.stdout | default('')))

    - name: "Step 3 - Wait for WinRM to come back after rename reboot"
      ansible.builtin.wait_for:
        host: "{{ target_vm_host }}"
        port: "{{ winrm_port | default(5985) }}"
        delay: 30
        timeout: 600
        state: started
      when:
        - not (dry_run | default(false) | bool)
        - az_rename_reboot is defined
        - not (az_rename_reboot.skipped | default(false) | bool)
        - az_rename_reboot.rc | default(0) | int == 0

    - name: "Step 3 - Verify hostname via WinRM (.\\.Administrator) after reboot"
      ansible.windows.win_shell: $env:COMPUTERNAME
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_winrm_read_timeout: 70
        ansible_user: ".\\Administrator"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
      register: hostname_verify_result
      retries: 5
      delay: 20
      until: hostname_verify_result is succeeded
      no_log: true
      when:
        - not (dry_run | default(false) | bool)
        - az_rename_reboot is defined
        - not (az_rename_reboot.skipped | default(false) | bool)
        - az_rename_reboot.rc | default(0) | int == 0

    - name: "Step 3 - Fail if hostname did not match after reboot"
      ansible.builtin.fail:
        msg: |
          Hostname mismatch after rename reboot on {{ target_vm_host }}.
          Got      : {{ hostname_verify_result.stdout | default('(no response)') | trim }}
          Expected : {{ target_vm_name }}
      when:
        - not (dry_run | default(false) | bool)
        - hostname_verify_result is defined
        - not (hostname_verify_result.skipped | default(false) | bool)
        - (hostname_verify_result.stdout | default('') | trim | upper) != (target_vm_name | upper)

    - name: "Step 3 - Rename verified"
      ansible.builtin.debug:
        msg: "Hostname confirmed as '{{ hostname_verify_result.stdout | default('') | trim }}' via WinRM .\\.Administrator."
      when:
        - hostname_verify_result is defined
        - not (hostname_verify_result.skipped | default(false) | bool)
        - hostname_verify_result is succeeded

# ==============================================================================
# Completion
# ==============================================================================

- name: "Complete - {{ 'disjoin-and-rename' if not (skip_rename | default(false) | bool) else 'disjoin-only' }} for {{ item.name }}"
  ansible.builtin.debug:
    msg: >-
      {% if not (skip_rename | default(false) | bool) %}
      VM '{{ item.name }}' disjoined and renamed to '{{ target_vm_name }}'.
      In WORKGROUP. Ready for domain join.
      {% else %}
      VM '{{ item.name }}' disjoined to WORKGROUP.
      Hostname unchanged: '{{ current_hostname_info.old_name | default('unknown') }}'.
      {% endif %}
  when: not (dry_run | default(false) | bool)

- name: "[DRY RUN] Preview for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      [DRY RUN] Would execute for {{ item.name }}:
        Step 1: probe WinRM port; if closed -> az vm extension set (async)
                WinRM test as {{ _domain_netbios | default('DOMAIN') }}\{{ resolved_se_admin_username | default('SE-Admin') }}
        Step 2: WinRM Remove-Computer -LocalCredential .\{{ resolved_se_admin_username | default('SE-Admin') }}
                -> az vm restart -> wait WinRM
      {% if not (skip_rename | default(false) | bool) %}
        Step 3: WinRM Rename-Computer as .\Administrator
                -> az vm restart -> wait WinRM -> verify hostname
      {% endif %}
      No changes were made.
  when: dry_run | default(false) | bool
