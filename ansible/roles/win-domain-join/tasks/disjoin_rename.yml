---
# disjoin_rename.yml
#
# Per-VM orchestrator: disjoin from domain, rename, reboot.
#
# Steps:
#   Step 1 - prepare_vm_state : Azure Run Command reads hostname + domain status
#   Step 2 - Disjoin       : Azure Run Command Remove-Computer with -LocalCredential
#   Step 3 - Rename        : Azure Run Command Rename-Computer (SYSTEM context)
#                            -> az vm restart
#
# Credential design:
#   Disjoin: Azure Run Command creates a scheduled task running as SYSTEM
#            Task performs Remove-Computer and reboots (no explicit credentials needed)
#            Scheduled task approach avoids "runCommand/action Conflict" hang during reboot
#            The stale computer object stays in AD; the join step reuses/overwrites it.
#   Rename:  Azure Run Command runs as SYSTEM (no explicit credentials needed)
#
# Required vars (set per-VM by main.yaml loop):
#   target_vm_name        Azure resource name AND target OS hostname
#   target_vm_host        Private IP (resolved by main.yaml via az CLI)
#   skip_rename           true = disjoin only; false = disjoin + rename
#   azure_resource_group  Azure resource group
#   azure_vm_name         Azure resource name (= target_vm_name)
#   azure_subscription_id Azure subscription ID

# ==============================================================================
# Step 1: Read hostname and domain status via Azure Run Command
# ==============================================================================

- name: "Step 1 - Read VM state and resolve SE-Admin credentials"
  ansible.builtin.include_tasks: prepare_vm_state.yaml

- name: "Validate: target_vm_name is defined"
  ansible.builtin.assert:
    that:
      - target_vm_name is defined
      - target_vm_name | length > 0
    fail_msg: "target_vm_name is missing for VM '{{ item.name }}' in manifest."
  when: not (skip_rename | default(false) | bool)

- name: "Display plan for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  PLAN: {{ 'Disjoin-and-rename' if not (skip_rename | default(false) | bool) else 'Disjoin-only' }} for {{ item.name }}
      +=============================================================+
      |   Connect IP      : {{ target_vm_host }}
      |   Azure VM        : {{ target_vm_name }}
      |   OS hostname now : {{ current_hostname_info.old_name | default('unknown') }}
      |   Domain now      : {{ current_domain_status.domain | default('WORKGROUP') }}
      |   Part of domain  : {{ current_domain_status.part_of_domain | default(false) }}
      {% if not (skip_rename | default(false) | bool) %}
      |   Target hostname : {{ target_vm_name }}
      |   Rename needed   : {{ (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper) }}
      {% endif %}
      |   Disjoin needed  : {{ current_domain_status.part_of_domain | default(false) | bool }}
      {% if dry_run | default(false) | bool %}
      |   *** DRY RUN - no changes will be made ***
      {% endif %}
      +=============================================================+

# ==============================================================================
# Step 2: Disjoin from domain via Azure Run Command with Scheduled Task
# Creates a one-time scheduled task running as SYSTEM that performs unjoin + reboot.
# This avoids "runCommand/action Conflict" hang when VM reboots during Run Command.
# Leaves the stale AD computer object in place; the join step reuses it.
# ==============================================================================

- name: "[CREDENTIALS] Step 2 - Disjoin"
  ansible.builtin.debug:
    msg: |
      +-------------------------------------------------------------+
      |  STEP 2 - DISJOIN
      |   Method      : Azure Run Command creates scheduled task
      |   Task runs   : SYSTEM (highest privileges)
      |   Why task?   : Avoids runCommand conflict when VM reboots
      |   Action      : Remove-Computer + automatic reboot
      |   Azure VM    : {{ target_vm_name }}
      |   RG          : {{ azure_resource_group | default(manifest_data.target_resource_group) }}
      |   Note        : Stale AD object stays for join step
      +-------------------------------------------------------------+
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status.part_of_domain | default(false) | bool

- name: "Step 2 - Skip disjoin (VM already in WORKGROUP)"
  ansible.builtin.debug:
    msg: "Step 2: Disjoin skipped - VM '{{ item.name }}' is already in WORKGROUP."
  when:
    - not (dry_run | default(false) | bool)
    - not (current_domain_status.part_of_domain | default(false) | bool)

- name: "Step 2 - Disjoin via scheduled task (avoids runCommand hang)"
  ansible.builtin.shell: |
    az vm run-command invoke \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ azure_vm_name | default(target_vm_name) }}" \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
      --command-id RunPowerShellScript \
      --scripts @- <<'PSCODE'
    $taskName = "UnjoinDomainAndReboot"
    
    # Clean any previous leftover task
    Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue | Out-Null
    
    # Run as SYSTEM with highest privileges
    $action    = New-ScheduledTaskAction -Execute "PowerShell.exe" -Argument "-NoProfile -ExecutionPolicy Bypass -Command `"Remove-Computer -WorkgroupName 'WORKGROUP' -Force -Restart`""
    $trigger   = New-ScheduledTaskTrigger -Once -At (Get-Date).AddMinutes(1)
    $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -RunLevel Highest
    
    Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Force | Out-Null
    Start-ScheduledTask -TaskName $taskName
    
    Write-Output "DISJOIN_SCHEDULED: Task '$taskName' started. VM will reboot to complete domain unjoin."
    PSCODE
  delegate_to: localhost
  register: az_disjoin_result
  failed_when: false
  changed_when: az_disjoin_result is defined and az_disjoin_result.rc | default(1) == 0
  no_log: false
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status.part_of_domain | default(false) | bool
- name: "Step 2 - Fail if scheduled task creation failed"
  ansible.builtin.fail:
    msg: |
      Failed to create disjoin scheduled task for {{ item.name }} ({{ target_vm_name }}).
      Method : Azure Run Command (scheduled task)
      Output : {{ az_disjoin_result.stdout | default('') | trim }}
      Error  : {{ az_disjoin_result.stderr | default('') | trim }}
      ---
      Check if the VM has permissions to create scheduled tasks.
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)
    - az_disjoin_result.rc | default(1) != 0
- name: "Step 2 - Debug: disjoin scheduled task output"
  ansible.builtin.debug:
    msg: |
      Disjoin scheduled task result for {{ target_vm_name }}:
        Method  : Azure Run Command (scheduled task)
        Failed  : {{ az_disjoin_result.failed | default(false) }}
        Changed : {{ az_disjoin_result.changed | default(false) }}
        Output  : {{ az_disjoin_result.stdout | default('') | trim }}
        {% if az_disjoin_result.stderr is defined and az_disjoin_result.stderr | length > 0 %}
        Error   : {{ az_disjoin_result.stderr | trim }}
        {% endif %}
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)

- name: "Step 2 - Wait 90 seconds for VM to disjoin and reboot"
  ansible.builtin.pause:
    seconds: 90
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)
    - az_disjoin_result.rc | default(1) == 0
  
- name: "Step 2 - Set domain status fact after disjoin"
  ansible.builtin.set_fact:
    current_domain_status: { domain: 'WORKGROUP', part_of_domain: false, workgroup_name: 'WORKGROUP' }
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)
    - az_disjoin_result.rc | default(1) == 0

# ==============================================================================
# Step 3: Rename hostname via Azure Run Command (SYSTEM), reboot, verify
# ==============================================================================

- name: "Step 3 - Rename hostname"
  when: not (skip_rename | default(false) | bool)
  block:
    - name: "[CREDENTIALS] Step 3 - Rename and verify"
      ansible.builtin.debug:
        msg: |
          +-------------------------------------------------------------+
          |  Step 3 - RENAME
          |   Method         : Azure Run Command (SYSTEM context)
          |   Azure VM       : {{ target_vm_name }}
          |   RG             : {{ azure_resource_group | default(manifest_data.target_resource_group) }}
          +-------------------------------------------------------------+

    - name: "Step 3 - Skip rename (hostname already matches target)"
      ansible.builtin.debug:
        msg: "Step 3: Rename skipped - '{{ current_hostname_info.old_name }}' already matches '{{ target_vm_name }}'."
      when: (current_hostname_info.old_name | default('') | upper) == (target_vm_name | upper)
    
    - name: "Step 3 - Rename via Azure Run Command (SYSTEM)"
      ansible.builtin.shell: >-
        az vm run-command invoke
        --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
        --name "{{ azure_vm_name | default(target_vm_name) }}"
        --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
        --command-id RunPowerShellScript
        --scripts "Rename-Computer -NewName '{{ target_vm_name }}' -Force -ErrorAction Stop"
      register: az_rename_result
      failed_when: false
      changed_when: az_rename_result is defined and az_rename_result.rc | default(1) | int == 0
      no_log: true
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)
    - name: "Step 3 - Fail if rename failed"
      ansible.builtin.fail:
        msg: |
          Hostname rename failed for {{ item.name }} ({{ target_vm_name }}).
          Method : Azure Run Command
          Output : {{ az_rename_result.stdout | default('') | trim }}
          Error  : {{ az_rename_result.stderr | default('') | trim }}
      when:
        - not (dry_run | default(false) | bool)
        - az_rename_result is defined
        - not (az_rename_result.skipped | default(false) | bool)
        - az_rename_result.rc | default(1) != 0
    - name: "Step 3 - Restart VM via Azure CLI after rename"
      ansible.builtin.shell: >-
        az vm restart
        --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
        --name "{{ azure_vm_name | default(target_vm_name) }}"
        --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
        --no-wait
      delegate_to: localhost
      register: az_rename_restart_result
      failed_when: false
      when:
        - not (dry_run | default(false) | bool)
        - az_rename_result is defined
        - not (az_rename_result.skipped | default(false) | bool)
        - "'RENAME_OK' in (az_rename_result.stdout | default(''))"
    - name: "Step 3 - Wait 90 seconds for VM to stabilize after rename reboot"
      ansible.builtin.pause:
        seconds: 90
      when:
        - not (dry_run | default(false) | bool)
        - az_rename_restart_result is defined
        - not (az_rename_restart_result.skipped | default(false) | bool)
        - az_rename_restart_result.rc | default(0) | int == 0

# # ==============================================================================
# Completion
# ==============================================================================

- name: "Complete - {{ 'disjoin-and-rename' if not (skip_rename | default(false) | bool) else 'disjoin-only' }} for {{ item.name }}"
  ansible.builtin.debug:
    msg: >-
      {% if not (skip_rename | default(false) | bool) %}
      VM '{{ item.name }}' disjoined and renamed to '{{ target_vm_name }}'.
      In WORKGROUP. Ready for domain join.
      {% else %}
      VM '{{ item.name }}' disjoined to WORKGROUP.
      Hostname: '{{ current_hostname_info.old_name | default('unknown') }}'.
      {% endif %}
  when: not (dry_run | default(false) | bool)

- name: "[DRY RUN] Preview for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      [DRY RUN] Would execute for {{ item.name }}:
        Step 2: Disjoin from '{{ current_domain_status.domain | default('WORKGROUP') }}'
                -> Create scheduled task as SYSTEM -> Remove-Computer + auto reboot
      {% if not (skip_rename | default(false) | bool) %}
        Step 3: Rename '{{ current_hostname_info.old_name | default('unknown') }}' -> '{{ target_vm_name }}'
                -> az vm restart -> Azure Run Command verify
      {% endif %}
      No changes were made.
  when: dry_run | default(false) | bool
