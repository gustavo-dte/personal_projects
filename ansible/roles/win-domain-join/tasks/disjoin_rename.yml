---
# disjoin_rename.yml
#
# Per-VM: disjoin from domain + rename hostname — all via WinRM.
#
# Steps:
#   1. prepare_vm_state  — resolve credentials, port probe, sync password, set WinRM user
#   2. Disjoin           — WMI UnjoinDomainOrWorkgroup via WinRM (SE-Admin, domain-joined)
#                          -> az vm restart -> wait WinRM
#                          -> sync Delinea password onto .\Administrator (SE-Admin gone after disjoin)
#   3. Rename            — Rename-Computer via WinRM (.\Administrator)
#                          -> az vm restart -> wait WinRM -> verify hostname
#
# Required vars (set by main.yaml loop):
#   target_vm_name, target_vm_host, se_admin_username, se_admin_password
#   skip_rename, azure_resource_group, azure_vm_name, azure_subscription_id, sync_password

# ------------------------------------------------------------------------------
# Step 1: Enable WinRM, sync credentials, set WinRM user
# ------------------------------------------------------------------------------

- name: "Step 1 - Enable WinRM + sync credentials"
  ansible.builtin.include_tasks: prepare_vm_state.yaml

- name: "Assert target_vm_name is set"
  ansible.builtin.assert:
    that:
      - target_vm_name is defined
      - target_vm_name | length > 0
    fail_msg: "target_vm_name is missing — check manifest vms[].target_vm_name."

- name: "Display disjoin plan for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  PLAN: {{ 'Disjoin-and-rename' if not (skip_rename | default(false) | bool) else 'Disjoin-only' }} for {{ item.name }}
      +=============================================================+
      |   Connect IP      : {{ target_vm_host }}
      |   Azure VM        : {{ target_vm_name }}
      |   OS hostname now : {{ current_hostname_info.old_name | default('unknown') }}
      |   Domain now      : {{ current_domain_status.domain | default('WORKGROUP') }}
      |   Part of domain  : {{ current_domain_status.part_of_domain | default(false) }}
      |   WinRM user      : .\{{ resolved_winrm_username | default(resolved_se_admin_username) }}
      {% if not (skip_rename | default(false) | bool) %}
      |   Target hostname : {{ target_vm_name }}
      |   Rename needed   : {{ (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper) }}
      {% endif %}
      |   Disjoin needed  : {{ current_domain_status.part_of_domain | default(false) | bool }}
      {% if dry_run | default(false) | bool %}
      |   *** DRY RUN - no changes will be made ***
      {% endif %}
      +=============================================================+

# ------------------------------------------------------------------------------
# Step 2: Disjoin from domain
# Uses SE-Admin (domain account still active before disjoin)
# ------------------------------------------------------------------------------

- name: "[CREDENTIALS] Step 2 - Disjoin via SE-Admin (domain account)"
  ansible.builtin.debug:
    msg: |
      +-------------------------------------------------------------+
      |  STEP 2 - DISJOIN
      |   WinRM user      : .\{{ resolved_winrm_username | default(resolved_se_admin_username) }}
      |   Password src    : Delinea ({{ resolved_se_admin_password | string | length }} chars)
      |   Connect IP      : {{ target_vm_host }}:{{ winrm_port | default(5985) }}
      +-------------------------------------------------------------+
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status.part_of_domain | default(false) | bool

- name: "Skip disjoin (already in WORKGROUP)"
  ansible.builtin.debug:
    msg: "Disjoin skipped — {{ target_vm_name }} is already in WORKGROUP."
  when:
    - not (dry_run | default(false) | bool)
    - not (current_domain_status.part_of_domain | default(false) | bool)

- name: "Step 2 - Disjoin from domain via WMI"
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $methods = @()

    try {
      $cs = Get-WmiObject Win32_ComputerSystem
      $rv = $cs.UnjoinDomainOrWorkgroup($null, $null, 0)
      if ($rv.ReturnValue -eq 0) {
        Write-Output 'DISJOIN_OK:WMI'
        exit 0
      }
      $methods += "WMI: ReturnValue=$($rv.ReturnValue)"
    }
    catch { $methods += "WMI: $($_.Exception.Message)" }

    try {
      Remove-Computer -WorkgroupName 'WORKGROUP' -Force -ErrorAction Stop
      Write-Output 'DISJOIN_OK:Remove-Computer'
      exit 0
    }
    catch { $methods += "Remove-Computer: $($_.Exception.Message)" }

    Write-Error "All disjoin methods failed: $($methods -join ' | ')"
    exit 1
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_user: ".\\{{ hostvars['localhost']['resolved_winrm_username'] | default(hostvars['localhost']['resolved_se_admin_username']) }}"
    ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
  register: _disjoin_result
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status.part_of_domain | default(false) | bool

- name: "Fail if disjoin failed"
  ansible.builtin.fail:
    msg: "Disjoin failed for {{ target_vm_name }}. rc={{ _disjoin_result.rc | default('N/A') }}"
  when:
    - not (dry_run | default(false) | bool)
    - _disjoin_result is defined
    - not (_disjoin_result.skipped | default(false) | bool)
    - _disjoin_result.rc | default(1) | int != 0

- name: "Step 2 - Reboot after disjoin"
  ansible.builtin.shell: >-
    az vm restart
    --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ azure_vm_name | default(target_vm_name) }}"
    --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
  delegate_to: localhost
  register: _az_disjoin_reboot
  failed_when: _az_disjoin_reboot.rc | default(0) | int != 0
  when:
    - not (dry_run | default(false) | bool)
    - _disjoin_result is defined
    - not (_disjoin_result.skipped | default(false) | bool)
    - _disjoin_result.rc | default(1) | int == 0

- name: "Step 2 - Wait for WinRM port after disjoin reboot"
  ansible.builtin.wait_for:
    host: "{{ target_vm_host }}"
    port: "{{ winrm_port | default(5985) }}"
    delay: 30
    timeout: 3600
    state: started
  when:
    - not (dry_run | default(false) | bool)
    - _az_disjoin_reboot is defined
    - not (_az_disjoin_reboot.skipped | default(false) | bool)
    - _az_disjoin_reboot.rc | default(0) | int == 0

- name: "Update domain status fact after disjoin"
  ansible.builtin.set_fact:
    current_domain_status:
      domain: "WORKGROUP"
      part_of_domain: false
      workgroup_name: "WORKGROUP"
  when:
    - not (dry_run | default(false) | bool)
    - _disjoin_result is defined
    - not (_disjoin_result.skipped | default(false) | bool)
    - _disjoin_result.rc | default(1) | int == 0

# ------------------------------------------------------------------------------
# Step 2.5: Post-disjoin credential switch
# SE-Admin is removed from SAM after domain disjoin.
# Sync Delinea password onto .\Administrator and switch WinRM user.
# All subsequent WinRM tasks use .\Administrator.
# ------------------------------------------------------------------------------

- name: "Step 2.5 - Sync Delinea password onto .\\Administrator (SE-Admin gone after disjoin)"
  ansible.builtin.shell: |
    az vm user update \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ azure_vm_name | default(target_vm_name) }}" \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
      --username "Administrator" \
      --password "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
  delegate_to: localhost
  register: _post_disjoin_sync
  failed_when: _post_disjoin_sync.rc != 0
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - _az_disjoin_reboot is defined
    - not (_az_disjoin_reboot.skipped | default(false) | bool)
    - _az_disjoin_reboot.rc | default(0) | int == 0

- name: "Step 2.5 - Switch WinRM user to .\\Administrator (SE-Admin no longer exists)"
  ansible.builtin.set_fact:
    resolved_winrm_username: "Administrator"
    _effective_winrm_user: ".\\Administrator"
  when:
    - not (dry_run | default(false) | bool)
    - _az_disjoin_reboot is defined
    - not (_az_disjoin_reboot.skipped | default(false) | bool)
    - _az_disjoin_reboot.rc | default(0) | int == 0

- name: "Step 2.5 - Wait for Administrator password to propagate"
  ansible.builtin.pause:
    seconds: 90
    prompt: "Waiting for Azure VM Agent to apply Administrator password after disjoin..."
  when:
    - not (dry_run | default(false) | bool)
    - _az_disjoin_reboot is defined
    - not (_az_disjoin_reboot.skipped | default(false) | bool)
    - _az_disjoin_reboot.rc | default(0) | int == 0
    - _post_disjoin_sync is defined
    - not (_post_disjoin_sync.skipped | default(false) | bool)

- name: "Step 2.5 - Display post-disjoin credential state"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  POST-DISJOIN CREDENTIAL STATE
      +=============================================================+
      |  VM               : {{ target_vm_name }}
      |  SE-Admin         : REMOVED (domain account gone after disjoin)
      |  WinRM user       : .\Administrator
      |  Password src     : Delinea (synced onto Administrator)
      +=============================================================+
  when:
    - not (dry_run | default(false) | bool)
    - _az_disjoin_reboot is defined
    - not (_az_disjoin_reboot.skipped | default(false) | bool)
    - _az_disjoin_reboot.rc | default(0) | int == 0

# ------------------------------------------------------------------------------
# Step 3: Rename hostname — uses .\Administrator
# ------------------------------------------------------------------------------

- name: "Step 3 - Rename hostname"
  when: not (skip_rename | default(false) | bool)
  block:
    - name: "[CREDENTIALS] Step 3 - Rename"
      ansible.builtin.debug:
        msg: |
          +-------------------------------------------------------------+
          |  STEP 3 - RENAME
          |   WinRM user  : .\{{ hostvars['localhost']['resolved_winrm_username'] | default('Administrator') }}
          |   Password src: Delinea ({{ hostvars['localhost']['resolved_se_admin_password'] | string | length }} chars)
          |   Connect IP  : {{ target_vm_host }}:{{ winrm_port | default(5985) }}
          |   New name    : {{ target_vm_name }}
          +-------------------------------------------------------------+

    - name: "Skip rename (hostname already matches)"
      ansible.builtin.debug:
        msg: "Rename skipped — {{ current_hostname_info.old_name }} already matches {{ target_vm_name }}."
      when: (current_hostname_info.old_name | default('') | upper) == (target_vm_name | upper)

    - name: "Step 3 - Rename via WinRM"
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        if ($env:COMPUTERNAME -ieq "{{ target_vm_name }}") {
          Write-Output "RENAME_ALREADY_CORRECT:$env:COMPUTERNAME"
          exit 0
        }
        try {
          Rename-Computer -NewName "{{ target_vm_name }}" -Force -ErrorAction Stop
          $pending = (Get-ItemProperty `
            -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\ComputerName\ComputerName' `
            -Name ComputerName).ComputerName
          Write-Output "RENAME_CONFIRMED:pending=$pending"
        }
        catch {
          Write-Output "RENAME_FAILED:$($_.Exception.Message)"
          exit 1
        }
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_user: ".\\{{ hostvars['localhost']['resolved_winrm_username'] | default('Administrator') }}"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
      register: _rename_result
      no_log: true
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)

    - name: "Fail if rename failed"
      ansible.builtin.fail:
        msg: >-
          Rename failed for {{ target_vm_name }}.
          Output: {{ _rename_result.stdout | default('') | trim }}
      when:
        - not (dry_run | default(false) | bool)
        - _rename_result is defined
        - not (_rename_result.skipped | default(false) | bool)
        - >-
          (_rename_result.rc | default(1) | int != 0)
          or ('RENAME_FAILED:' in (_rename_result.stdout | default('')))

    - name: "Step 3 - Reboot after rename"
      ansible.builtin.shell: >-
        az vm restart
        --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
        --name "{{ azure_vm_name | default(target_vm_name) }}"
        --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
      delegate_to: localhost
      register: _az_rename_reboot
      failed_when: _az_rename_reboot.rc | default(0) | int != 0
      when:
        - not (dry_run | default(false) | bool)
        - _rename_result is defined
        - not (_rename_result.skipped | default(false) | bool)
        - >-
          ('RENAME_CONFIRMED:' in (_rename_result.stdout | default('')))
          or ('RENAME_ALREADY_CORRECT:' in (_rename_result.stdout | default('')))

    - name: "Step 3 - Wait for WinRM after rename reboot"
      ansible.builtin.wait_for:
        host: "{{ target_vm_host }}"
        port: "{{ winrm_port | default(5985) }}"
        delay: 30
        timeout: 3600
        state: started
      when:
        - not (dry_run | default(false) | bool)
        - _az_rename_reboot is defined
        - not (_az_rename_reboot.skipped | default(false) | bool)
        - _az_rename_reboot.rc | default(0) | int == 0

    - name: "Step 3 - Verify hostname via WinRM after reboot"
      ansible.windows.win_shell: $env:COMPUTERNAME
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_port: "{{ winrm_port | default(5985) }}"
        ansible_winrm_scheme: http
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_user: ".\\{{ hostvars['localhost']['resolved_winrm_username'] | default('Administrator') }}"
        ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"
      register: _hostname_verify
      retries: 5
      delay: 20
      until: _hostname_verify is succeeded
      no_log: true
      when:
        - not (dry_run | default(false) | bool)
        - _az_rename_reboot is defined
        - not (_az_rename_reboot.skipped | default(false) | bool)
        - _az_rename_reboot.rc | default(0) | int == 0

    - name: "Step 3 - Display hostname verification"
      ansible.builtin.debug:
        msg: |
          +=============================================================+
          |  RENAME VERIFIED
          |   Azure resource : {{ target_vm_name }}
          |   OS hostname    : {{ _hostname_verify.stdout | default('unknown') | trim }}
          |   WinRM user     : .\{{ hostvars['localhost']['resolved_winrm_username'] | default('Administrator') }}
          +=============================================================+
      when:
        - not (dry_run | default(false) | bool)
        - _hostname_verify is defined
        - _hostname_verify is succeeded