---
# disjoin_rename.yml
#
# Per-VM orchestrator: disjoin from domain, rename, reboot.
# ALL Azure operations (disjoin, rename, restart) use Azure CLI / Run Command as SYSTEM.
# WinRM is used ONLY after reboot (.\Administrator) to verify the rename.
#
# Steps:
#   Step 1 - prepare_winrm : Azure Run Command reads hostname + domain status (no WinRM creds)
#   Step 2 - Disjoin       : Azure Run Command Remove-Computer -> WORKGROUP -> az vm restart
#   Step 3 - Re-probe      : Azure Run Command re-reads hostname post-reboot
#   Step 4 - Rename        : Azure Run Command Rename-Computer -> az vm restart -> WinRM verify
#
# Required vars (set per-VM by main.yaml loop):
#   target_vm_name        Azure resource name AND target OS hostname
#   target_vm_host        Private IP (resolved by main.yaml via az CLI)
#   winrm_port            WinRM port (default 5985)
#   winrm_transport       WinRM transport (default ntlm)
#   item_winrm_username   SE-Admin (from manifest vm_winrm_username)
#   item_winrm_value      Password from Delinea (used for .\Administrator post-disjoin)
#   skip_rename           true = disjoin only; false = disjoin + rename
#   rename_winrm_username Local admin for post-rename WinRM verify (default: Administrator)
#   azure_resource_group  Azure resource group
#   azure_vm_name         Azure resource name (= target_vm_name)
#   azure_subscription_id Azure subscription ID

# ==============================================================================
# Step 1: Read hostname and domain status via Azure Run Command
# ==============================================================================

- name: "Step 1 - Read current VM state from Azure"
  ansible.builtin.include_tasks: prepare_winrm.yaml

- name: "Validate: target_vm_name is defined"
  ansible.builtin.assert:
    that:
      - target_vm_name is defined
      - target_vm_name | length > 0
    fail_msg: >-
      target_vm_name is missing for VM '{{ item.name }}' in manifest.
  when: not (skip_rename | default(false) | bool)

- name: "Display plan for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  PLAN: {{ 'Disjoin-and-rename' if not (skip_rename | default(false) | bool) else 'Disjoin-only' }} for {{ item.name }}
      +=============================================================+
      |   Connect IP      : {{ target_vm_host }}
      |   Azure VM        : {{ target_vm_name }}
      |   OS hostname now : {{ current_hostname_info.old_name | default('unknown') }}
      |   Domain now      : {{ current_domain_status.domain | default('WORKGROUP') }}
      |   Part of domain  : {{ current_domain_status.part_of_domain | default(false) }}
      {% if not (skip_rename | default(false) | bool) %}
      |   Target hostname : {{ target_vm_name }}
      |   Rename needed   : {{ (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper) }}
      {% endif %}
      |   Disjoin needed  : {{ current_domain_status.part_of_domain | default(false) | bool }}
      {% if dry_run | default(false) | bool %}
      |   *** DRY RUN - no changes will be made ***
      {% endif %}
      +=============================================================+

# ==============================================================================
# Step 2: Disjoin from domain via Azure Run Command (SYSTEM)
# ==============================================================================

- name: "[CREDENTIALS] Step 2 - Disjoin"
  ansible.builtin.debug:
    msg: |
      +-------------------------------------------------------------+
      |  STEP 2 - DISJOIN
      |   Method      : Azure Run Command + SE-Admin domain creds
      |   Azure VM    : {{ target_vm_name }}
      |   RG          : {{ azure_resource_group | default(manifest_data.target_resource_group) }}
      |   Disjoin user: {{ current_hostname_info.old_name | lower }}.{{ manifest_data.domainNameSetup.domain }}\{{ resolved_winrm_username }}
      |   Password len: {{ resolved_winrm_value | string | length }} chars
      +-------------------------------------------------------------+
  when: not (dry_run | default(false) | bool)

- name: "Step 2 - Skip disjoin (VM already in WORKGROUP)"
  ansible.builtin.debug:
    msg: "Step 2: Disjoin skipped - VM '{{ item.name }}' is already in WORKGROUP."
  when:
    - not (dry_run | default(false) | bool)
    - not (current_domain_status.part_of_domain | default(false) | bool)

- name: "Step 2 - Disjoin from domain via Azure Run Command (SE-Admin domain creds)"
  ansible.builtin.shell: |
    az vm run-command invoke \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ azure_vm_name | default(target_vm_name) }}" \
      --command-id RunPowerShellScript \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
      --parameters \
        "DomainUser={{ current_hostname_info.old_name | lower }}.{{ manifest_data.domainNameSetup.domain }}\\{{ resolved_winrm_username }}" \
        "DomainPass={{ resolved_winrm_value }}" \
      --scripts '
        param($DomainUser, $DomainPass)
        $ErrorActionPreference = "Stop"
        $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property PartOfDomain
        if (-not $cs.PartOfDomain) {
          Write-Output "ALREADY_WORKGROUP"
          exit 0
        }
        try {
          $secPass = ConvertTo-SecureString $DomainPass -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential($DomainUser, $secPass)
          Remove-Computer -WorkgroupName "WORKGROUP" -UnjoinDomainCredential $cred -Force -ErrorAction Stop
          Write-Output "DISJOIN_OK"
        }
        catch {
          Write-Output ("DISJOIN_FAILED:" + $_.Exception.Message)
          exit 1
        }
      ' \
      --query "value[0].message" -o tsv 2>&1
  delegate_to: localhost
  register: az_disjoin_result
  failed_when: false
  changed_when: false
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status.part_of_domain | default(false) | bool

- name: "Step 2 - Debug: disjoin Run Command output"
  ansible.builtin.debug:
    msg: |
      Disjoin Run Command output for {{ target_vm_name }}:
        rc     : {{ az_disjoin_result.rc | default('N/A') }}
        output : {{ az_disjoin_result.stdout | default('(empty)') | trim }}
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)

- name: "Step 2 - Fail if disjoin Run Command failed"
  ansible.builtin.fail:
    msg: |
      Disjoin failed for {{ item.name }} ({{ target_vm_name }}).
      Azure Run Command output: {{ az_disjoin_result.stdout | default('') | trim }}
      stderr: {{ az_disjoin_result.stderr | default('') | truncate(300) }}
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)
    - >-
        (az_disjoin_result.rc | default(0) | int != 0)
        or ('DISJOIN_FAILED:' in (az_disjoin_result.stdout | default('')))

- name: "Step 2 - Restart VM via Azure CLI after disjoin"
  ansible.builtin.shell: >-
    az vm restart
    --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ azure_vm_name | default(target_vm_name) }}"
    --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
    --no-wait
  delegate_to: localhost
  register: az_restart_disjoin_result
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)
    - >-
        (az_disjoin_result.rc | default(0) | int == 0)
        and ('DISJOIN_FAILED:' not in (az_disjoin_result.stdout | default('')))

- name: "Step 2 - Wait for VM to come back after disjoin reboot"
  ansible.builtin.wait_for:
    port: "{{ winrm_port }}"
    host: "{{ target_vm_host }}"
    delay: 60
    timeout: 600
  when:
    - not (dry_run | default(false) | bool)
    - az_restart_disjoin_result is defined
    - not (az_restart_disjoin_result.skipped | default(false) | bool)
    - az_restart_disjoin_result.rc | default(0) | int == 0

# ==============================================================================
# Step 3: Re-probe hostname post-disjoin via Azure Run Command (rename path only)
# ==============================================================================

- name: "Step 3 - Re-read hostname via Azure Run Command after disjoin reboot"
  ansible.builtin.shell: |
    az vm run-command invoke \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ azure_vm_name | default(target_vm_name) }}" \
      --command-id RunPowerShellScript \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
      --scripts '$env:COMPUTERNAME' \
      --query "value[0].message" -o tsv 2>/dev/null
  delegate_to: localhost
  register: az_post_disjoin_hostname
  changed_when: false
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_rename | default(false) | bool)
    - az_disjoin_result is defined
    - not (az_disjoin_result.skipped | default(false) | bool)

- name: "Step 3 - Update current_hostname_info from post-disjoin probe"
  ansible.builtin.set_fact:
    current_hostname_info:
      old_name: "{{ az_post_disjoin_hostname.stdout | trim | default(current_hostname_info.old_name) }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_rename | default(false) | bool)
    - az_post_disjoin_hostname is defined
    - not (az_post_disjoin_hostname.skipped | default(false) | bool)
    - az_post_disjoin_hostname.stdout | default('') | trim | length > 0

- name: "Step 3 - Display post-disjoin hostname"
  ansible.builtin.debug:
    msg: |
      Post-disjoin hostname: '{{ current_hostname_info.old_name | default('unknown') }}'
      Target hostname      : '{{ target_vm_name }}'
      Rename needed        : {{ (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper) }}
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_rename | default(false) | bool)

# ==============================================================================
# Step 4: Rename hostname via Azure Run Command, verify via WinRM .\Administrator
# ==============================================================================

- name: "Step 4 - Rename hostname logic"
  block:
    - name: "[CREDENTIALS] Step 4 - Rename and verify"
      ansible.builtin.debug:
        msg: |
          +-------------------------------------------------------------+
          |  STEP 4 - RENAME
          |   Rename method  : Azure Run Command (SYSTEM - no creds)
          |   Verify method  : WinRM .\{{ rename_winrm_username | default('Administrator') }}
          |   Connect IP     : {{ target_vm_host }}
          |   Port           : {{ winrm_port }}
          |   ansible_user   : .\{{ rename_winrm_username | default('Administrator') }}
          |   Password src   : Delinea secret for {{ item.vm_winrm_connect_hostname | default(item.name) }}
          |   Password len   : {{ resolved_winrm_value | string | length }} chars
          +-------------------------------------------------------------+

    - name: "Step 4 - Rename skipped (hostname already matches target)"
      ansible.builtin.debug:
        msg: "Step 4: Rename skipped - hostname already '{{ current_hostname_info.old_name }}' matches target '{{ target_vm_name }}'."
      when: (current_hostname_info.old_name | default('') | upper) == (target_vm_name | upper)

    - name: "Step 4 - Rename via Azure Run Command (SYSTEM)"
      ansible.builtin.shell: |
        script_file="$(mktemp)"
        cat > "$script_file" <<'PS'
        $ErrorActionPreference = "Stop"
        try {
          Rename-Computer -NewName "{{ target_vm_name }}" -Force -ErrorAction Stop
        }
        catch {
          Write-Output ("RENAME_EXCEPTION:" + $_.Exception.Message)
          exit 1
        }
        $pending = (Get-ItemProperty `
          -Path "HKLM:\SYSTEM\CurrentControlSet\Control\ComputerName\ComputerName" `
          -Name ComputerName).ComputerName
        $active = (Get-ItemProperty `
          -Path "HKLM:\SYSTEM\CurrentControlSet\Control\ComputerName\ActiveComputerName" `
          -Name ComputerName).ComputerName
        if (($pending -ieq "{{ target_vm_name }}") -or ($active -ieq "{{ target_vm_name }}")) {
          Write-Output ("RENAME_CONFIRMED:pending=" + $pending + ";active=" + $active)
          exit 0
        }
        Write-Output ("RENAME_NOT_CONFIRMED:pending=" + $pending + ";active=" + $active)
        exit 2
        PS
        az vm run-command invoke \
          --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
          --name "{{ azure_vm_name | default(target_vm_name) }}" \
          --command-id RunPowerShellScript \
          --scripts @"$script_file" \
          --query "value[0].message" -o tsv \
          --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
        rc=$?
        rm -f "$script_file"
        exit $rc
      delegate_to: localhost
      register: az_rename_result
      failed_when: false
      changed_when: az_rename_result.rc is defined and az_rename_result.rc == 0
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)

    - name: "Step 4 - Set az_rename_succeeded fact"
      ansible.builtin.set_fact:
        az_rename_succeeded: >-
          {{ (az_rename_result is defined
              and az_rename_result.rc | default(1) | int == 0
              and 'RENAME_CONFIRMED:' in (az_rename_result.stdout | default(''))
             ) | bool }}
      when: az_rename_result is defined

    - name: "Step 4 - Fail if rename not confirmed"
      ansible.builtin.fail:
        msg: |
          Hostname rename not confirmed for {{ item.name }} ({{ target_vm_name }}).
          Azure Run Command output: {{ az_rename_result.stdout | default('') | trim }}
          stderr: {{ az_rename_result.stderr | default('') | truncate(300) }}
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)
        - not (az_rename_succeeded | default(false))

    - name: "Step 4 - Restart VM via Azure CLI after rename"
      ansible.builtin.shell: >-
        az vm restart
        --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
        --name "{{ azure_vm_name | default(target_vm_name) }}"
        --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
        --no-wait
      delegate_to: localhost
      register: az_rename_restart_result
      failed_when: false
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)
        - az_rename_succeeded | default(false)

    - name: "Step 4 - Wait for VM to come back after rename reboot"
      ansible.builtin.wait_for:
        port: "{{ winrm_port }}"
        host: "{{ target_vm_host }}"
        delay: "{{ post_rename_reboot_settle_seconds | default(300) | int }}"
        timeout: 900
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)
        - az_rename_restart_result is defined
        - not (az_rename_restart_result.skipped | default(false) | bool)
        - az_rename_restart_result.rc | default(0) | int == 0

    - name: 'Step 4 - Verify hostname via WinRM (.\Administrator) after rename reboot'
      ansible.windows.win_shell: |
        (Get-CimInstance -ClassName Win32_ComputerSystem -Property Name).Name
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ winrm_transport }}"
        ansible_winrm_port: "{{ winrm_port }}"
        ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_winrm_read_timeout: 70
        ansible_user: ".\\{{ rename_winrm_username | default('Administrator') }}"
        ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"  # pragma: allowlist secret
      register: hostname_after_reboot
      retries: 6
      delay: 90
      until: hostname_after_reboot is succeeded
      when:
        - not (dry_run | default(false) | bool)
        - (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)
        - az_rename_restart_result is defined
        - not (az_rename_restart_result.skipped | default(false) | bool)
        - az_rename_restart_result.rc | default(0) | int == 0

    - name: "Step 4 - Fail if hostname did not change after reboot"
      ansible.builtin.fail:
        msg: |
          Hostname on {{ target_vm_host }} is still
          '{{ hostname_after_reboot.stdout | default('') | trim }}' after reboot;
          expected '{{ target_vm_name }}'.
      when:
        - not (dry_run | default(false) | bool)
        - hostname_after_reboot is defined
        - not (hostname_after_reboot.skipped | default(false) | bool)
        - (hostname_after_reboot.stdout | default('') | trim | upper) != (target_vm_name | upper)

    - name: 'Step 4 - Set formatted_winrm_username to .\Administrator after rename'
      ansible.builtin.set_fact:
        formatted_winrm_username: ".\\{{ rename_winrm_username | default('Administrator') }}"
      when: not (dry_run | default(false) | bool)

  when: not (skip_rename | default(false) | bool)

# ==============================================================================
# Completion
# ==============================================================================

- name: "Complete - {{ 'disjoin-and-rename' if not (skip_rename | default(false) | bool) else 'disjoin-only' }} for {{ item.name }}"
  ansible.builtin.debug:
    msg: >-
      {% if not (skip_rename | default(false) | bool) %}
      VM '{{ item.name }}' disjoined and renamed to '{{ target_vm_name }}'.
      Now in WORKGROUP. Ready for domain join.
      {% else %}
      VM '{{ item.name }}' disjoined to WORKGROUP.
      Hostname remains '{{ current_hostname_info.old_name | default('unknown') }}'.
      {% endif %}
  when: not (dry_run | default(false) | bool)

- name: "[DRY RUN] Preview for {{ item.name }}"
  ansible.builtin.debug:
    msg: |
      [DRY RUN] Would execute for {{ item.name }}:
        Step 2: Disjoin from '{{ current_domain_status.domain | default('WORKGROUP') }}' -> WORKGROUP (Azure Run Command)
      {% if not (skip_rename | default(false) | bool) %}
        Step 4: Rename '{{ current_hostname_info.old_name | default('unknown') }}' -> '{{ target_vm_name }}' (Azure Run Command)
      {% endif %}
      No changes were made.
  when: dry_run | default(false) | bool
