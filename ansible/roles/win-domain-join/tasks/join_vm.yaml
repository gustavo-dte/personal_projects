---
# Orchestrates prepare_winrm → pre-create → disjoin → rename → join → verify

- name: Prepare WinRM and validate connectivity
  ansible.builtin.include_tasks: prepare_winrm.yaml

# Intermediary facts to simplify domain migration workflow conditionals
- name: Set domain migration workflow conditions (intermediary facts)
  ansible.builtin.set_fact:
    force_rejoin_requested: "{{ force_rejoin | default(false) | bool }}"
    domain_differs_from_target: "{{ (current_domain_status.domain | default('')) != domain_name }}"
    hostname_differs_from_target: "{{ (current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper) }}"
    # needs_disjoin: run disjoin when in a domain (not WORKGROUP) that differs from target, or force_rejoin
    needs_disjoin: >-
      {{ (force_rejoin | default(false) | bool) or
         (((current_domain_status.domain | default('')) != domain_name) and
          ((current_domain_status.domain | default('')) not in ['', 'WORKGROUP'])) }}
    domain_migration_needed: >-
      {{ (force_rejoin | default(false) | bool) or
         ((current_domain_status.domain | default('')) != domain_name) or
         ((current_hostname_info.old_name | default('') | upper) != (target_vm_name | upper)) }}

- name: Pre-create AD computer object (when domain_ou_path is set and migration will run)
  ansible.builtin.include_tasks: pre_create_computer.yaml
  when:
    - (domain_ou_path | default('')) | trim | length > 0
    - domain_migration_needed | bool

- name: Domain migration workflow (Disjoin → Rename → Join)
  block:
    - name: Disjoin from current domain
      ansible.builtin.include_tasks: disjoin_domain.yaml
      when: needs_disjoin | default(false) | bool

    - name: Rename hostname to target
      ansible.builtin.include_tasks: rename_computer.yaml

    - name: Join to target domain
      ansible.builtin.include_tasks: join_domain.yaml

    - name: Verify domain membership
      ansible.builtin.include_tasks: verify_membership.yaml

    - name: Verify DNS reachability and force registration if needed
      ansible.builtin.include_tasks: verify_dns_reachability.yaml
  when:
    - domain_migration_needed | bool
    - not (dry_run | default(false) | bool)

- name: Dry run mode - show what would be done
  ansible.builtin.debug:
    msg: |
      [DRY RUN] Domain migration workflow for {{ target_vm_host }}:
      {% if force_rejoin_requested %}
      [WARN] Force rejoin is enabled - will disjoin and rejoin even if already in target domain
      {% endif %}
      {% if needs_disjoin %}
      Step 1: Would disjoin from {{ current_domain_status.domain | default('WORKGROUP') }} and move to WORKGROUP
      {% endif %}
      {% if hostname_differs_from_target %}
      Step 2: Would rename hostname from {{ current_hostname_info.old_name | default('UNKNOWN') }} to {{ target_vm_name }}
      {% endif %}
      {% if force_rejoin_requested or domain_differs_from_target %}
      Step 3: Would join to domain {{ domain_name }}
      - Computer Name: {{ target_vm_name }}
      - Domain OU: {{ domain_ou_path | default('Default OU') }}
      - Restart: {{ restart_on_success | bool }}
      {% endif %}
  when:
    - dry_run | default(false) | bool
    - domain_migration_needed | bool
