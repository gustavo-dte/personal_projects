---
# prepare_vm_state.yaml
#
# Responsibilities:
#   1. Resolve SE-Admin credentials (Delinea secret fetched once at pipeline start)
#   2. Ensure WinRM port 5985 is reachable; if not, enable via az vm extension set
#   3. Sync VM local secret via az vm user update (workgroup path only)
#   4. Determine WinRM user: SE-Admin (domain) or Administrator (workgroup fallback)
#   5. Read VM state (hostname + domain membership) via WinRM
#
# Auth routing:
#   force_rejoin=true                       → SE-Admin (domain-joined, SE-Admin exists)
#   force_rejoin=false + sync_secret=true   → sync Delinea → Administrator
#   force_rejoin=false + sync_secret=false  → try SE-Admin, fall back to Administrator
#
# Sets facts consumed by callers:
#   resolved_se_admin_username  - SE-Admin username string (from Delinea)
#   resolved_se_admin_password  - SE-Admin secret string (from Delinea, no_log)  # pragma: allowlist secret
#   resolved_winrm_username     - actual WinRM user (SE-Admin or Administrator)
#   _domain_netbios             - e.g. DTENET
#   _effective_winrm_user       - .\<resolved_winrm_username>
#   _effective_winrm_transport  - always ntlm
#   current_hostname_info       - {old_name: <hostname>}
#   current_domain_status       - {domain, part_of_domain, workgroup_name}
#   actual_vm_hostname          - OS hostname string

# ------------------------------------------------------------------------------
# Credential resolution
# ------------------------------------------------------------------------------

- name: "Resolve SE-Admin credentials for {{ target_vm_name }}"
  ansible.builtin.set_fact:
    resolved_se_admin_username: "{{ se_admin_username }}"
    resolved_se_admin_password: "{{ se_admin_password if (se_admin_password is defined and se_admin_password | string | length > 0) else '' }}"  # pragma: allowlist secret
    _domain_netbios: "{{ (manifest_data.domainNameSetup.domain | default('') | split('.') | first | upper) if manifest_data.domainNameSetup.domain is defined else 'DTENET' }}"
  no_log: true

- name: "Assert SE-Admin credentials are present for {{ target_vm_name }}"
  ansible.builtin.assert:
    that:
      - resolved_se_admin_username | length > 0
      - resolved_se_admin_password | length > 0  # pragma: allowlist secret
    fail_msg: >-
      SE-Admin secret missing for {{ target_vm_name }}.
      Expected env var: winrm_value_{{ target_vm_name | lower }}
      Set by resolve_delinea_secret_id.py before Ansible runs.
  when: not (dry_run | default(false) | bool)

- name: "[CREDENTIALS] Credential plan for {{ target_vm_name }}"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  CREDENTIAL PLAN: {{ target_vm_name }}
      +=============================================================+
      |  Connect IP      : {{ target_vm_host }}
      |  Delinea fetch   : ONCE at pipeline start - reused below
      |  Force rejoin    : {{ force_rejoin | default(false) }}
      |  Sync secret     : {{ sync_password | default(true) }}
      +-------------------------------------------------------------+
      |  Step 1 - WinRM port probe
      |    Method        : wait_for port {{ winrm_port | default(5985) }} (no creds)
      |    If closed     : az vm extension set CustomScriptExtension (async)
      +-------------------------------------------------------------+
      |  Step 1.5 - Auth routing
      |    force_rejoin=true  → SE-Admin (domain account still active)
      |    force_rejoin=false + sync_secret=true  → sync → .\Administrator
      |    force_rejoin=false + sync_secret=false → try SE-Admin, fallback .\Administrator
      +-------------------------------------------------------------+
      |  Step 2 - WinRM auth test + VM state probe
      |    Method        : WinRM
      |    SE-Admin user : {{ resolved_se_admin_username | string | length }} chars
      |    Secret src    : Delinea (single fetch, reused)
      |    Secret len    : {{ resolved_se_admin_password | string | length }} chars
      +-------------------------------------------------------------+
      |  Domain join
      |    WinRM user    : resolved at runtime (SE-Admin or Administrator)
      |    Join account  : {{ manifest_data.domainNameSetup.domain_admin_username | default('cpoe-automation@dtenet.com') }}
      |    Join secret   : DOMAIN_ADMIN_PASSWORD (GitHub Secret)
      +=============================================================+

# ------------------------------------------------------------------------------
# Dry-run / skip shortcut
# ------------------------------------------------------------------------------

- name: "Set placeholder facts (dry-run or skip_hostname_setup)"
  ansible.builtin.set_fact:
    current_domain_status:
      domain: "WORKGROUP"
      part_of_domain: false
      workgroup_name: "WORKGROUP"
    current_hostname_info:
      old_name: "{{ target_vm_name }}"
    actual_vm_hostname: "{{ target_vm_name }}"
    _winrm_already_open: false
    _effective_winrm_transport: "ntlm"
    resolved_winrm_username: "{{ resolved_se_admin_username }}"
    _effective_winrm_user: ".\\{{ resolved_se_admin_username }}"
  when: (dry_run | default(false) | bool) or (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 1: Probe WinRM port — short timeout, fail-safe
# ------------------------------------------------------------------------------

- name: "Probe WinRM port {{ winrm_port | default(5985) }} on {{ target_vm_host }}"
  ansible.builtin.wait_for:
    host: "{{ target_vm_host }}"
    port: "{{ winrm_port | default(5985) }}"
    delay: 0
    timeout: 15
    state: started
  register: _winrm_port_probe
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Set WinRM port open fact"
  ansible.builtin.set_fact:
    _winrm_already_open: "{{ _winrm_port_probe is succeeded }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 1b: Enable WinRM if port was closed
# ------------------------------------------------------------------------------

- name: "Enable WinRM via az vm extension set (port was closed)"
  ansible.builtin.shell: >-
    az vm extension set
    --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --vm-name "{{ target_vm_name }}"
    --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
    --name CustomScriptExtension
    --publisher Microsoft.Compute
    --version 1.10
    --settings
    "{\"commandToExecute\":\"powershell -ExecutionPolicy Unrestricted -NoProfile -Command
    \\\"$svc=Get-Service WinRM;if($svc.Status-ne'Running'){Start-Service WinRM};
    winrm quickconfig -quiet -force 2>$null;
    winrm set winrm/config/service '@{AllowUnencrypted=\\\\\\\"true\\\\\\\"}' 2>$null;
    winrm set winrm/config/service/auth '@{Basic=\\\\\\\"true\\\\\\\"}' 2>$null;
    winrm set winrm/config/service/auth '@{NTLM=\\\\\\\"true\\\\\\\"}' 2>$null;
    netsh advfirewall firewall add rule name=WinRM-HTTP dir=in action=allow protocol=TCP localport=5985 2>$null;
    Restart-Service WinRM -Force\\\"\"}"
    2>&1
  delegate_to: localhost
  register: _az_extension_result
  changed_when: _az_extension_result.rc | default(0) | int == 0
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (_winrm_already_open | default(false) | bool)

- name: "Fail if az vm extension set failed (WinRM could not be enabled)"
  ansible.builtin.fail:
    msg: >-
      az vm extension set failed for {{ target_vm_name }} (rc={{ _az_extension_result.rc }}).
      Verify the managed identity has VM Contributor on this VM.
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (_winrm_already_open | default(false) | bool)
    - _az_extension_result is defined
    - _az_extension_result.rc | default(0) | int != 0

- name: "Wait for WinRM port {{ winrm_port | default(5985) }} after enable"
  ansible.builtin.wait_for:
    host: "{{ target_vm_host }}"
    port: "{{ winrm_port | default(5985) }}"
    delay: 10
    timeout: 180
    state: started
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 1.5: Auth routing
#
# CASE A — force_rejoin=true: VM is domain-joined, SE-Admin exists
# CASE B — force_rejoin=false + sync_secret=true: workgroup, sync to Administrator
# CASE C — force_rejoin=false + sync_secret=false: workgroup, try SE-Admin first
# ------------------------------------------------------------------------------

# CASE A
- name: "Step 1.5 - [CASE A] Use SE-Admin (force_rejoin — VM is domain-joined)"
  ansible.builtin.set_fact:
    resolved_winrm_username: "{{ resolved_se_admin_username }}"
    _effective_winrm_user: ".\\{{ resolved_se_admin_username }}"
    _effective_winrm_transport: "ntlm"
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - force_rejoin | default(false) | bool

# CASE B
- name: "Step 1.5 - [CASE B] Sync Delinea secret onto .\\Administrator (workgroup + sync)"
  ansible.builtin.shell: |
    az vm user update \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ azure_vm_name | default(target_vm_name) }}" \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
      --username "Administrator" \
      --password "{{ resolved_se_admin_password }}"  # pragma: allowlist secret
  delegate_to: localhost
  register: sync_result
  failed_when: sync_result.rc != 0
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - sync_password | default(true) | bool

- name: "Step 1.5 - [CASE B] Set WinRM user to Administrator (workgroup + sync)"
  ansible.builtin.set_fact:
    resolved_winrm_username: "Administrator"
    _effective_winrm_user: ".\\Administrator"
    _effective_winrm_transport: "ntlm"
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - sync_password | default(true) | bool

- name: "Step 1.5 - [CASE B] Display secret sync result"
  ansible.builtin.debug:
    msg: |
      +=============================================================+
      |  SECRET SYNC → .\Administrator
      +=============================================================+
      |  VM               : {{ target_vm_name }}
      |  Resource Group   : {{ azure_resource_group | default(manifest_data.target_resource_group) }}
      |  Synced onto      : .\Administrator
      |  Secret src       : Delinea (SE-Admin token, {{ resolved_se_admin_password | string | length }} chars)
      |  WinRM user       : .\Administrator
      +=============================================================+
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - sync_password | default(true) | bool
    - sync_result is defined
    - not (sync_result.skipped | default(false) | bool)

- name: "Step 1.5 - [CASE B] Wait for Azure VM Agent to apply secret to SAM"
  ansible.builtin.pause:
    seconds: 90
    prompt: "Waiting for Azure VM Agent to apply Administrator secret..."
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - sync_password | default(true) | bool
    - sync_result is defined
    - not (sync_result.skipped | default(false) | bool)

# CASE C
- name: "Step 1.5 - [CASE C] Try SE-Admin WinRM connection (sync disabled)"
  ansible.windows.win_shell: "echo ok"
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"  # pragma: allowlist secret
  register: _seadmin_probe
  failed_when: false
  ignore_unreachable: true
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - not (sync_password | default(true) | bool)

- name: "Step 1.5 - [CASE C] SE-Admin succeeded — use SE-Admin"
  ansible.builtin.set_fact:
    resolved_winrm_username: "{{ resolved_se_admin_username }}"
    _effective_winrm_user: ".\\{{ resolved_se_admin_username }}"
    _effective_winrm_transport: "ntlm"
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - not (sync_password | default(true) | bool)
    - _seadmin_probe is defined
    - _seadmin_probe is succeeded

- name: "Step 1.5 - [CASE C] SE-Admin failed — sync Delinea secret onto Administrator (fallback)"
  ansible.builtin.shell: |
    az vm user update \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ azure_vm_name | default(target_vm_name) }}" \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" \
      --username "Administrator" \
      --password "{{ resolved_se_admin_password }}"  # pragma: allowlist secret
  delegate_to: localhost
  register: _admin_fallback_sync
  failed_when: _admin_fallback_sync.rc != 0
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - not (sync_password | default(true) | bool)
    - _seadmin_probe is defined
    - (_seadmin_probe is failed or _seadmin_probe is unreachable)

- name: "Step 1.5 - [CASE C] Set WinRM user to Administrator (fallback after SE-Admin failed)"
  ansible.builtin.set_fact:
    resolved_winrm_username: "Administrator"
    _effective_winrm_user: ".\\Administrator"
    _effective_winrm_transport: "ntlm"
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - not (sync_password | default(true) | bool)
    - _seadmin_probe is defined
    - (_seadmin_probe is failed or _seadmin_probe is unreachable)

- name: "Step 1.5 - [CASE C] Wait for Administrator secret propagation (fallback)"
  ansible.builtin.pause:
    seconds: 90
    prompt: "SE-Admin failed — waiting for Administrator secret to propagate..."
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)
    - not (sync_password | default(true) | bool)
    - _seadmin_probe is defined
    - (_seadmin_probe is failed or _seadmin_probe is unreachable)
    - _admin_fallback_sync is defined
    - not (_admin_fallback_sync.skipped | default(false) | bool)

- name: "Step 1.5 - Display resolved WinRM user"
  ansible.builtin.debug:
    msg: |
      +-------------------------------------------------------------+
      |  RESOLVED WinRM USER: .\{{ resolved_winrm_username | default('unknown') }}
      |  VM               : {{ target_vm_name }}
      |  Connect IP       : {{ target_vm_host }}
      |  Secret len       : {{ resolved_se_admin_password | string | length }} chars
      +-------------------------------------------------------------+
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 2: VM state
# force_rejoin: read actual domain state via WinRM using SE-Admin
# workgroup path: inject placeholder facts
# ------------------------------------------------------------------------------

- name: "Step 2 - Read actual VM state via WinRM (force_rejoin — domain-joined)"
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem `
            -Property Name, Domain, PartOfDomain, Workgroup
    $domain = if ($cs.PartOfDomain) {
      try   { [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name }
      catch { $cs.Domain }
    } else { $null }
    @{
      hostname       = $cs.Name
      domain         = if ($domain) { $domain } else { 'WORKGROUP' }
      part_of_domain = [bool]$cs.PartOfDomain
      workgroup_name = if ($cs.Workgroup) { $cs.Workgroup } else { 'WORKGROUP' }
    } | ConvertTo-Json -Compress
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_user: ".\\{{ hostvars['localhost']['resolved_se_admin_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_se_admin_password'] }}"  # pragma: allowlist secret
  register: _vm_state_result
  retries: 3
  delay: 15
  until: _vm_state_result is succeeded
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - force_rejoin | default(false) | bool

- name: "Step 2 - Parse VM state facts (force_rejoin)"
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ (_vm_state_result.stdout | trim | from_json).hostname }}"
    current_hostname_info:
      old_name: "{{ (_vm_state_result.stdout | trim | from_json).hostname }}"
    current_domain_status:
      domain: "{{ (_vm_state_result.stdout | trim | from_json).domain }}"
      part_of_domain: "{{ (_vm_state_result.stdout | trim | from_json).part_of_domain }}"
      workgroup_name: "{{ (_vm_state_result.stdout | trim | from_json).workgroup_name | default('WORKGROUP') }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - force_rejoin | default(false) | bool
    - _vm_state_result is defined
    - _vm_state_result is succeeded
    - _vm_state_result.stdout | default('') | trim | length > 0

- name: "Step 2 - Set workgroup placeholder facts (non-force_rejoin path)"
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ target_vm_name }}"
    current_hostname_info:
      old_name: "{{ target_vm_name }}"
    current_domain_status:
      domain: "WORKGROUP"
      part_of_domain: false
      workgroup_name: "WORKGROUP"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (force_rejoin | default(false) | bool)

- name: "Step 2 - Display VM state"
  ansible.builtin.debug:
    msg: |
      +-------------------------------------------------------------+
      |  VM STATE
      |   Azure resource  : {{ target_vm_name }}
      |   OS hostname     : {{ actual_vm_hostname | default('unknown') }}
      |   Domain          : {{ current_domain_status.domain | default('unknown') }}
      |   Part of domain  : {{ current_domain_status.part_of_domain | default('unknown') }}
      |   Connect IP      : {{ target_vm_host }}
      |   WinRM user      : .\{{ resolved_winrm_username | default('unknown') }}
      +-------------------------------------------------------------+
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)