---
# prepare_vm_state.yaml
#
# Responsibilities:
#   1. Resolve SE-Admin credentials (Delinea password fetched once at pipeline start)
#   2. Ensure WinRM port 5985 is reachable; if not, enable via az vm extension set
#   3. Sync VM local password via az vm user update (rotation protection)
#   4. Probe WinRM with domain NTLM first, then local NTLM (VM may or may not be joined)
#   5. Read VM state (hostname + domain membership) via WinRM
#
# Sets facts consumed by callers:
#   resolved_se_admin_username   - username string
#   resolved_se_admin_password   - password string (no_log throughout)
#   _domain_netbios              - e.g. DTENET
#   _effective_winrm_user        - DTENET\se-admin or .\se-admin (whichever authenticated)
#   _effective_winrm_transport   - always ntlm
#   current_hostname_info        - {old_name: <hostname>}
#   current_domain_status        - {domain, part_of_domain, workgroup_name}
#   actual_vm_hostname           - OS hostname string

# ------------------------------------------------------------------------------
# Credential resolution
# ------------------------------------------------------------------------------

- name: "Resolve SE-Admin credentials for {{ target_vm_name }}"
  ansible.builtin.set_fact:
    resolved_se_admin_username: >-
      {{ se_admin_username
         if (se_admin_username is defined and se_admin_username | string | length > 0)
         else 'SE-Admin' }}
    resolved_se_admin_password: >-
      {{ se_admin_password
         if (se_admin_password is defined and se_admin_password | string | length > 0)
         else '' }}
    _domain_netbios: >-
      {{ (manifest_data.domainNameSetup.domain | default('') | split('.') | first | upper)
         if manifest_data.domainNameSetup.domain is defined
         else 'DTENET' }}
  no_log: true

- name: "Assert SE-Admin credentials are present for {{ target_vm_name }}"
  ansible.builtin.assert:
    that:
      - resolved_se_admin_username | length > 0
      - resolved_se_admin_password | length > 0
    fail_msg: >-
      SE-Admin password missing for {{ target_vm_name }}.
      Expected env var: winrm_value_{{ target_vm_name | lower }}
      Set by resolve_delinea_secret_id.py before Ansible runs.
  when: not (dry_run | default(false) | bool)

# ------------------------------------------------------------------------------
# Dry-run / skip shortcut
# ------------------------------------------------------------------------------

- name: "Set placeholder facts (dry-run or skip_hostname_setup)"
  ansible.builtin.set_fact:
    current_domain_status:
      domain: "WORKGROUP"
      part_of_domain: false
      workgroup_name: "WORKGROUP"
    current_hostname_info:
      old_name: "{{ target_vm_name }}"
    actual_vm_hostname: "{{ target_vm_name }}"
    _winrm_already_open: false
    _effective_winrm_transport: "ntlm"
    _effective_winrm_user: ".\\{{ resolved_se_admin_username }}"
  when: (dry_run | default(false) | bool) or (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 1: Probe WinRM port — short timeout, fail-safe
# ------------------------------------------------------------------------------

- name: "Probe WinRM port {{ winrm_port | default(5985) }} on {{ target_vm_host }}"
  ansible.builtin.wait_for:
    host: "{{ target_vm_host }}"
    port: "{{ winrm_port | default(5985) }}"
    delay: 0
    timeout: 15
    state: started
  register: _winrm_port_probe
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Set WinRM port open fact"
  ansible.builtin.set_fact:
    _winrm_already_open: "{{ _winrm_port_probe is succeeded }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 1b: Enable WinRM if port was closed
# ------------------------------------------------------------------------------

- name: "Enable WinRM via az vm extension set (port was closed)"
  ansible.builtin.shell: >-
    az vm extension set
    --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --vm-name "{{ target_vm_name }}"
    --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
    --name CustomScriptExtension
    --publisher Microsoft.Compute
    --version 1.10
    --settings
    "{\"commandToExecute\":\"powershell -ExecutionPolicy Unrestricted -NoProfile -Command
    \\\"$svc=Get-Service WinRM;if($svc.Status-ne'Running'){Start-Service WinRM};
    winrm quickconfig -quiet -force 2>$null;
    winrm set winrm/config/service '@{AllowUnencrypted=\\\\\\\"true\\\\\\\"}' 2>$null;
    winrm set winrm/config/service/auth '@{Basic=\\\\\\\"true\\\\\\\"}' 2>$null;
    winrm set winrm/config/service/auth '@{NTLM=\\\\\\\"true\\\\\\\"}' 2>$null;
    netsh advfirewall firewall add rule name=WinRM-HTTP dir=in action=allow protocol=TCP localport=5985 2>$null;
    Restart-Service WinRM -Force\\\"\"}"
    2>&1
  delegate_to: localhost
  register: _az_extension_result
  changed_when: _az_extension_result.rc | default(0) | int == 0
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (_winrm_already_open | default(false) | bool)

- name: "Fail if az vm extension set failed (WinRM could not be enabled)"
  ansible.builtin.fail:
    msg: >-
      az vm extension set failed for {{ target_vm_name }} (rc={{ _az_extension_result.rc }}).
      Verify the managed identity has VM Contributor on this VM.
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (_winrm_already_open | default(false) | bool)
    - _az_extension_result is defined
    - _az_extension_result.rc | default(0) | int != 0

- name: "Wait for WinRM port {{ winrm_port | default(5985) }} after enable"
  ansible.builtin.wait_for:
    host: "{{ target_vm_host }}"
    port: "{{ winrm_port | default(5985) }}"
    delay: 10
    timeout: 180
    state: started
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 1.5: Pre-flight WinRM probe (existing password — before any sync)
# If this succeeds, skip az vm user update entirely to avoid overwriting a
# working password with a potentially wrong Delinea value.
# ------------------------------------------------------------------------------

- name: "Pre-flight WinRM probe (existing password, before sync)"
  ansible.windows.win_shell: echo ok
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_user: ".\\{{ resolved_se_admin_username | default(se_admin_username | default('SE-Admin')) }}"
    ansible_password: "{{ resolved_se_admin_password | default(se_admin_password | default('')) }}"
  register: _winrm_preflight_probe
  failed_when: false
  ignore_unreachable: true
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Set pre-flight auth success fact"
  ansible.builtin.set_fact:
    _preflight_auth_ok: >-
      {{ (_winrm_preflight_probe.rc | default(1) | int == 0)
         and not (_winrm_preflight_probe.unreachable | default(true) | bool) }}
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 1.6: Sync local SE-Admin password via az vm user update (rotation protection)
# Only runs if pre-flight probe failed — avoids overwriting a working password.
# ------------------------------------------------------------------------------

- name: "Sync local SE-Admin password via az vm user update"
  ansible.builtin.shell: >-
    az vm user update
    --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}"
    --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
    --username "{{ resolved_se_admin_username }}"
    --password "{{ resolved_se_admin_password }}"
    2>&1
  delegate_to: localhost
  register: _az_user_update
  failed_when: _az_user_update.rc | default(0) | int != 0
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (_preflight_auth_ok | default(false) | bool)

- name: "Wait for VMAccess extension to apply password sync"
  ansible.builtin.pause:
    seconds: 120
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - not (_preflight_auth_ok | default(false) | bool)
    - _az_user_update is defined
    - not (_az_user_update.skipped | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 2: WinRM authentication probe
# Probe domain NTLM first; fall back to local NTLM.
# ------------------------------------------------------------------------------

# - name: "WinRM probe — domain NTLM ({{ _domain_netbios }}\\{{ resolved_se_admin_username }})"
#   ansible.windows.win_shell: echo ok
#   delegate_to: "{{ target_vm_host }}"
#   vars:
#     ansible_connection: winrm
#     ansible_winrm_transport: ntlm
#     ansible_winrm_port: "{{ winrm_port | default(5985) }}"
#     ansible_winrm_scheme: http
#     ansible_winrm_server_cert_validation: ignore
#     ansible_winrm_connection_timeout: 30
#     ansible_user: "{{ _domain_netbios }}\\{{ resolved_se_admin_username }}"
#     ansible_password: "{{ resolved_se_admin_password }}"
#   register: _winrm_domain_probe
#   failed_when: false
#   ignore_unreachable: true
#   no_log: true
#   when:
#     - not (dry_run | default(false) | bool)
#     - not (skip_hostname_setup | default(false) | bool)

- name: "WinRM probe — local NTLM (.\\{{ resolved_se_admin_username | default('se-admin') }})"
  ansible.windows.win_shell: echo ok
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_user: ".\\{{ resolved_se_admin_username | default('se_admin_username') }}"
    ansible_password: "{{ resolved_se_admin_password | default('se_admin_password') }}"
  register: _winrm_local_probe
  retries: 3
  delay: 30
  until: >-
    (_winrm_local_probe.rc | default(1) | int == 0)
    or not (_winrm_local_probe.unreachable | default(false) | bool)
  failed_when: false
  ignore_unreachable: true
  no_log: false
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Set effective WinRM user"
  ansible.builtin.set_fact:
    _effective_winrm_transport: "ntlm"
    _effective_winrm_user: >-
      {{ (_domain_netbios + '\\' + resolved_se_admin_username)
         if (_winrm_domain_probe is defined
             and _winrm_domain_probe.rc | default(1) | int == 0
             and not (_winrm_domain_probe.unreachable | default(false) | bool))
         else ('.' + '\\' + resolved_se_admin_username) }}
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Fail if both domain and local WinRM auth rejected"
  ansible.builtin.fail:
    msg: >-
      WinRM authentication failed for {{ target_vm_name }} ({{ target_vm_host }}).
      Domain probe ({{ _domain_netbios }}\{{ resolved_se_admin_username }}): {{ _winrm_domain_probe.msg | default('no detail') }}
      Local probe  (.\{{ resolved_se_admin_username }}): {{ _winrm_local_probe.msg | default('no detail') }}
      Check az vm user update output and Delinea secret for this VM.
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - _winrm_domain_probe is defined
    - _winrm_local_probe is defined
    - (_winrm_domain_probe.rc | default(1) | int != 0) or (_winrm_domain_probe.unreachable | default(false) | bool)
    - (_winrm_local_probe.rc | default(1) | int != 0) or (_winrm_local_probe.unreachable | default(false) | bool)

# ------------------------------------------------------------------------------
# Step 3: Read VM state via WinRM
# ------------------------------------------------------------------------------

- name: "Read VM state via WinRM ({{ _effective_winrm_user | default('se-admin') }})"
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem `
            -Property Name, Domain, PartOfDomain, Workgroup
    $domain = if ($cs.PartOfDomain) {
      try   { [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name }
      catch { $cs.Domain }
    } else { $null }
    @{
      hostname       = $cs.Name
      domain         = if ($domain) { $domain } else { 'WORKGROUP' }
      part_of_domain = [bool]$cs.PartOfDomain
      workgroup_name = if ($cs.Workgroup) { $cs.Workgroup } else { 'WORKGROUP' }
    } | ConvertTo-Json -Compress
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ _effective_winrm_transport | default('ntlm') }}"
    ansible_winrm_port: "{{ winrm_port | default(5985) }}"
    ansible_winrm_scheme: http
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_user: ".\\{{ resolved_se_admin_username }}"
    ansible_password: "{{ resolved_se_admin_password }}"
  register: _vm_state_result
  retries: 3
  delay: 15
  until: _vm_state_result is succeeded
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)

- name: "Fail if VM state read failed"
  ansible.builtin.fail:
    msg: >-
      WinRM state read failed for {{ target_vm_name }} ({{ target_vm_host }}).
      User: {{ _effective_winrm_user | default('unknown') }}
      Error: {{ _vm_state_result.msg | default(_vm_state_result.stderr | default('unknown')) }}
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - _vm_state_result is defined
    - _vm_state_result is failed

- name: "Parse and set VM state facts"
  ansible.builtin.set_fact:
    actual_vm_hostname: "{{ (_vm_state_result.stdout | trim | from_json).hostname }}"
    current_hostname_info:
      old_name: "{{ (_vm_state_result.stdout | trim | from_json).hostname }}"
    current_domain_status:
      domain: "{{ (_vm_state_result.stdout | trim | from_json).domain }}"
      part_of_domain: "{{ (_vm_state_result.stdout | trim | from_json).part_of_domain }}"
      workgroup_name: "{{ (_vm_state_result.stdout | trim | from_json).workgroup_name | default('WORKGROUP') }}"
  when:
    - not (dry_run | default(false) | bool)
    - not (skip_hostname_setup | default(false) | bool)
    - _vm_state_result is defined
    - _vm_state_result is succeeded
    - _vm_state_result.stdout | default('') | trim | length > 0
