---
- name: Ensure local SE-Admin exists before disjoin (Azure Run Command)
  ansible.builtin.shell: >-
    B64_PW=$(printf '%s' '{{ winrm_password | b64encode }}');
    SCRIPT_PATH="{{ role_path }}/files/recover_winrm.ps1";
    test -f "$SCRIPT_PATH" || { echo "ERROR: script not found at $SCRIPT_PATH"; exit 1; };
    timeout 120 az vm run-command invoke \
      --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}" \
      --name "{{ target_vm_name }}" \
      --command-id RunPowerShellScript \
      --scripts @"$SCRIPT_PATH" \
      --parameters "Username={{ winrm_username }}" "B64Password=$B64_PW" \
      --query "value[0].message" -o tsv \
      --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}"
  delegate_to: localhost
  register: pre_disjoin_recover_winrm_result
  failed_when: false
  changed_when: pre_disjoin_recover_winrm_result.rc is defined and pre_disjoin_recover_winrm_result.rc == 0
  no_log: "{{ not (debug_mode | default(false)) }}"
  retries: 1
  delay: 30
  until: pre_disjoin_recover_winrm_result.rc is defined and pre_disjoin_recover_winrm_result.rc == 0
  when:
    - not (dry_run | default(false) | bool)
    - needs_disjoin | default(false) | bool

- name: "Display domain migration workflow plan"
  ansible.builtin.debug:
    msg: |
      Domain migration workflow for {{ target_vm_name }} ({{ target_vm_host }}): Disjoin → Rename → Join
      Current state: hostname={{ current_hostname_info.old_name | default('unknown') }}
      Plan:
      - Step 1 (Disjoin): always attempted [SE-Admin local admin]
      - Step 2 (Rename): {{ 'run' if (hostname_differs_from_target | bool) else 'skip' }}{% if not (hostname_differs_from_target | bool) %} (hostname already {{ target_vm_name }}){% endif %}
  when: not (dry_run | default(false) | bool)

- name: Ensure Windows Firewall (Public and Private) off when VM is already in WORKGROUP
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Public, Private -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: firewall_off_result
  failed_when: false
  changed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status is defined
    - not (current_domain_status.part_of_domain | default(false))

- name: "Fallback: Ensure Windows Firewall off with administrator if SE-Admin fails"
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Public, Private -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ target_vm_name + '\\administrator' }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: firewall_off_result_admin
  failed_when: false
  changed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - current_domain_status is defined
    - not (current_domain_status.part_of_domain | default(false))
    - firewall_off_result is failed or firewall_off_result.unreachable | default(false) | bool

- name: "Step 1: Disjoin from current domain (move to workgroup)"
  block:
    - name: "Step 1: Disjoin from current domain (SE-Admin: WMI local-only then Remove-Computer)"
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $succeeded = $false
        $methods = @()
        try {
          $cs = Get-WmiObject Win32_ComputerSystem
          $rv = $cs.UnjoinDomainOrWorkgroup($null, $null, 0)
          if ($rv.ReturnValue -eq 0) {
            $succeeded = $true
            Write-Output 'DISJOIN_OK:WMI-LocalOnly'
          } else {
            $methods += "WMI(local-only): ReturnValue=$($rv.ReturnValue)"
          }
        }
        catch {
          $methods += "WMI(local-only): $($_.Exception.Message)"
        }
        if (-not $succeeded) {
          try {
            Remove-Computer -WorkgroupName 'WORKGROUP' -Force -ErrorAction Stop
            $succeeded = $true
            Write-Output 'DISJOIN_OK:Remove-Computer'
          }
          catch {
            $methods += "Remove-Computer: $($_.Exception.Message)"
          }
        }
        if (-not $succeeded) {
          Write-Error "All disjoin methods failed: $($methods -join ' | ')"
          exit 1
        }
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ winrm_transport }}"
        ansible_winrm_port: "{{ winrm_port }}"
        ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_winrm_read_timeout: 70
        ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
        ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
      register: domain_disjoin_result
      no_log: true
      when:
        - not (dry_run | default(false) | bool)
        - (current_domain_status.domain | default('')) != ''
        - (current_domain_status.domain | default('')) != 'WORKGROUP'
        - (force_rejoin | default(false) | bool or (current_domain_status.domain | default('')) != domain_name or (hostname_differs_from_target | default(false) | bool))

    - name: "Step 1: Display disjoin method used"
      ansible.builtin.debug:
        msg: "Disjoin succeeded via: {{ domain_disjoin_result.stdout_lines | default(['unknown']) | last }}"
      when:
        - domain_disjoin_result is defined
        - domain_disjoin_result is not skipped
        - (domain_disjoin_result.rc | default(1) | int) == 0
  when:
    - not (dry_run | default(false) | bool)
    - needs_disjoin | default(false) | bool
  rescue:
    - name: Fail with disjoin error details
      ansible.builtin.fail:
        msg: |
          [FAIL] All disjoin methods failed for {{ target_vm_name }}.
          WinRM session: SE-Admin (local admin). No domain credentials used.
          Methods attempted:
            1. WMI UnjoinDomainOrWorkgroup flag 0 (local-only, no DC contact)
            2. Remove-Computer -Force (may require DC contact)
          Error output: {{ domain_disjoin_result.stderr | default(domain_disjoin_result.msg) | default('Unknown') }}
          Fix: Ensure SE-Admin is in the local Administrators group on the VM, or unjoin manually.

- name: Verify domain status after disjoin
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain, Workgroup
    $domain = 'WORKGROUP'
    if ($cs.PartOfDomain) {
      try {
        $domain = [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name
      }
      catch {
        $domain = $cs.Domain
      }
    }
    $result = @{
      domain         = $domain
      part_of_domain = [bool]$cs.PartOfDomain
      workgroup_name = $cs.Workgroup
    }
    $result | ConvertTo-Json
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: domain_status_after_disjoin
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)

- name: Fail when still in domain after disjoin
  ansible.builtin.fail:
    msg: |
      [FAIL] Disjoin did not succeed: the computer is still in domain ({{ (domain_status_after_disjoin.stdout | from_json).domain | default('unknown') }}).
      PartOfDomain={{ (domain_status_after_disjoin.stdout | from_json).part_of_domain | default('unknown') }}.
      Fix the secure channel (reset computer account in AD, run Test-ComputerSecureChannel -Repair on the VM), then re-run. Verify with: (Get-CimInstance Win32_ComputerSystem).PartOfDomain
  when:
    - not (dry_run | default(false) | bool)
    - domain_status_after_disjoin is defined
    - not (domain_status_after_disjoin.skipped | default(false) | bool)
    - domain_status_after_disjoin.stdout is defined
    - (domain_status_after_disjoin.stdout | from_json).part_of_domain | default(false) | bool or
      ((domain_status_after_disjoin.stdout | from_json).domain | default('')) != 'WORKGROUP'

- name: Verify Azure CLI can access VM (pre-disjoin reboot)
  ansible.builtin.shell: >-
    az vm show --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}" --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" --query id -o tsv
  delegate_to: localhost
  register: az_vm_access_check_disjoin
  changed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - use_azure_restart | default(true) | bool

- name: Fail when Azure CLI cannot access VM (pre-disjoin reboot)
  ansible.builtin.fail:
    msg: |
      [FAIL] Azure CLI cannot access VM {{ target_vm_name }} (pre-disjoin reboot). Runner may lack Azure auth or VM Contributor/restart permissions.
      Resource group: {{ azure_resource_group | default(manifest_data.target_resource_group) }}
      Error: {{ az_vm_access_check_disjoin.stderr | default(az_vm_access_check_disjoin.msg) | default('Unknown') | truncate(300) }}
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - use_azure_restart | default(true) | bool
    - az_vm_access_check_disjoin is defined
    - az_vm_access_check_disjoin.rc | default(-1) != 0

- name: Restart VM via Azure CLI after disjoin (primary)
  ansible.builtin.shell: >-
    az vm restart --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}" --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" --no-wait
  delegate_to: localhost
  register: az_restart_disjoin_result
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - use_azure_restart | default(true) | bool

- name: Set fact az_disjoin_restart_succeeded
  ansible.builtin.set_fact:
    az_disjoin_restart_succeeded: "{{ (az_restart_disjoin_result is defined and (az_restart_disjoin_result.rc is defined and az_restart_disjoin_result.rc == 0)) | bool }}"
  when:
    - use_azure_restart | default(true) | bool

- name: Restart via WinRM after disjoin (fallback when Azure skipped or failed)
  ansible.windows.win_reboot:
    reboot_timeout: 600
    pre_reboot_delay: 30
    post_reboot_delay: 30
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: reboot_after_disjoin
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - not (az_disjoin_restart_succeeded | default(false))

- name: Set fact winrm_disjoin_reboot_succeeded
  ansible.builtin.set_fact:
    winrm_disjoin_reboot_succeeded: "{{ (reboot_after_disjoin is defined and (reboot_after_disjoin.rebooted | default(false))) | bool }}"
  when:
    - reboot_after_disjoin is defined

- name: Warn if disjoin reboot failed (neither Azure nor WinRM succeeded)
  ansible.builtin.debug:
    msg: |
      [WARN] Reboot after disjoin failed. VM may be in inconsistent state.
      Reboot {{ target_vm_host }} manually, then re-run this playbook.
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - >-
      not (
        (az_disjoin_restart_succeeded | default(false)) or
        (winrm_disjoin_reboot_succeeded | default(false))
      )

- name: Wait for server after disjoin reboot
  ansible.builtin.wait_for:
    port: "{{ winrm_port }}"
    host: "{{ target_vm_host }}"
    delay: 60
    timeout: 600
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - >-
      (az_disjoin_restart_succeeded | default(false)) or
      (winrm_disjoin_reboot_succeeded | default(false))
