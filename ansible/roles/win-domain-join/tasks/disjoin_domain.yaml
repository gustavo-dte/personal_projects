---
# Domain disjoin logic: move VM from current domain to WORKGROUP
# Includes verify, reboot, wait, and firewall adjustments after disjoin

- name: "Display domain migration workflow plan"
  ansible.builtin.debug:
    msg: |
      Domain migration workflow for {{ target_vm_name }} ({{ target_vm_host }}): Disjoin → Rename → Join
      Current state: domain={{ current_domain_status.domain | default('WORKGROUP') }}, hostname={{ current_hostname_info.old_name | default('unknown') }}
      Plan:
      - Step 1 (Disjoin): {{ 'run' if (needs_disjoin | bool) else 'skip' }}{% if not (needs_disjoin | bool) %} (already in WORKGROUP/target domain){% endif %} [uses SE-Admin local admin]
      - Step 2 (Rename): {{ 'run' if (hostname_differs_from_target | bool) else 'skip' }}{% if not (hostname_differs_from_target | bool) %} (hostname already {{ target_vm_name }}){% endif %}
      - Step 3 (Join): run → {{ domain_name }}
  when: not (dry_run | default(false) | bool)

# When VM is already in WORKGROUP, ensure firewall (Public and Private) is off before rename/join.
- name: Ensure Windows Firewall (Public and Private) off when VM is already in WORKGROUP
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Public, Private -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  when:
    - not (dry_run | default(false) | bool)
    - (current_domain_status.domain | default('')) == 'WORKGROUP'

- name: "Step 1: Disjoin — skipped (not in a domain or already in target domain)"
  ansible.builtin.debug:
    msg: |
      Step 1: Disjoin — skipped.
      Reason: {{ 'already in WORKGROUP or no domain' if ((current_domain_status.domain | default('')) == '' or (current_domain_status.domain | default('')) == 'WORKGROUP') else 'already in target domain ' ~ domain_name ~ ' (set force_rejoin to disjoin anyway)' }}
  when:
    - not (dry_run | default(false) | bool)
    - (current_domain_status.domain | default('')) == '' or (current_domain_status.domain | default('')) == 'WORKGROUP' or
      ((current_domain_status.domain | default('')) == domain_name and not (force_rejoin | default(false) | bool))

# Disjoin uses SE-Admin (local admin) — no domain credentials needed.
# Remove-Computer -Force works as local admin to leave the domain.
- name: "Step 1: Pre-check disjoin permission with SE-Admin (no changes)"
  ansible.windows.win_shell: |
    try {
      Remove-Computer -WorkgroupName "WORKGROUP" -Force -WhatIf -ErrorAction Stop | Out-Null
      Write-Output "OK"
    }
    catch {
      Write-Output ($_.Exception.Message)
      exit 1
    }
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: disjoin_permission_precheck
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - not (dry_run | default(false) | bool)
    - (current_domain_status.domain | default('')) != ''
    - (current_domain_status.domain | default('')) != 'WORKGROUP'
    - (force_rejoin | default(false) | bool or (current_domain_status.domain | default('')) != domain_name)

- name: Fail early when SE-Admin cannot perform disjoin pre-check
  ansible.builtin.fail:
    msg: |
      ❌ Pre-check failed: SE-Admin (local admin) cannot perform disjoin for {{ target_vm_name }}.
      Ensure SE-Admin has local administrator rights on the VM.
      Pre-check error: {{ disjoin_permission_precheck.stdout | default(disjoin_permission_precheck.msg) | default('Unknown') }}
  when:
    - not (dry_run | default(false) | bool)
    - disjoin_permission_precheck is defined
    - (disjoin_permission_precheck.rc | default(0) | int) != 0

# Disjoin using SE-Admin (local admin) with Remove-Computer -Force
- name: "Step 1: Disjoin from current domain (move to workgroup)"
  block:
    - name: "Step 1: Disjoin from current domain via Remove-Computer -Force (SE-Admin)"
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        Remove-Computer -WorkgroupName "WORKGROUP" -Force -ErrorAction Stop
        Write-Output "DISJOIN_OK"
      delegate_to: "{{ target_vm_host }}"
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: "{{ winrm_transport }}"
        ansible_winrm_port: "{{ winrm_port }}"
        ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
        ansible_winrm_server_cert_validation: ignore
        ansible_winrm_connection_timeout: 60
        ansible_winrm_read_timeout: 70
        ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
        ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
      register: domain_disjoin_result
      no_log: true
      when:
        - not (dry_run | default(false) | bool)
        - (current_domain_status.domain | default('')) != ''
        - (current_domain_status.domain | default('')) != 'WORKGROUP'
        - (force_rejoin | default(false) | bool or (current_domain_status.domain | default('')) != domain_name)
  rescue:
    - name: Fail with guidance when disjoin failed with Access is denied
      ansible.builtin.fail:
        msg: |
          ❌ Disjoin failed for {{ target_vm_name }}: Access is denied.
          SE-Admin (local admin) was denied permission to leave the domain.
          Ensure SE-Admin is in the local Administrators group on the VM.
          Original error: {{ domain_disjoin_result.stderr | default(domain_disjoin_result.msg) | default('Unknown') }}
      when: "'access is denied' in ((domain_disjoin_result.stderr | default(domain_disjoin_result.msg) | default('')) | string | lower)"

    - name: Fail when domain disjoin failed (other errors)
      ansible.builtin.fail:
        msg: "Disjoin failed for {{ target_vm_name }}: {{ domain_disjoin_result.stderr | default(domain_disjoin_result.msg) | default('Unknown error') | string }}"
      when: "'access is denied' not in ((domain_disjoin_result.stderr | default(domain_disjoin_result.msg) | default('')) | string | lower)"

    - name: Fail when domain disjoin failed (catch-all)
      ansible.builtin.fail:
        msg: "Disjoin failed for {{ target_vm_name }}: {{ domain_disjoin_result.stderr | default(domain_disjoin_result.msg) | default('Unknown error') | string }}"

# Verify disjoin actually worked before rebooting
- name: Verify domain status after disjoin
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain, Workgroup
    $domainName = if ($cs.PartOfDomain) {
      try {
        [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name
      }
      catch {
        $cs.Domain
      }
    }
    else {
      $null
    }
    @{
      domain = if ($domainName) { $domainName } else { 'WORKGROUP' }
      part_of_domain = $cs.PartOfDomain
      workgroup_name = $cs.Workgroup
    } | ConvertTo-Json
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: domain_status_after_disjoin
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)

- name: Fail when still in domain after disjoin
  ansible.builtin.fail:
    msg: |
      ❌ Disjoin did not succeed: the computer is still in domain ({{ (domain_status_after_disjoin.stdout | from_json).domain | default('unknown') }}).
      PartOfDomain={{ (domain_status_after_disjoin.stdout | from_json).part_of_domain | default('unknown') }}.
      Fix the secure channel (reset computer account in AD, run Test-ComputerSecureChannel -Repair on the VM), then re-run. Verify with: (Get-CimInstance Win32_ComputerSystem).PartOfDomain
  when:
    - not (dry_run | default(false) | bool)
    - domain_status_after_disjoin is defined
    - not (domain_status_after_disjoin.skipped | default(false) | bool)
    - domain_status_after_disjoin.stdout is defined
    - (domain_status_after_disjoin.stdout | from_json).part_of_domain | default(false) | bool or
      ((domain_status_after_disjoin.stdout | from_json).domain | default('')) != 'WORKGROUP'

# Azure restart primary (same pattern as post-join); win_reboot fallback
- name: Verify Azure CLI can access VM (pre-disjoin reboot)
  ansible.builtin.shell: >-
    az vm show --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}" --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" --query id -o tsv
  delegate_to: localhost
  register: az_vm_access_check_disjoin
  changed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - use_azure_restart | default(true) | bool

- name: Fail when Azure CLI cannot access VM (pre-disjoin reboot)
  ansible.builtin.fail:
    msg: |
      ❌ Azure CLI cannot access VM {{ target_vm_name }} (pre-disjoin reboot). Runner may lack Azure auth or VM Contributor/restart permissions.
      Resource group: {{ azure_resource_group | default(manifest_data.target_resource_group) }}
      Error: {{ az_vm_access_check_disjoin.stderr | default(az_vm_access_check_disjoin.msg) | default('Unknown') | truncate(300) }}
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - use_azure_restart | default(true) | bool
    - az_vm_access_check_disjoin is defined
    - az_vm_access_check_disjoin.rc | default(-1) != 0

- name: Restart VM via Azure CLI after disjoin (primary)
  ansible.builtin.shell: >-
    az vm restart --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}" --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" --no-wait
  delegate_to: localhost
  register: az_restart_disjoin_result
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - use_azure_restart | default(true) | bool

- name: Set fact az_disjoin_restart_succeeded
  ansible.builtin.set_fact:
    az_disjoin_restart_succeeded: "{{ (az_restart_disjoin_result is defined and (az_restart_disjoin_result.rc is defined and az_restart_disjoin_result.rc == 0)) | bool }}"
  when:
    - use_azure_restart | default(true) | bool

- name: Restart via WinRM after disjoin (fallback when Azure skipped or failed)
  ansible.windows.win_reboot:
    reboot_timeout: 600
    pre_reboot_delay: 30
    post_reboot_delay: 30
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: reboot_after_disjoin
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - not (az_disjoin_restart_succeeded | default(false))

- name: Set fact winrm_disjoin_reboot_succeeded
  ansible.builtin.set_fact:
    winrm_disjoin_reboot_succeeded: "{{ (reboot_after_disjoin is defined and (reboot_after_disjoin.rebooted | default(false))) | bool }}"
  when:
    - reboot_after_disjoin is defined

- name: Warn if disjoin reboot failed (neither Azure nor WinRM succeeded)
  ansible.builtin.debug:
    msg: |
      ⚠️ Reboot after disjoin failed. VM may be in inconsistent state.
      Reboot {{ target_vm_host }} manually, then re-run this playbook.
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - >-
      not (
        (az_disjoin_restart_succeeded | default(false)) or
        (winrm_disjoin_reboot_succeeded | default(false))
      )

- name: Wait for server after disjoin reboot
  ansible.builtin.wait_for:
    port: "{{ winrm_port }}"
    host: "{{ target_vm_host }}"
    delay: 60
    timeout: 600
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
    - restart_on_success | bool
    - >-
      (az_disjoin_restart_succeeded | default(false)) or
      (winrm_disjoin_reboot_succeeded | default(false))

# Once VM is in workgroup (after disjoin), ensure firewall Public and Private are off before rename/join.
- name: Ensure Windows Firewall (Public and Private) off after disjoin
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Public, Private -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  when:
    - not (dry_run | default(false) | bool)
    - domain_disjoin_result is defined
    - not (domain_disjoin_result.skipped | default(false) | bool)
    - not (domain_disjoin_result.failed | default(false) | bool)
