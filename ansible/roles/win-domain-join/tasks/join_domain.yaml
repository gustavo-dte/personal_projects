---
- name: Validate WinRM authentication after rename reboot (pre-join connectivity check)
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: winrm_auth_after_join
  retries: 3
  delay: 15
  until: winrm_auth_after_join is succeeded or winrm_auth_after_join.failed
  failed_when: false

- name: "Fallback: Validate WinRM with .\\administrator if primary user fails"
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: ".\\administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: winrm_auth_after_join_admin
  retries: 3
  delay: 15
  until: winrm_auth_after_join_admin is succeeded or winrm_auth_after_join_admin.failed
  failed_when: false
  when: winrm_auth_after_join is failed or winrm_auth_after_join.unreachable | default(false) | bool

# Keep WinRM reachable when the NIC switches to the Domain profile during join
- name: "Pre-join: create firewall rule allowing WinRM on all profiles (including Domain)"
  ansible.windows.win_shell: |
    $ruleName = 'Allow WinRM Ansible (all profiles)'
    $existing = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
    if (-not $existing) {
      New-NetFirewallRule -DisplayName $ruleName `
        -Direction Inbound -Protocol TCP `
        -LocalPort {{ winrm_port }} `
        -Action Allow -Profile Any -Enabled True | Out-Null
      Write-Output "RULE_CREATED"
    } else {
      Write-Output "RULE_EXISTS"
    }
    # Also pre-emptively disable Domain profile so post-join tasks work immediately
    Set-NetFirewallProfile -Profile Domain -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: pre_join_fw_rule
  changed_when: "'RULE_CREATED' in (pre_join_fw_rule.stdout | default(''))"
  failed_when: false
  ignore_unreachable: true
  retries: 3
  delay: 10
  until: not (pre_join_fw_rule.unreachable | default(false) | bool)
  when: not (dry_run | default(false) | bool)

- name: "Pre-join firewall fallback: try .\\administrator if primary user failed"
  ansible.windows.win_shell: |
    $ruleName = 'Allow WinRM Ansible (all profiles)'
    $existing = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
    if (-not $existing) {
      New-NetFirewallRule -DisplayName $ruleName `
        -Direction Inbound -Protocol TCP `
        -LocalPort {{ winrm_port }} `
        -Action Allow -Profile Any -Enabled True | Out-Null
      Write-Output "RULE_CREATED"
    } else {
      Write-Output "RULE_EXISTS"
    }
    Set-NetFirewallProfile -Profile Domain -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: ".\\administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: pre_join_fw_rule_fallback
  changed_when: "'RULE_CREATED' in (pre_join_fw_rule_fallback.stdout | default(''))"
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - pre_join_fw_rule.unreachable | default(false) | bool

- name: "Switch effective WinRM user to .\\administrator (primary user was rejected)"
  ansible.builtin.set_fact:
    formatted_winrm_username: ".\\administrator"
  when:
    - pre_join_fw_rule.unreachable | default(false) | bool
    - not (pre_join_fw_rule_fallback.unreachable | default(false) | bool)

- name: "Step 3: Join Windows server to target domain"
  microsoft.ad.membership:
    dns_domain_name: "{{ domain_name }}"
    domain_admin_user: "{{ domain_admin_username }}"
    domain_admin_password: "{{ domain_admin_password }}"
    domain_ou_path: "{{ domain_ou_path | default(omit) }}"
    hostname: "{{ target_vm_name }}"
    state: domain
    reboot: false
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 180
    ansible_winrm_read_timeout: 200
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: domain_join_result
  no_log: true
  failed_when: false
  ignore_unreachable: true
  retries: 2
  delay: 15
  until: not (domain_join_result.unreachable | default(false) | bool)
  when: not (dry_run | default(false) | bool)

- name: "Step 3 fallback: Join with .\\administrator if primary user went UNREACHABLE"
  microsoft.ad.membership:
    dns_domain_name: "{{ domain_name }}"
    domain_admin_user: "{{ domain_admin_username }}"
    domain_admin_password: "{{ domain_admin_password }}"
    domain_ou_path: "{{ domain_ou_path | default(omit) }}"
    hostname: "{{ target_vm_name }}"
    state: domain
    reboot: false
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 180
    ansible_winrm_read_timeout: 200
    ansible_user: ".\\administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: domain_join_result_fallback
  no_log: true
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result.unreachable | default(false) | bool

- name: "Merge join result (use fallback if primary was unreachable)"
  ansible.builtin.set_fact:
    domain_join_result: "{{ domain_join_result_fallback }}"
  when:
    - domain_join_result.unreachable | default(false) | bool
    - domain_join_result_fallback is defined
    - not (domain_join_result_fallback.unreachable | default(false) | bool)

- name: Fail when domain join UNREACHABLE (both primary and fallback users rejected)
  ansible.builtin.fail:
    msg: |
      [FAIL] Domain join for {{ target_vm_name }} could not connect to VM via WinRM.
      Both '{{ formatted_winrm_username }}' and '.\administrator' were rejected by NTLM.
      Verify the WinRM password is correct, the local accounts exist, and WinRM is listening on {{ target_vm_host }}:{{ winrm_port }}.
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result.unreachable | default(false) | bool

- name: Fail when domain join failed (rename or Access is denied during join)
  ansible.builtin.fail:
    msg: |
      [FAIL] Domain join failed for {{ target_vm_name }}: the module tried to rename the computer to "{{ target_vm_name }}" and got Access is denied.

      The computer is still named {{ current_hostname_info.old_name | default('unknown') }}. Rename must succeed before or during join.

      Fix and re-run:
      1. Reboot the VM ({{ target_vm_host }}) after disjoin, then re-run this playbook so Step 2 (Rename) runs successfully before Step 3.
      2. Or on the VM run as Administrator: Rename-Computer -NewName "{{ target_vm_name }}" -Restart
         Then re-run this playbook (it will skip disjoin/rename and do the domain join only).

      Error: {{ domain_join_result.msg | default('Unknown') | string }}
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - domain_join_result.failed | default(false) | bool
    - "'access is denied' in ((domain_join_result.msg | default('')) | string | lower)"
    - "'rename' in ((domain_join_result.msg | default('')) | string | lower)"

- name: Fail when domain join failed (other errors)
  ansible.builtin.fail:
    msg: |
      [FAIL] Domain join failed for {{ target_vm_name }}.
      Error: {{ domain_join_result.msg | default('Unknown') | string }}
      This could indicate invalid domain credentials, network/DC issues, or insufficient permissions.
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - domain_join_result.failed | default(false) | bool
    - >
      not (('access is denied' in ((domain_join_result.msg | default('')) | string | lower)
      and 'rename' in ((domain_join_result.msg | default('')) | string | lower))

- name: Determine effective reboot requirement (join or rename)
  ansible.builtin.set_fact:
    effective_reboot_required: >-
      {{
        (domain_join_result.reboot_required | default(false) | bool)
        or
        (hostname_reboot_required | default(false) | bool)
      }}
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)

# Prefer Azure restart; fall back to WinRM when needed
- name: Verify Azure CLI can access VM (pre-restart auth/perms check)
  ansible.builtin.shell: >-
    az vm show --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}" --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" --query id -o tsv
  delegate_to: localhost
  register: az_vm_access_check
  changed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - use_azure_restart | default(true) | bool

- name: Fail when Azure CLI cannot access VM (check runner auth and Contributor/restart role)
  ansible.builtin.fail:
    msg: |
      [FAIL] Azure CLI cannot access VM {{ target_vm_name }}. The runner may lack Azure auth or VM Contributor/restart permissions.
      Resource group: {{ azure_resource_group | default(manifest_data.target_resource_group) }}
      Subscription: {{ azure_subscription_id | default(manifest_data.target_subscription_id) }}
      Error: {{ az_vm_access_check.stderr | default(az_vm_access_check.msg) | default('Unknown') | truncate(300) }}
      Fix: Ensure the runner's managed identity or service principal has Contributor (or at least Microsoft.Compute/virtualMachines/restart/action) on the VM.
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - use_azure_restart | default(true) | bool
    - az_vm_access_check is defined
    - az_vm_access_check.rc | default(-1) != 0

- name: Restart VM via Azure CLI (primary for Azure VMs)
  ansible.builtin.shell: >-
    az vm restart --resource-group "{{ azure_resource_group | default(manifest_data.target_resource_group) }}"
    --name "{{ target_vm_name }}" --subscription "{{ azure_subscription_id | default(manifest_data.target_subscription_id) }}" --no-wait
  delegate_to: localhost
  register: az_restart_result
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - use_azure_restart | default(true) | bool

- name: Set fact az_restart_succeeded
  ansible.builtin.set_fact:
    az_restart_succeeded: "{{ (az_restart_result is defined and (az_restart_result.rc is defined and az_restart_result.rc == 0)) | bool }}"
  when:
    - use_azure_restart | default(true) | bool

- name: Debug Azure restart failure
  ansible.builtin.debug:
    msg: "Azure restart skipped or failed. Result: {{ az_restart_result | default('N/A') | string }}"
  when:
    - use_azure_restart | default(true) | bool
    - not az_restart_succeeded | default(false)

- name: Restart server via WinRM (fallback when Azure restart skipped or failed)
  ansible.windows.win_reboot:
    reboot_timeout: 600
    pre_reboot_delay: 30
    post_reboot_delay: 30
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: reboot_result
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - not (az_restart_succeeded | default(false))

- name: Set fact winrm_reboot_succeeded
  ansible.builtin.set_fact:
    winrm_reboot_succeeded: "{{ (reboot_result is defined and (reboot_result.rebooted | default(false))) | bool }}"
  when:
    - reboot_result is defined

- name: Warn if reboot failed (neither Azure nor WinRM succeeded)
  ansible.builtin.debug:
    msg: |
      [WARN] WARNING: Automatic reboot failed (Azure and/or WinRM restart did not succeed).
      The server has been successfully joined to the domain, but a manual reboot is required
      for the domain join to take full effect.
      Please reboot the server manually: {{ target_vm_name }}
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - >-
      not (
        (az_restart_succeeded | default(false)) or
        (winrm_reboot_succeeded | default(false))
      )

- name: Wait for server to come back online after reboot
  ansible.builtin.wait_for:
    port: "{{ winrm_port }}"
    host: "{{ target_vm_host }}"
    delay: 90
    timeout: 900
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - >-
      (az_restart_succeeded | default(false)) or
      (winrm_reboot_succeeded | default(false))
- name: Additional stabilization pause after WinRM is up
  ansible.builtin.pause:
    seconds: 45
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - >-
      (az_restart_succeeded | default(false)) or
      (winrm_reboot_succeeded | default(false))

- name: Update formatted WinRM username after join reboot
  ansible.builtin.set_fact:
    formatted_winrm_username: >-
      {%- set user = hostvars['localhost']['resolved_winrm_username'] | default('SE-Admin') -%}
      {%- if user.startswith('.\\') -%}
        {{ user }}
      {%- else -%}
        {{ target_vm_name + '\\' + user.split('\\')[-1] }}
      {%- endif -%}
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - effective_reboot_required | default(false) | bool
    - restart_on_success | bool
    - wait_for_reboot | bool
    - >-
      (az_restart_succeeded | default(false)) or
      (winrm_reboot_succeeded | default(false))

- name: "Post-join probe 1: try .\\administrator (local account)"
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_winrm_read_timeout: 40
    ansible_user: ".\\administrator"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: post_join_probe_local
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)

- name: "Post-join: record .\\administrator success"
  ansible.builtin.set_fact:
    post_join_auth_ok: true
    formatted_winrm_username: ".\\administrator"
    resolved_winrm_username: ".\\administrator"
  when:
    - post_join_probe_local is defined
    - not (post_join_probe_local.skipped | default(false) | bool)
    - not (post_join_probe_local.unreachable | default(false) | bool)
    - not (post_join_probe_local.failed | default(false) | bool)

- name: "Post-join probe 2: try SE-Admin / winrm_username (may be domain account)"
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_winrm_read_timeout: 40
    ansible_user: "{{ role_winrm_username | default(winrm_username | default('SE-Admin')) }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: post_join_probe_seadmin
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - not (post_join_auth_ok | default(false) | bool)

- name: "Post-join: record SE-Admin success"
  ansible.builtin.set_fact:
    post_join_auth_ok: true
    formatted_winrm_username: "{{ role_winrm_username | default(winrm_username | default('SE-Admin')) }}"
    resolved_winrm_username: "{{ role_winrm_username | default(winrm_username | default('SE-Admin')) }}"
  when:
    - post_join_probe_seadmin is defined
    - not (post_join_probe_seadmin.skipped | default(false) | bool)
    - not (post_join_probe_seadmin.unreachable | default(false) | bool)
    - not (post_join_probe_seadmin.failed | default(false) | bool)

- name: "Post-join probe 3: try domain admin ({{ domain_admin_username }})"
  ansible.windows.win_shell: |
    $env:COMPUTERNAME
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 30
    ansible_winrm_read_timeout: 40
    ansible_user: "{{ domain_admin_username }}"
    ansible_password: "{{ domain_admin_password }}"
  register: post_join_probe_domadmin
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - not (post_join_auth_ok | default(false) | bool)
    - (domain_admin_username | default('')) | length > 0

- name: "Post-join: record domain admin success"
  ansible.builtin.set_fact:
    post_join_auth_ok: true
    formatted_winrm_username: "{{ domain_admin_username }}"
    resolved_winrm_username: "{{ domain_admin_username }}"
    resolved_winrm_password: "{{ domain_admin_password }}"
  when:
    - post_join_probe_domadmin is defined
    - not (post_join_probe_domadmin.skipped | default(false) | bool)
    - not (post_join_probe_domadmin.unreachable | default(false) | bool)
    - not (post_join_probe_domadmin.failed | default(false) | bool)

- name: "Post-join: warn when no WinRM credentials worked"
  ansible.builtin.debug:
    msg: |
      [WARN] All post-join WinRM probes failed. Tried:
      1. .\administrator (local admin)
      2. {{ role_winrm_username | default(winrm_username | default('SE-Admin')) }}
      3. {{ domain_admin_username | default('(no domain admin configured)') }}
      Subsequent tasks may fail. Check firewall (Domain profile) and credential validity.
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - not (post_join_auth_ok | default(false) | bool)

- name: Disable Domain firewall profile after join reboot
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Domain -Enabled False
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  failed_when: false
  ignore_unreachable: true
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)

- name: Collect domain membership after join
  ansible.windows.win_shell: |
    $cs = Get-CimInstance -ClassName Win32_ComputerSystem -Property Domain, PartOfDomain, Workgroup
    $domain = 'WORKGROUP'
    if ($cs.PartOfDomain) {
      try {
        $domain = [System.DirectoryServices.ActiveDirectory.Domain]::GetComputerDomain().Name
      }
      catch {
        $domain = $cs.Domain
      }
    }
    $result = @{
      domain         = $domain
      part_of_domain = [bool]$cs.PartOfDomain
      workgroup_name = $cs.Workgroup
    }
    $result | ConvertTo-Json
  delegate_to: "{{ target_vm_host }}"
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: "{{ winrm_transport }}"
    ansible_winrm_port: "{{ winrm_port }}"
    ansible_winrm_scheme: "{{ 'https' if winrm_port | int == 5986 else 'http' }}"
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_connection_timeout: 60
    ansible_winrm_read_timeout: 70
    ansible_user: "{{ hostvars['localhost']['formatted_winrm_username'] }}"
    ansible_password: "{{ hostvars['localhost']['resolved_winrm_password'] }}"
  register: post_join_domain_status_raw
  changed_when: false
  failed_when: false
  ignore_unreachable: true
  retries: 3
  delay: 15
  until: >-
    (post_join_domain_status_raw.stdout is defined)
    and ((post_join_domain_status_raw.stdout | default('') | trim | length) > 0)
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)

- name: Parse domain membership after join
  ansible.builtin.set_fact:
    post_join_domain_status: "{{ post_join_domain_status_raw.stdout | from_json }}"
  when:
    - post_join_domain_status_raw is defined
    - post_join_domain_status_raw.stdout is defined
    - (post_join_domain_status_raw.stdout | default('') | trim | length) > 0

- name: Update current_domain_status with post-join membership
  ansible.builtin.set_fact:
    current_domain_status: "{{ post_join_domain_status }}"
  when:
    - post_join_domain_status is defined

- name: Fail when VM is not joined to target domain after module success
  ansible.builtin.fail:
    msg: |
      [FAIL] Domain join reported success, but {{ target_vm_name }} is not in {{ domain_name }}.
      Current membership: domain={{ post_join_domain_status.domain | default('unknown') }}, part_of_domain={{ post_join_domain_status.part_of_domain | default(false) }}, workgroup={{ post_join_domain_status.workgroup_name | default('unknown') }}.
      Module result: changed={{ domain_join_result.changed | default(false) }}, failed={{ domain_join_result.failed | default(false) }}, message={{ domain_join_result.msg | default('Unknown') | string }}.
      Verify the computer account exists and the secure channel can be established (Test-ComputerSecureChannel -Repair), then rerun the playbook.
  when:
    - not (dry_run | default(false) | bool)
    - domain_join_result is defined
    - not (domain_join_result.failed | default(false) | bool)
    - post_join_domain_status is defined
    - >-
      (az_restart_succeeded | default(false)) or
      (winrm_reboot_succeeded | default(false))
    - >-
      not (
        (post_join_domain_status.part_of_domain | default(false)) and
        ((post_join_domain_status.domain | default('') | lower) == (domain_name | default('') | lower))
      )
