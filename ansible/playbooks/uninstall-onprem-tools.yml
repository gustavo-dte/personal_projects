# Set dry_run: false to actually uninstall; see docs/UNINSTALL_ONPREM_REVIEW.md for GH testing.

- name: Load manifest and prepare for Azure-based uninstall
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    ss_url_raw: "{{ lookup('ansible.builtin.env', 'DELINEA_BASE_URL', default='') }}"
    ss_username_raw: "{{ lookup('ansible.builtin.env', 'DELINEA_USERNAME', default='') }}"
    ss_password: "{{ lookup('ansible.builtin.env', 'DELINEA_PASSWORD', default='') }}"
    ss_secret_id_raw: "{{ lookup('ansible.builtin.env', 'DELINEA_SECRET_ID', default='') }}"
    ss_secret_path_raw: "{{ lookup('ansible.builtin.env', 'DELINEA_SECRET_PATH', default='') }}"
    ss_url: "{{ (ss_url_raw | trim) if (ss_url_raw | trim | length > 0) else 'https://dte.secretservercloud.com' }}"
    ss_username: "{{ (ss_username_raw | trim) if (ss_username_raw | trim | length > 0) else 'SVC_VM_Migration' }}"
    ss_secret_id: "{{ ss_secret_id_raw | replace('\\n', '') | replace('\\r', '') | trim }}"
    ss_secret_path: "{{ (ss_secret_path_raw | trim) if (ss_secret_path_raw | trim | length > 0) else 'SE-Admin' }}"
    manifest: "{{ manifest }}"

  tasks:
    - name: Load manifest via common role
      ansible.builtin.include_role:
        name: common
        tasks_from: load_manifest
      vars:
        manifest: "{{ manifest }}"

    - name: Debug Delinea lookup config
      ansible.builtin.debug:
        msg: "Using Delinea Secret Server plugin with Secret ID: {{ ss_secret_id }}"
      no_log: false

    - name: Display loaded VMs from manifest
      ansible.builtin.debug:
        msg: "VMs to process: {{ manifest_data.vms | map(attribute='name') | list }}"

    - name: Execute uninstall on each VM via Azure RunCommand
      ansible.builtin.include_role:
        name: onprem-tools-uninstallation
        tasks_from: uninstall_via_azure_runcommand
      vars:
        azure_subscription_id: "{{ manifest_data.target_subscription_id }}"
        azure_resource_group: "{{ manifest_data.target_resource_group }}"
        vm_name: "{{ item.target_vm_name | default(item.name) }}"
        uninstall_list: "{{ manifest_data.uninstall_tools_list }}"
        manifest: "{{ manifest }}"
        dry_run: "{{ dry_run }}"
      loop: "{{ manifest_data.vms }}"
      loop_control:
        label: "{{ item.target_vm_name | default(item.name) }}"
