---
# ansible/playbooks/disjoin-windows-domain.yaml
#
# Step 1 - Fetch SE-Admin local-admin value from Delinea Secret Server
# Step 2 - Connect to the Azure VM as SE-Admin (WinRM), disjoin from domain -> WORKGROUP, reboot
# Step 3 - Re-probe actual hostname after post-disjoin reboot
# Step 4 - Rename hostname to target_vm_name (from manifest), reboot, verify
#
# target_vm_name is read from the manifest (vms[*].target_vm_name).
# The rename is ALWAYS applied - if the current hostname already matches
# target_vm_name the rename step skips gracefully with no changes.
#
# Required extra-vars:
#   manifest          Directory name under ansible/vars/ describing the target VMs
#
# Optional extra-vars:
#   dry_run           true -> preview only, no changes applied  (default: false)
#
# Required environment variables (injected by the workflow):
#   DELINEA_BASE_URL      Delinea Secret Server base URL
#   DELINEA_USERNAME      Service account used to authenticate to Delinea
#   DELINEA_VALUE         Secret value for the Delinea service account
#   DELINEA_SECRET_ID     Numeric ID of the SE-Admin secret  (preferred)
#   DELINEA_SECRET_PATH   Name/path search term              (fallback when ID not set)
#
# Required manifest keys (per VM):
#   vms[*].name            Source VM name (used for IP lookup and loop label)
#   vms[*].target_vm_name  New hostname to apply (naming-convention target)
#   vms[*].vm_ip           (Optional) Direct IP; if absent Azure API is queried

- name: "Disjoin Windows VMs from domain and rename to target hostname"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ss_url_raw:         "{{ lookup('ansible.builtin.env', 'DELINEA_BASE_URL', default='') }}"
    ss_username_raw:    "{{ lookup('ansible.builtin.env', 'DELINEA_USERNAME', default='') }}"
    ss_value:           "{{ lookup('ansible.builtin.env', 'DELINEA_VALUE', default='') }}"
    ss_secret_id_raw:   "{{ lookup('ansible.builtin.env', 'DELINEA_SECRET_ID', default='') }}"
    ss_secret_path_raw: "{{ lookup('ansible.builtin.env', 'DELINEA_SECRET_PATH', default='') }}"
    ss_url:         "{{ (ss_url_raw | trim) if (ss_url_raw | trim | length > 0) else 'https://dte.secretservercloud.com' }}"
    ss_username:    "{{ (ss_username_raw | trim) if (ss_username_raw | trim | length > 0) else 'SVC_VM_Migration' }}"
    ss_secret_id:   "{{ ss_secret_id_raw | replace('\\n', '') | replace('\\r', '') | trim }}"
    ss_secret_path: "{{ (ss_secret_path_raw | trim) if (ss_secret_path_raw | trim | length > 0) else 'SE-Admin' }}"

  pre_tasks:

    - name: "Validate: DELINEA_VALUE is set"
      ansible.builtin.assert:
        that: ss_value | length > 0
        fail_msg: "DELINEA_VALUE environment variable is missing or empty."

    - name: "Validate: Delinea URL and at least one secret reference are set"
      ansible.builtin.assert:
        that:
          - ss_url | trim | length > 0
          - (ss_secret_id | length > 0) or (ss_secret_path | trim | length > 0)
        fail_msg: "DELINEA_BASE_URL is empty, or neither DELINEA_SECRET_ID nor DELINEA_SECRET_PATH is set."

    - name: "Validate: manifest extra-var is provided"
      ansible.builtin.assert:
        that: manifest is defined and manifest | length > 0
        fail_msg: "The 'manifest' extra-var is required."

    - name: "Debug: Delinea connection config (non-sensitive)"
      ansible.builtin.debug:
        msg: >-
          Connecting to Delinea at {{ ss_url }} as {{ ss_username }}.
          Secret ref: {{ 'ID=' ~ ss_secret_id if ss_secret_id | length > 0 else 'Path=' ~ ss_secret_path }}

    # ── Step 1: Fetch SE-Admin value from Delinea ───────────────────────────
    - name: "Step 1: Fetch SE-Admin value from Delinea Secret Server"
      block:

        - name: "Step 1a: Set Delinea connection parameters"
          ansible.builtin.set_fact:
            delinea_conn_params:
              base_url: "{{ ss_url }}"
              username: "{{ ss_username }}"
              password: "{{ ss_value }}"  # pragma: allowlist secret
          when: ss_secret_id | length > 0
          no_log: true

        - name: "Step 1a: Fetch secret by numeric ID"
          ansible.builtin.set_fact:
            delinea_secret: >
              {{ lookup(
                'delinea.platform_secretserver.tss',
                ss_secret_id | int,
                base_url=delinea_conn_params.base_url,
                username=delinea_conn_params.username,
                password=delinea_conn_params.password  # pragma: allowlist secret
              ) }}
          when: ss_secret_id | length > 0
          no_log: true

        - name: "Step 1b: Set Delinea connection parameters for path lookup"
          ansible.builtin.set_fact:
            delinea_conn_params:
              base_url: "{{ ss_url }}"
              username: "{{ ss_username }}"
              password: "{{ ss_value }}"  # pragma: allowlist secret
              secret_path: "{{ ss_secret_path }}"
          when: ss_secret_id | length == 0
          no_log: true

        - name: "Step 1b: Fetch secret by path (fallback when DELINEA_SECRET_ID is not set)"
          ansible.builtin.set_fact:
            delinea_secret: >  # pragma: allowlist secret
              {{ lookup(
                'delinea.platform_secretserver.tss',
                0,
                secret_path=delinea_conn_params.secret_path,
                base_url=delinea_conn_params.base_url,
                username=delinea_conn_params.username,
                password=delinea_conn_params.password  # pragma: allowlist secret
              ) }}
          when: ss_secret_id | length == 0
          no_log: true

        - name: "Step 1c: Extract SE-Admin value from retrieved secret"
          ansible.builtin.set_fact:
            winrm_value: >
              {{ (delinea_secret['items'] | items2dict(key_name='slug', value_name='itemValue'))['se-password'] }}  # pragma: allowlist secret
          no_log: true

        - name: "Step 1d: Audit log — value retrieved (non-sensitive)"
          ansible.builtin.debug:
            msg: >
              [AUDIT] SE-Admin value retrieved from Delinea.
              ref={{ 'id=' ~ ss_secret_id if ss_secret_id | length > 0 else 'path=' ~ ss_secret_path }}
              url={{ ss_url }} user={{ ss_username }}

      rescue:
        # Catches: server not found, DNS failure, network error,
        #          bad configuration, secret not found, unexpected API error
        - name: "Step 1 FAILED: could not retrieve SE-Admin value from Delinea"
          ansible.builtin.fail:
            msg: |
              ERROR: Step 1 failed - could not retrieve SE-Admin value from Delinea Secret Server.

              Common causes:
                - Server not found / DNS resolution failure -> {{ ss_url }} unreachable
                - Network connectivity issue between the runner and Delinea
                - Invalid service-account configuration -> check DELINEA_USERNAME / DELINEA_VALUE
                - Secret not found -> check DELINEA_SECRET_ID or DELINEA_SECRET_PATH
                - Unexpected Delinea API error -> review Delinea audit logs

              Configuration:
                URL       : {{ ss_url }}
                Config user : {{ ss_username }}
                Secret ref: {{ 'id=' ~ ss_secret_id if ss_secret_id | length > 0 else 'path=' ~ ss_secret_path }}

              Remediation:
                1. Confirm the runner can reach {{ ss_url }}  (e.g. curl -I {{ ss_url }})
                2. Confirm DELINEA_USERNAME / DELINEA_VALUE are correct in GitHub Secrets
                3. Confirm the secret exists and the service account has read permission
                4. Check Delinea audit logs for the failed access attempt

  # Steps 2-4: handled by the win-domain-join role with disjoin_and_rename=true
  #
  #   Per VM the role executes disjoin_and_rename_vm.yaml which calls:
  #     prepare_winrm.yaml   — connect as SE-Admin, read actual hostname from VM
  #     disjoin_domain.yaml  — Remove-Computer → WORKGROUP → reboot → wait
  #     (re-probe)           — re-read hostname post-reboot for correct WinRM config
  #     rename_computer.yaml — compare current hostname to manifest target_vm_name;
  #                            rename (Azure RunCommand primary / WinRM fallback)
  #                            → reboot → verify
  #
  # target_vm_name comes from manifest vms[*].target_vm_name.
  # SE-Admin value is fetched live in Step 1 above — never stored in extra-vars.
  roles:
    - role: common

    - role: win-domain-join
      vars:
        manifest:           "{{ manifest }}"
        winrm_username:     "SE-Admin"
        winrm_password:     "{{ winrm_value }}"
        # Step 4 (rename) — Administrator local account using the SE-Admin Delinea value
        # Overridable via WORKFLOW_RENAME_USERNAME if the local admin has a different name
        rename_winrm_username: "{{ lookup('ansible.builtin.env', 'WORKFLOW_RENAME_USERNAME', default='Administrator') }}"
        disjoin_and_rename: true
        disjoin_only:       false
        dry_run:            "{{ dry_run | default(false) }}"
