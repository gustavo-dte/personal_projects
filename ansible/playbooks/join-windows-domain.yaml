---
# ansible/playbooks/join-windows-domain.yaml
#
# Joins Windows VMs to Active Directory domain.
# Assumes VMs have already been disjoined and renamed by the disjoin-windows-domain playbook.
#
# Step 1 - WinRM passwords are pre-fetched by workflow using ansible/roles/python_scripts/resolve_delinea_secret_id.py  # pragma: allowlist secret
#          and passed as environment variables: winrm_value_{target_vm_name_lowercase}  # pragma: allowlist secret
# Step 2 - Join the VM to the domain using the cpoe-automation domain account
#
# Required extra-vars:
#   manifest              Directory name under ansible/vars/ describing the target VMs
#   domain_admin_value    Secret value for the cpoe-automation domain account (Step 2)  # pragma: allowlist secret
#
# Optional extra-vars:
#   dry_run               true -> preview only, no changes applied  (default: false)
#   force_rejoin          true -> forces disjoin before join (default: false; use with caution)
#
# Required environment variables (set by workflow's fetch_delinea_multi_vm.py script):
#   winrm_value_{target_vm_name_lowercase}    Per-VM SE-Admin password from Delinea  # pragma: allowlist secret
#
# Required manifest keys:
#   vms[*].target_vm_name                   Target hostname for each VM (must match current hostname)
#   vms[*].vm_winrm_connect_hostname        Hostname used to resolve Delinea secret
#   vms[*].vm_winrm_username                WinRM username (typically se-admin)
#   domainNameSetup.domain                  AD domain FQDN  (e.g. dtenet.com)
#   domainNameSetup.domain_admin_username   cpoe-automation domain account
#   domainNameSetup.domain_ou_path          (Optional) OU path for the computer object

- name: "Join Windows VMs to domain (Disjoin -> Rename -> Rejoin)"
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:

    - name: "Validate: manifest extra-var is provided"
      ansible.builtin.assert:
        that: manifest is defined and manifest | length > 0
        fail_msg: "The 'manifest' extra-var is required."

    - name: "Validate: domain_admin_value is provided"
      ansible.builtin.assert:
        that: domain_admin_value is defined and domain_admin_value | length > 0
        fail_msg: "The 'domain_admin_value' extra-var is required for domain join (Step 2)."  # pragma: allowlist secret
      no_log: true

    - name: "Info: Per-VM WinRM passwords pre-fetched"  # pragma: allowlist secret
      ansible.builtin.debug:
        msg: >-
          [INFO] Per-VM WinRM passwords were pre-fetched from Delinea by the workflow.  # pragma: allowlist secret
          Environment variables: winrm_value_{target_vm_name_lowercase}  # pragma: allowlist secret
          The win-domain-join role will automatically resolve these per VM.

  # Step 2: handled by the win-domain-join role
  #   join.yml → domain join using cpoe-automation domain account
  #
  # Note: This playbook assumes VMs are already in WORKGROUP with the correct hostname.
  #       Run disjoin-windows-domain.yaml first if VMs need to be disjoined/renamed.
  roles:
    - role: common

    - role: win-domain-join
      vars:
        manifest: "{{ manifest }}"

        # SE-Admin local-admin configuration for WinRM connectivity
        # Value fetched live from Delinea in Step 1; never stored in extra-vars
        winrm_username: "SE-Admin"
        winrm_password: "{{ winrm_value }}"

        # cpoe-automation domain account for domain join
        # domain_admin_username is read from manifest domainNameSetup.domain_admin_username
        # domain_admin_value comes from the DOMAIN_ADMIN_VALUE GitHub Secret
        domain_admin_password: "{{ domain_admin_value }}"

        # Behaviour flags
        disjoin_only:  false
        dry_run:       "{{ dry_run | default(false) }}"
        force_rejoin:  "{{ force_rejoin | default(false) }}"
