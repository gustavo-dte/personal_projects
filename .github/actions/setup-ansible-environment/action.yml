name: Setup Ansible Environment
description: Install Python dependencies and Delinea Ansible collection

runs:
  using: composite
  steps:
    - name: Install Python dependencies
      run: pip install -r requirements.txt
      shell: bash

    - name: Install Delinea Ansible collection
      run: ansible-galaxy collection install delinea.platform_secretserver
      shell: bash

    - name: Verify Delinea TSS lookup plugin
      run: ansible-doc -t lookup -l | grep tss
      shell: bash
