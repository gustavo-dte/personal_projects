name: Ansible-Disjoin-Windows-Domain

# Disjoins Windows VMs from Active Directory and moves them to WORKGROUP.
# Calls: ansible/playbooks/disjoin-windows-domain.yaml
#
# Steps executed:
#   1 — Fetch SE-Admin password from Delinea Secret Server
#   2 — Connect to each Azure VM as SE-Admin (WinRM) and disjoin from domain → WORKGROUP
#
# Required GitHub Secrets:
#   DELINEA_USERNAME          Service account that authenticates to Delinea
#   DELINEA_PASSWORD          Password for the Delinea service account
#   AZURE_TENANT_ID           Azure tenant for managed-identity login
#   VM_MIGRATE_MI_CLIENT_ID   Client ID of the user-assigned managed identity
#
# Required GitHub Variables (vars.*):
#   DELINEA_BASE_URL          Delinea Secret Server base URL
#   DELINEA_SECRET_ID         Numeric ID of the SE-Admin secret  (preferred)
#   DELINEA_SECRET_PATH       Name/path search term              (fallback when ID not set)
#   DELINEA_SECRET_MACHINE    (Optional) Machine FQDN to narrow secret matching
#   DELINEA_SECRET_ACCOUNT    (Optional) Account filter — defaults to SE-Admin

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory under ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run — no changes applied"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  disjoin-windows-domain:
    name: "Disjoin — ${{ inputs.manifest }}${{ inputs.dry_run && ' [DRY RUN]' || '' }}"
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg
      DELINEA_BASE_URL: ${{ vars.DELINEA_BASE_URL != '' && vars.DELINEA_BASE_URL || 'https://dte.secretservercloud.com' }}
      DELINEA_USERNAME: ${{ secrets.DELINEA_USERNAME }}
      DELINEA_PASSWORD: ${{ secrets.DELINEA_PASSWORD }}
      DELINEA_SECRET_ID: ${{ vars.DELINEA_SECRET_ID }}
      DELINEA_SECRET_PATH: ${{ vars.DELINEA_SECRET_PATH != '' && vars.DELINEA_SECRET_PATH || 'SE-Admin' }}
      DELINEA_SECRET_MACHINE: ${{ vars.DELINEA_SECRET_MACHINE }}
      DELINEA_SECRET_ACCOUNT: ${{ vars.DELINEA_SECRET_ACCOUNT != '' && vars.DELINEA_SECRET_ACCOUNT || 'SE-Admin' }}

    steps:

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: "🔧 Install Delinea Python SDK"
        run: pip install python-tss-sdk
        shell: bash

      - name: "🔧 Upgrade Ansible"
        run: pip install --upgrade 'ansible>=2.15.0'
        shell: bash

      - name: "🔧 Install Delinea Ansible collection"
        run: ansible-galaxy collection install delinea.platform_secretserver
        shell: bash

      - name: "✅ Verify Delinea TSS lookup plugin"
        run: ansible-doc -t lookup -l | grep tss
        shell: bash

      # ── Checkout & validate ──────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "✅ Validate manifest"
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      # ── Azure login (live runs only) ─────────────────────────────────────────
      - name: "🔐 Azure Login"
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: true

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: "📊 Display configuration"
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  Ansible-Disjoin-Windows-Domain — ${{ inputs.manifest }}"
          echo "════════════════════════════════════════════════════════"
          echo "  Dry run         : ${{ inputs.dry_run }}"
          echo ""
          echo "  Step 1 — Fetch SE-Admin password from Delinea"
          echo "           URL             : ${DELINEA_BASE_URL}"
          echo "           Auth user       : ${DELINEA_USERNAME}"
          echo "           Machine filter  : ${DELINEA_SECRET_MACHINE:-<not set>}"
          echo "           Account filter  : ${DELINEA_SECRET_ACCOUNT}"
          echo ""
          echo "  Step 2 — Disjoin VM from domain → WORKGROUP  [SE-Admin via WinRM]"
          echo "════════════════════════════════════════════════════════"
          [ "${{ inputs.dry_run }}" = "true" ] \
            && echo "🧪 DRY RUN — no changes will be made." \
            || echo "🚀 LIVE RUN — changes will be applied."

      # ── Resolve Delinea secret ID ────────────────────────────────────────────
      - name: "🔎 Resolve Delinea secret ID"
        shell: bash
        run: |
          if [ -n "${DELINEA_SECRET_ID}" ]; then
            echo "✅ DELINEA_SECRET_ID already set: ${DELINEA_SECRET_ID}"
            exit 0
          fi

          python3 - <<'PY'
          import json, os, sys, urllib.parse, urllib.request

          base_url       = (os.getenv('DELINEA_BASE_URL',       '') or '').strip().rstrip('/')
          username       = (os.getenv('DELINEA_USERNAME',       '') or '').strip()
          password       =  os.getenv('DELINEA_PASSWORD',       '') or ''
          search_text    = (os.getenv('DELINEA_SECRET_PATH',    '') or '').strip()
          machine_filter = (os.getenv('DELINEA_SECRET_MACHINE', '') or '').strip().lower()
          account_filter = (os.getenv('DELINEA_SECRET_ACCOUNT', '') or '').strip().lower()
          github_env     =  os.getenv('GITHUB_ENV')

          if not base_url or not username or not password:
            print('⚠️ Skipping secret ID resolution — missing Delinea credentials.')
            sys.exit(0)
          if not search_text and not machine_filter:
            print('⚠️ Skipping secret ID resolution — no DELINEA_SECRET_PATH or DELINEA_SECRET_MACHINE set.')
            sys.exit(0)

          try:
            with urllib.request.urlopen(
              urllib.request.Request(
                f"{base_url}/oauth2/token",
                data=urllib.parse.urlencode({'grant_type':'password','username':username,'password':password}).encode(),
                headers={'Content-Type':'application/x-www-form-urlencoded'},
                method='POST',
              ), timeout=30
            ) as r:
              token = json.loads(r.read()).get('access_token')
          except Exception as ex:
            print(f'⚠️ Could not acquire Delinea token: {ex}')
            sys.exit(0)

          if not token:
            print('⚠️ No access token returned — skipping.')
            sys.exit(0)

          auth = {'Authorization': f'Bearer {token}'}
          seed = machine_filter or search_text

          try:
            with urllib.request.urlopen(
              urllib.request.Request(
                f"{base_url}/api/v1/secrets?"
                + urllib.parse.urlencode({'filter.includeRestricted':'true','filter.searchtext':seed}),
                headers=auth, method='GET',
              ), timeout=30
            ) as r:
              records = json.loads(r.read()).get('records') or []
          except Exception as ex:
            print(f'⚠️ Secret search failed: {ex}')
            sys.exit(0)

          if not records:
            print(f'⚠️ No secrets found for "{seed}" — falling back to path lookup.')
            sys.exit(0)

          def item_val(items, *slugs):
            wanted = {s.lower() for s in slugs}
            for i in items or []:
              if str(i.get('slug','')).strip().lower() in wanted:
                return str(i.get('itemValue','')).strip().lower()
            return ''

          def fetch_detail(sid):
            with urllib.request.urlopen(
              urllib.request.Request(f"{base_url}/api/v1/secrets/{sid}", headers=auth, method='GET'), timeout=30
            ) as r:
              return json.loads(r.read())

          if machine_filter:
            if not account_filter:
              print('⚠️ DELINEA_SECRET_MACHINE set but DELINEA_SECRET_ACCOUNT is missing.')
              sys.exit(1)
            matches = []
            for rec in records:
              name = str(rec.get('name','') or '').strip()
              if '\\' in name:
                fqdn, acct = name.split('\\', 1)
                if fqdn.strip().lower() == machine_filter and acct.strip().lower() == account_filter:
                  matches.append(rec)
            if not matches:
              for rec in records:
                sid = rec.get('id')
                if not sid:
                  continue
                try:
                  detail = fetch_detail(sid)
                except Exception:
                  continue
                items = detail.get('items') or rec.get('items') or []
                if (item_val(items,'machine','host','hostname','fqdn','server') == machine_filter
                    and item_val(items,'username','user','account','login') == account_filter):
                  matches.append(rec)
            matches = list({str(m.get('id')): m for m in matches if m.get('id')}.values())
            if len(matches) == 0:
              print(f"❌ No secret matched machine='{machine_filter}' account='{account_filter}'.")
              sys.exit(1)
            if len(matches) > 1:
              print(f"❌ Multiple matches (ids: {', '.join(str(m.get('id')) for m in matches)}). Set DELINEA_SECRET_ID explicitly.")
              sys.exit(1)
            sid = matches[0].get('id')
            print(f"✅ Resolved DELINEA_SECRET_ID={sid}")
            if github_env:
              open(github_env,'a').write(f"DELINEA_SECRET_ID={sid}\n")
            sys.exit(0)

          exact = next((r for r in records if str(r.get('name','')).strip().lower() == search_text.lower()), None)
          if not exact or not exact.get('id'):
            print(f'⚠️ No exact name match for "{search_text}" — using path lookup.')
            sys.exit(0)
          sid = exact['id']
          print(f"✅ Resolved DELINEA_SECRET_ID={sid} from path '{search_text}'")
          if github_env:
            open(github_env,'a').write(f"DELINEA_SECRET_ID={sid}\n")
          PY

      # ── Extra-vars ───────────────────────────────────────────────────────────
      - name: "🧱 Prepare Ansible extra-vars"
        run: |
          python3 - <<'PY'
          import json

          with open('ansible_extra_vars.json', 'w') as f:
            json.dump({
              'manifest':  '${{ inputs.manifest }}',
              'dry_run':   ${{ inputs.dry_run }},
            }, f, indent=2)
          print('✅ ansible_extra_vars.json written.')
          PY
          chmod 600 ansible_extra_vars.json
          python3 -m json.tool ansible_extra_vars.json > /dev/null \
            && echo "✅ JSON valid" \
            || (echo "❌ JSON invalid" && exit 1)

      # ── Run playbook ─────────────────────────────────────────────────────────
      - name: "🎬 Run disjoin playbook"
        run: |
          mkdir -p ansible/logs
          ansible-playbook ansible/playbooks/disjoin-windows-domain.yaml \
            -e @ansible_extra_vars.json 2>&1 | tee ansible/logs/disjoin.log
          rc=${PIPESTATUS[0]}
          rm -f ansible_extra_vars.json
          exit $rc

      # ── Upload logs ──────────────────────────────────────────────────────────
      - name: "📤 Upload logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: disjoin-logs-${{ inputs.manifest }}
          path: ansible/logs/
          if-no-files-found: warn
          retention-days: 90
