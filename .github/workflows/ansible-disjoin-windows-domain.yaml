name: Ansible-Disjoin-Windows-Domain

# Disjoins Windows VMs from Active Directory and moves them to WORKGROUP.
# Calls: ansible/playbooks/disjoin-windows-domain.yaml
#
# Steps executed:
#   1 — Fetch SE-Admin password from Delinea Secret Server
#   2 — Connect to each Azure VM as SE-Admin (WinRM) and disjoin from domain → WORKGROUP
#
# Required GitHub Secrets:
#   DELINEA_USERNAME          Service account that authenticates to Delinea
#   DELINEA_PASSWORD          Password for the Delinea service account
#   AZURE_TENANT_ID           Azure tenant for managed-identity login
#   VM_MIGRATE_MI_CLIENT_ID   Client ID of the user-assigned managed identity
#
# Required GitHub Variables (vars.*):
#   DELINEA_BASE_URL          Delinea Secret Server base URL
#   DELINEA_SECRET_ID         Numeric ID of the SE-Admin secret  (preferred)
#   DELINEA_SECRET_PATH       Name/path search term              (fallback when ID not set)
#   DELINEA_SECRET_MACHINE    (Optional) Machine FQDN to narrow secret matching
#   DELINEA_SECRET_ACCOUNT    (Optional) Account filter — defaults to SE-Admin

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory under ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run — no changes applied"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  disjoin-windows-domain:
    name: "Disjoin — ${{ inputs.manifest }}${{ inputs.dry_run && ' [DRY RUN]' || '' }}"
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg
      DELINEA_BASE_URL: ${{ vars.DELINEA_BASE_URL != '' && vars.DELINEA_BASE_URL || 'https://dte.secretservercloud.com' }}
      DELINEA_USERNAME: ${{ secrets.DELINEA_USERNAME }}
      DELINEA_PASSWORD: ${{ secrets.DELINEA_PASSWORD }}
      DELINEA_SECRET_ID: ${{ vars.DELINEA_SECRET_ID }}
      DELINEA_SECRET_PATH: ${{ vars.DELINEA_SECRET_PATH != '' && vars.DELINEA_SECRET_PATH || 'SE-Admin' }}
      DELINEA_SECRET_MACHINE: ${{ vars.DELINEA_SECRET_MACHINE }}
      DELINEA_SECRET_ACCOUNT: ${{ vars.DELINEA_SECRET_ACCOUNT != '' && vars.DELINEA_SECRET_ACCOUNT || 'SE-Admin' }}

    steps:

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: "🔧 Install Delinea Python SDK"
        run: pip install python-tss-sdk
        shell: bash

      - name: "🔧 Upgrade Ansible"
        run: pip install --upgrade 'ansible>=2.15.0'
        shell: bash

      - name: "🔧 Install Delinea Ansible collection"
        run: ansible-galaxy collection install delinea.platform_secretserver
        shell: bash

      - name: "✅ Verify Delinea TSS lookup plugin"
        run: ansible-doc -t lookup -l | grep tss
        shell: bash

      # ── Checkout & validate ──────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "✅ Validate manifest"
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      # ── Azure login (live runs only) ─────────────────────────────────────────
      - name: "🔐 Azure Login"
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: true

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: "📊 Display configuration"
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  Ansible-Disjoin-Windows-Domain — ${{ inputs.manifest }}"
          echo "════════════════════════════════════════════════════════"
          echo "  Dry run         : ${{ inputs.dry_run }}"
          echo ""
          echo "  Step 1 — Fetch SE-Admin password from Delinea"
          echo "           URL             : ${DELINEA_BASE_URL}"
          echo "           Auth user       : ${DELINEA_USERNAME}"
          echo "           Machine filter  : ${DELINEA_SECRET_MACHINE:-<not set>}"
          echo "           Account filter  : ${DELINEA_SECRET_ACCOUNT}"
          echo ""
          echo "  Step 2 — Disjoin VM from domain → WORKGROUP  [SE-Admin via WinRM]"
          echo "════════════════════════════════════════════════════════"
          [ "${{ inputs.dry_run }}" = "true" ] \
            && echo "🧪 DRY RUN — no changes will be made." \
            || echo "🚀 LIVE RUN — changes will be applied."

      # ── Resolve Delinea secret ID ────────────────────────────────────────────
      - name: "🔎 Resolve Delinea secret ID"
        shell: bash
        run: |
          if [ -n "${DELINEA_SECRET_ID}" ]; then
            echo "✅ DELINEA_SECRET_ID already set: ${DELINEA_SECRET_ID}"
            exit 0
          fi
          python3 ansible/roles/python_scripts/resolve_delinea_secret_id.py

      # ── Extra-vars ───────────────────────────────────────────────────────────
      - name: "🧱 Prepare Ansible extra-vars"
        env:
          WORKFLOW_MANIFEST: ${{ inputs.manifest }}
          WORKFLOW_DRY_RUN:  ${{ inputs.dry_run }}
        run: |
          python3 ansible/roles/python_scripts/build_extra_vars_disjoin.py
          chmod 600 ansible_extra_vars.json
          python3 -m json.tool ansible_extra_vars.json > /dev/null \
            && echo "✅ JSON valid" \
            || (echo "❌ JSON invalid" && exit 1)

      # ── Run playbook ─────────────────────────────────────────────────────────
      - name: "🎬 Run disjoin playbook"
        run: |
          mkdir -p ansible/logs
          ansible-playbook ansible/playbooks/disjoin-windows-domain.yaml \
            -e @ansible_extra_vars.json 2>&1 | tee ansible/logs/disjoin.log
          rc=${PIPESTATUS[0]}
          rm -f ansible_extra_vars.json
          exit $rc

      # ── Upload logs ──────────────────────────────────────────────────────────
      - name: "📤 Upload logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: disjoin-logs-${{ inputs.manifest }}
          path: ansible/logs/
          if-no-files-found: warn
          retention-days: 90
