# To test real uninstall: run workflow_dispatch with dry_run = false and a manifest
# whose VMs exist and have at least one tool from uninstall_tools_list. See docs/UNINSTALL_ONPREM_REVIEW.md.

name: Ansible-Uninstall-Onprem-Tools

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory in ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  uninstall-onprem-tools:
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Install PyYAML for manifest parsing"
        run: pip install PyYAML

      - name: "Read subscription ID from manifest"
        id: manifest_sub
        env:
          MANIFEST: ${{ inputs.manifest }}
          MANIFEST_KEY: target_subscription_id
        run: |
          SUB_ID=$(python3 ansible/roles/python_scripts/read_manifest_value.py)
          echo "subscription_id=${SUB_ID}" >> $GITHUB_OUTPUT
          echo "[INFO] Target subscription: ${SUB_ID}"

      - name: "Azure Login with user-assigned managed identity"
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          subscription-id: ${{ steps.manifest_sub.outputs.subscription_id }}
          enable-AzPSSession: false

      - name: "Display workflow configuration"
        run: |
          echo "✅ Workflow configuration:"
          echo "📄 Using manifest: ${{ inputs.manifest }}"
          echo "🔧 Dry run mode: ${{ inputs.dry_run }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🧪 Running in DRY RUN mode - Azure lookups will be skipped"
          fi

      - name: "Prepare extra vars file"
        run: |
          cat > ansible_extra_vars.json <<JSON
          {
            "manifest": "${{ inputs.manifest }}",
            "dry_run": ${{ inputs.dry_run }}
          }
          JSON

      - name: "Run playbook - uninstall onprem tools"
        run: |
          ansible-playbook ansible/playbooks/uninstall-onprem-tools.yml \
            -e @ansible_extra_vars.json
