name: Ansible-Migration-Cutover

# This workflow performs migration cutover for VMs using Azure Migrate.
# Calls: ansible/roles/python_scripts/read_manifest_value.py to read subscription ID from manifest
# Calls: ansible/playbooks/migration-cutover.yml
#
# It intelligently checks migration status before proceeding:
# - If VMs are already migrated, skips cutover and only configures patching
# - If VMs need migration, performs cutover then configures patching

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory in ansible/vars/)"
        required: true
        type: string
      confirmation:
        description: "Type 'CONFIRM' to proceed with cutover (irreversible operation)"
        required: true
        type: string
      shutdown_source_vm:
        description: "Shutdown source VM after cutover"
        required: false
        type: boolean
        default: false
      patching_schedules_file:
        description: "Path to vm_patching_schedules.json (relative to repo root)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  migration-cutover:
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg
    outputs:
      cutover_performed: ${{ steps.cutover.outputs.cutover_performed }}
      patching_configured: ${{ steps.patching.outputs.patching_configured }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Install PyYAML for manifest parsing"
        run: pip install PyYAML

      - name: "Validate confirmation"
        run: |
          if [ "${{ inputs.confirmation }}" != "CONFIRM" ]; then
            echo "Invalid confirmation. You must type 'CONFIRM' to proceed."
            exit 1
          fi
          echo "Confirmation validated. Proceeding with migration workflow."

      - name: "Validate manifest"
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      - name: "Read subscription ID from manifest"
        if: ${{ !inputs.dry_run }}
        id: manifest_sub
        env:
          MANIFEST: ${{ inputs.manifest }}
          MANIFEST_KEY: target_subscription_id
        run: |
          SUB_ID=$(python3 ansible/roles/python_scripts/read_manifest_value.py)
          echo "subscription_id=${SUB_ID}" >> $GITHUB_OUTPUT
          echo "[INFO] Target subscription: ${SUB_ID}"

      - name: "Azure Login"
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          subscription-id: ${{ steps.manifest_sub.outputs.subscription_id }}
          enable-AzPSSession: true

      - name: "Display cutover configuration"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "MIGRATION CUTOVER OPERATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Manifest         : ${{ inputs.manifest }}"
          echo "  Dry run          : ${{ inputs.dry_run }}"
          echo "  Shutdown source  : ${{ inputs.shutdown_source_vm }}"
          echo "  Patching file    : ${PATCHING_FILE:-<not provided>}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          [ "${{ inputs.dry_run }}" = "true" ] \
            && echo "DRY RUN - no changes will be made." \
            || echo "LIVE RUN - changes will be applied."

      - name: "Validate patching schedules file (if provided)"
        id: validate_patching
        run: |
          if [ -n "${{ inputs.patching_schedules_file }}" ]; then
            PATCHING_FILE="${{ inputs.patching_schedules_file }}"
            if [ -f "$PATCHING_FILE" ]; then
              echo "file_exists=true" >> $GITHUB_OUTPUT
              echo "[OK] Patching schedules file found: $PATCHING_FILE"
            else
              echo "file_exists=false" >> $GITHUB_OUTPUT
              echo "[WARN] Patching schedules file not found: $PATCHING_FILE"
            fi
          else
            echo "file_exists=false" >> $GITHUB_OUTPUT
            echo "[INFO] No patching schedules file provided"
          fi

      - name: "Prepare cutover extra vars"
        run: |
          if [ "${{ steps.validate_patching.outputs.file_exists }}" = "true" ]; then
            PATCHING_ABSOLUTE=$(readlink -f "${{ inputs.patching_schedules_file }}")
            cat > ansible_extra_vars.json <<JSON
          {
            "manifest": "${{ inputs.manifest }}",
            "patching_schedules_file": "$PATCHING_ABSOLUTE",
            "shutdown_source_vm": ${{ inputs.shutdown_source_vm }},
            "dry_run": ${{ inputs.dry_run }}
          }
          JSON
          else
            cat > ansible_extra_vars.json <<JSON
          {
            "manifest": "${{ inputs.manifest }}",
            "shutdown_source_vm": ${{ inputs.shutdown_source_vm }},
            "dry_run": ${{ inputs.dry_run }}
          }
          JSON
          fi
          echo "[INFO] Extra vars:"
          cat ansible_extra_vars.json

      - name: "Run migration cutover playbook"
        id: cutover
        run: |
          ansible-playbook ansible/playbooks/migration-cutover.yml \
            -e @ansible_extra_vars.json
          rc=$?
          [ $rc -eq 0 ] && echo "cutover_performed=true" >> $GITHUB_OUTPUT \
                        || echo "cutover_performed=false" >> $GITHUB_OUTPUT
          rm -f ansible_extra_vars.json
          exit $rc

      - name: "Set patching status output"
        id: patching
        run: |
          [ "${{ steps.validate_patching.outputs.file_exists }}" = "true" ] \
            && echo "patching_configured=true" >> $GITHUB_OUTPUT \
            || echo "patching_configured=false" >> $GITHUB_OUTPUT

      - name: "Generate workflow summary"
        if: always()
        run: |
          echo "# Migration Cutover Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Manifest**: \`${{ inputs.manifest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Shutdown Source VM**: ${{ inputs.shutdown_source_vm }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.cutover.outputs.cutover_performed }}" = "true" ]; then
            echo "- ✅ **Cutover**: Completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Cutover**: Failed or not performed" >> $GITHUB_STEP_SUMMARY
          fi
