name: Ansible-Join-Windows-Domain

# Joins Windows VMs to Active Directory (Rename → Rejoin).
# Calls: ansible/playbooks/join-windows-domain.yaml
#
# Steps executed:
#   1 — Fetch SE-Admin password from Delinea Secret Server
#   2 — Connect to each Azure VM as SE-Admin (WinRM) and disjoin  (only when force_rejoin=true)
#   3 — Connect to each Azure VM as SE-Admin (WinRM) and rename hostname to target_vm_name
#   4 — Rejoin each VM to the domain using cpoe-automation
#
# Required GitHub Secrets:
#   DELINEA_USERNAME          Service account that authenticates to Delinea
#   DELINEA_PASSWORD          Password for the Delinea service account
#   DOMAIN_ADMIN_PASSWORD     Password for the cpoe-automation domain account (Step 4)
#   AZURE_TENANT_ID           Azure tenant for managed-identity login
#   VM_MIGRATE_MI_CLIENT_ID   Client ID of the user-assigned managed identity
#
# Required GitHub Variables (vars.*):
#   DELINEA_BASE_URL          Delinea Secret Server base URL
#   DELINEA_SECRET_ID         Numeric ID of the SE-Admin secret  (preferred)
#   DELINEA_SECRET_PATH       Name/path search term              (fallback when ID not set)
#   DELINEA_SECRET_MACHINE    (Optional) Machine FQDN to narrow secret matching
#   DELINEA_SECRET_ACCOUNT    (Optional) Account filter — defaults to SE-Admin

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory under ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run — no changes applied"
        required: false
        type: boolean
        default: true
      force_rejoin:
        description: "Force disjoin first even if VM is already in the target domain"
        required: false
        type: boolean
        default: false
      skip_hostname_setup:
        description: "Skip hostname retrieval and rename steps (go directly to domain join)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  join-windows-domain:
    name: "Join — ${{ inputs.manifest }}${{ inputs.dry_run && ' [DRY RUN]' || '' }}"
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg
      DELINEA_BASE_URL: ${{ vars.DELINEA_BASE_URL != '' && vars.DELINEA_BASE_URL || 'https://dte.secretservercloud.com' }}
      DELINEA_USERNAME: ${{ secrets.DELINEA_USERNAME }}
      DELINEA_PASSWORD: ${{ secrets.DELINEA_PASSWORD }}
      DELINEA_SECRET_ID: ${{ vars.DELINEA_SECRET_ID }}
      DELINEA_SECRET_PATH: ${{ vars.DELINEA_SECRET_PATH != '' && vars.DELINEA_SECRET_PATH || 'SE-Admin' }}
      DELINEA_SECRET_MACHINE: ${{ vars.DELINEA_SECRET_MACHINE }}
      DELINEA_SECRET_NAME: ${{ vars.DELINEA_SECRET_NAME }}
      DELINEA_SECRET_ACCOUNT: ${{ vars.DELINEA_SECRET_ACCOUNT != '' && vars.DELINEA_SECRET_ACCOUNT || 'SE-Admin' }}

    steps:

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: "🔧 Install Delinea Python SDK"
        run: pip install python-tss-sdk
        shell: bash

      - name: "🔧 Upgrade Ansible"
        run: pip install --upgrade 'ansible>=2.15.0'
        shell: bash

      - name: "🔧 Install Delinea Ansible collection"
        run: ansible-galaxy collection install delinea.platform_secretserver
        shell: bash

      - name: "✅ Verify Delinea TSS lookup plugin"
        run: ansible-doc -t lookup -l | grep tss
        shell: bash

      # ── Checkout & validate ──────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "✅ Validate manifest"
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      # ── Extract VM hostname from manifest ────────────────────────────────────
      - name: "🔍 Extract VM hostname from manifest"
        shell: bash
        run: |
          MANIFEST_FILE="ansible/vars/${{ inputs.manifest }}/manifest.yml"
          
          if [ ! -f "${MANIFEST_FILE}" ]; then
            echo "❌ Manifest file not found: ${MANIFEST_FILE}"
            exit 1
          fi
          
          # Extract first VM's name from manifest (source hostname before rename)
          VM_HOSTNAME=$(python3 -c "
          import yaml
          import sys
          
          with open('${MANIFEST_FILE}', 'r') as f:
              manifest = yaml.safe_load(f)
          
          vms = manifest.get('vms', [])
          if not vms:
              print('❌ No VMs found in manifest', file=sys.stderr)
              sys.exit(1)
          
          first_vm = vms[0]
          # Prefer vm_winrm_connect_hostname, fallback to name
          hostname = first_vm.get('vm_winrm_connect_hostname') or first_vm.get('name')
          
          if not hostname:
              print('❌ No hostname found in first VM entry', file=sys.stderr)
              sys.exit(1)
          
          print(hostname)
          ")
          
          if [ $? -ne 0 ] || [ -z "${VM_HOSTNAME}" ]; then
            echo "❌ Failed to extract VM hostname from manifest"
            exit 1
          fi
          
          # Construct FQDN for Delinea lookup
          VM_FQDN="${VM_HOSTNAME}.dtenet.com"
          echo "DELINEA_SECRET_MACHINE=${VM_FQDN}" >> $GITHUB_ENV
          echo "✅ Set DELINEA_SECRET_MACHINE=${VM_FQDN}"

      # ── Azure login (live runs only) ─────────────────────────────────────────
      - name: "🔐 Azure Login"
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: true

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: "📊 Display configuration"
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  Ansible-Join-Windows-Domain — ${{ inputs.manifest }}"
          echo "════════════════════════════════════════════════════════"
          echo "  Dry run         : ${{ inputs.dry_run }}"
          echo "  Force rejoin    : ${{ inputs.force_rejoin }}"
          echo ""
          echo "  Step 1 — Fetch SE-Admin password from Delinea"
          echo "           URL             : ${DELINEA_BASE_URL}"
          echo "           Auth user       : ${DELINEA_USERNAME}"
          echo "           Machine filter  : ${DELINEA_SECRET_MACHINE:-<not set>}"
          echo "           Account filter  : ${DELINEA_SECRET_ACCOUNT}"
          echo ""
          if [ "${{ inputs.force_rejoin }}" = "true" ]; then
            echo "  Step 2 — Disjoin VM from domain → WORKGROUP  [SE-Admin via WinRM]"
          else
            echo "  Step 2 — Disjoin                             [SKIPPED — force_rejoin=false]"
          fi
          echo "  Step 3 — Rename hostname to target_vm_name   [SE-Admin via WinRM]"
          echo "  Step 4 — Rejoin VM to domain                 [cpoe-automation]"
          echo "════════════════════════════════════════════════════════"
          [ "${{ inputs.dry_run }}" = "true" ] \
            && echo "🧪 DRY RUN — no changes will be made." \
            || echo "🚀 LIVE RUN — changes will be applied."

      # ── Resolve Delinea secret ID ────────────────────────────────────────────
      - name: "🔎 Resolve Delinea secret ID"
        shell: bash
        run: |
          if [ -n "${DELINEA_SECRET_ID}" ]; then
            echo "✅ DELINEA_SECRET_ID already provided: ${DELINEA_SECRET_ID}"
            exit 0
          fi
          python3 ansible/roles/python_scripts/resolve_delinea_secret_id.py

      # ── Extra-vars ───────────────────────────────────────────────────────────
      # Secrets are passed via env vars into the script — never shell-interpolated.
      # WinRM password is fetched from Delinea in the playbook pre_tasks.
      # Do not pass winrm_password here to avoid overriding Delinea with stale GitHub secrets.
      - name: "🧱 Prepare Ansible extra-vars"
        env:
          WORKFLOW_MANIFEST:            ${{ inputs.manifest }}
          WORKFLOW_DRY_RUN:             ${{ inputs.dry_run }}
          WORKFLOW_FORCE_REJOIN:        ${{ inputs.force_rejoin }}
          WORKFLOW_SKIP_HOSTNAME_SETUP: ${{ inputs.skip_hostname_setup }}
          SECRET_DOMAIN_ADMIN_PASSWORD: ${{ secrets.DOMAIN_ADMIN_PASSWORD }}
          SECRET_DOMAIN_OU_PATH:        ${{ secrets.DOMAIN_OU_PATH }}
        run: |
          python3 ansible/roles/python_scripts/build_extra_vars_join.py
          chmod 600 ansible_extra_vars.json
          python3 -m json.tool ansible_extra_vars.json > /dev/null \
            && echo "✅ JSON valid" \
            || (echo "❌ JSON invalid" && exit 1)

      # ── Run playbook ─────────────────────────────────────────────────────────
      - name: "🎬 Run join playbook"
        run: |
          mkdir -p ansible/logs
          ansible-playbook ansible/playbooks/join-windows-domain.yaml \
            -e @ansible_extra_vars.json 2>&1 | tee ansible/logs/join.log
          rc=${PIPESTATUS[0]}
          rm -f ansible_extra_vars.json
          exit $rc

      # ── Upload logs ──────────────────────────────────────────────────────────
      - name: "📤 Upload logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: join-logs-${{ inputs.manifest }}
          path: ansible/logs/
          if-no-files-found: warn
          retention-days: 90
