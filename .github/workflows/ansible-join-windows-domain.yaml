name: Ansible-Join-Windows-Domain

# This workflow joins Windows servers to an Active Directory domain.
# Steps:
#   1. Login to Azure using target_subscription_id from the manifest
#   2. Open RDP (3389) and WinRM (5985) via Azure VM Run Command (Windows Firewall)
#   3. Resolve the SE-Admin WinRM password from Delinea using target_vm_name
#   4. TCP test WinRM port connectivity
#   5. Disjoin VM from domain using SE-Admin + Delinea password
#   6. Rename hostname using local Administrator + SE-Admin (Delinea) password
#   7. Join VM to domain using cpoe-automation + DOMAIN_ADMIN_PASSWORD secret

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory in ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run - no changes will be made"
        required: false
        type: boolean
        default: true
      force_rejoin:
        description: "Disjoin then rejoin cycle (recommended for migrated VMs with stale trust)"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  join-windows-domain:
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg
      AZURE_CLOUD_API_PROFILE: latest
      DELINEA_BASE_URL: ${{ vars.DELINEA_BASE_URL != '' && vars.DELINEA_BASE_URL || 'https://dte.secretservercloud.com' }}
      DELINEA_USERNAME: ${{ secrets.DELINEA_USERNAME }}
      DELINEA_PASSWORD: ${{ secrets.DELINEA_PASSWORD }}
      DELINEA_SECRET_ACCOUNT: ${{ vars.DELINEA_SECRET_ACCOUNT != '' && vars.DELINEA_SECRET_ACCOUNT || 'SE-Admin' }}

    steps:
      # ------------------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Display current commit SHA
        run: |
          echo "Running workflow on commit: $(git rev-parse HEAD)"
          echo "Branch: $(git branch --show-current)"
          echo "Last commit message: $(git log -1 --pretty=%B)"
        shell: bash

      - name: Install Python dependencies
        run: pip install -r requirements.txt
        shell: bash

      - name: Upgrade Azure SDK Python packages (before Ansible collections)
        run: |
          echo "=== Current Azure SDK versions (all locations) ==="
          pip list --user | grep -E "azure-" 2>/dev/null || echo "No user azure packages"
          pip list | grep -E "azure-" 2>/dev/null || echo "No system azure packages"
          echo ""
          echo "=== Uninstalling old Azure SDK packages from user location ==="
          pip uninstall -y $(pip list --user | grep azure- | awk '{print $1}') 2>/dev/null || true
          echo ""
          echo "=== Installing latest Azure SDK packages (version-pinned, compatible set) ==="
          pip install --force-reinstall --no-cache-dir \
            "azure-mgmt-compute>=30.0.0" \
            "azure-mgmt-network>=23.0.0" \
            "azure-mgmt-resource>=22.0.0" \
            "azure-mgmt-core>=1.4.0" \
            "azure-common>=1.1.28" \
            "azure-identity>=1.15.0" \
            "azure-core>=1.29.0"
          echo ""
          echo "=== Updated Azure SDK versions ==="
          pip list | grep -E "azure-"
        shell: bash

      - name: Install Ansible collections from requirements.yml
        run: |
          echo "=== Installing/Upgrading Ansible collections ==="
          ansible-galaxy collection install -r ansible/requirements.yml --upgrade
          echo ""
          echo "=== Installed Azure collection version ==="
          ansible-galaxy collection list | grep azure.azcollection || echo "Azure collection not found"
        shell: bash

      - name: Install Delinea Platform Secret Server Ansible Collection
        run: ansible-galaxy collection install delinea.platform_secretserver
        shell: bash

      - name: Verify Delinea lookup plugin is installed
        run: ansible-doc -t lookup -l | grep tss
        shell: bash

      # ------------------------------------------------------------------
      # Validate manifest
      # ------------------------------------------------------------------

      - name: Validate manifest
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      # ------------------------------------------------------------------
      # Read target_subscription_id from manifest
      # ------------------------------------------------------------------

      - name: Read target subscription ID from manifest
        id: read_subscription
        run: |
          SUB_ID=$(MANIFEST="${{ inputs.manifest }}" MANIFEST_KEY="target_subscription_id" \
            python3 ansible/roles/python_scripts/read_manifest_value.py)
          echo "subscription_id=${SUB_ID}" >> "$GITHUB_OUTPUT"
          echo "[INFO] Target subscription: ${SUB_ID}"
        shell: bash

      # ------------------------------------------------------------------
      # Upgrade Azure CLI before authentication (no auth required)
      # ------------------------------------------------------------------

      - name: Upgrade Azure CLI to latest version (pre-login)
        run: |
          echo "=== Current Azure CLI Version ==="
          az version --output yaml 2>/dev/null | grep azure-cli || echo "Azure CLI may not be properly installed"
          echo ""
          echo "=== Upgrading Azure CLI via pip ==="
          pip install --upgrade azure-cli
          echo ""
          echo "=== Updated Azure CLI Version ==="
          az version --output yaml | grep azure-cli
        shell: bash

      # ------------------------------------------------------------------
      # Azure login using the subscription from the manifest
      # ------------------------------------------------------------------

      - name: Azure login with user-assigned managed identity
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.CLIENT_ID_VM_MIGRATE_DEV_CU_MI }}
          subscription-id: ${{ steps.read_subscription.outputs.subscription_id }}
          allow-no-subscriptions: false
          enable-AzPSSession: true

      - name: Verify Azure CLI authentication
        if: ${{ !inputs.dry_run }}
        run: |
          echo "=== Current Authentication ==="
          az account show --output table
          echo ""
          echo "=== Subscription Context ==="
          CURRENT_SUB=$(az account show --query id -o tsv)
          EXPECTED_SUB="${{ steps.read_subscription.outputs.subscription_id }}"
          echo "Current subscription:  ${CURRENT_SUB}"
          echo "Expected subscription: ${EXPECTED_SUB}"
          if [ "${CURRENT_SUB}" != "${EXPECTED_SUB}" ]; then
            echo "[ERROR] Subscription mismatch!"
            exit 1
          fi
          echo "[OK] Subscription context is correct"
          echo ""
          echo "=== Verifying compute API ==="
          az provider show \
            --namespace Microsoft.Compute \
            --query "resourceTypes[?resourceType=='virtualMachines'].apiVersions[0]" \
            -o tsv || echo "[WARN] Unable to verify compute API"
        shell: bash

      # ------------------------------------------------------------------
      # Ensure Azure NSG has WinRM rule allowing GitHub runner IP
      # ------------------------------------------------------------------

      - name: Ensure Azure NSG allows WinRM from GitHub runner
        if: ${{ !inputs.dry_run }}
        run: MANIFEST="${{ inputs.manifest }}" python3 ansible/roles/python_scripts/ensure_nsg_winrm_rule.py
        shell: bash

      # ------------------------------------------------------------------
      # Open RDP and WinRM on the VM Windows Firewall via Azure Run Command
      # ------------------------------------------------------------------

      - name: Verify script version
        run: |
          echo "=== Script Version Check ==="
          head -n 6 ansible/roles/python_scripts/configure_winrm_firewall.py \
            | grep -i version || echo "[WARN] Version line not found"
          echo "Script checksum: $(sha256sum ansible/roles/python_scripts/configure_winrm_firewall.py | awk '{print $1}')"
        shell: bash

      - name: Configure VM Windows Firewall (RDP 3389 and WinRM 5985)
        if: ${{ !inputs.dry_run }}
        run: MANIFEST="${{ inputs.manifest }}" python3 ansible/roles/python_scripts/configure_winrm_firewall.py
        shell: bash

      # ------------------------------------------------------------------
      # Extract VM hostname for Delinea lookup
      # Uses target_vm_name from manifest as the Delinea machine filter
      # ------------------------------------------------------------------

      - name: Extract VM hostname for Delinea lookup
        run: |
          MANIFEST_FILE="ansible/vars/${{ inputs.manifest }}/manifest.yml" \
            python3 ansible/roles/python_scripts/extract_vm_hostname.py
        shell: bash

      # ------------------------------------------------------------------
      # Resolve SE-Admin password from Delinea using target_vm_name
      # Writes per-VM env vars: winrm_value_<target_vm_name_lowercase>
      # ------------------------------------------------------------------

      - name: Resolve SE-Admin WinRM password from Delinea
        id: delinea_fetch
        run: MANIFEST="${{ inputs.manifest }}" python3 ansible/roles/python_scripts/resolve_delinea_secret_id.py
        shell: bash
        env:
          DELINEA_SECRET_ACCOUNT: SE-Admin

      # ------------------------------------------------------------------
      # TCP test WinRM port before proceeding
      # ------------------------------------------------------------------

      - name: TCP test WinRM port connectivity
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail

          python3 - <<'PYEOF'
          import json
          import os
          import socket
          import subprocess
          import sys

          import yaml

          manifest_file = os.environ.get("MANIFEST_FILE", "").strip()
          if not manifest_file:
              print("[ERROR] MANIFEST_FILE not set")
              sys.exit(1)

          with open(manifest_file, encoding="utf-8") as fh:
              manifest = yaml.safe_load(fh) or {}

          subscription_id = manifest.get("target_subscription_id", "")
          target_rg = manifest.get("target_resource_group", "")
          vms = manifest.get("vms") or []
          failed = []

          def get_vm_private_ip(rg, vm_name, sub_id):
              """Resolve a VM's private IP via Azure CLI NIC lookup."""
              cmd = ["az", "vm", "nic", "list",
                     "--resource-group", rg, "--vm-name", vm_name,
                     "--query", "[0].id", "-o", "tsv",
                     "--subscription", sub_id]
              r = subprocess.run(cmd, capture_output=True, text=True, env=os.environ.copy())
              if r.returncode != 0 or not r.stdout.strip():
                  return None
              nic_id = r.stdout.strip()
              cmd2 = ["az", "network", "nic", "show", "--ids", nic_id,
                      "--query", "ipConfigurations[0].privateIPAddress", "-o", "tsv",
                      "--subscription", sub_id]
              r2 = subprocess.run(cmd2, capture_output=True, text=True, env=os.environ.copy())
              if r2.returncode != 0 or not r2.stdout.strip():
                  return None
              return r2.stdout.strip()

          for vm in vms:
              azure_vm_name = vm.get("target_vm_name", "")
              os_hostname = vm.get("name", "")
              port = int(vm.get("vm_winrm_port", 5985))

              if not azure_vm_name:
                  print("[WARN] No target_vm_name for VM entry, skipping TCP test")
                  continue

              # The runner cannot resolve the VM's domain FQDN (e.g. dca-tst1856.dtenet.com)
              # since it is outside the corporate DNS scope. Resolve the private IP
              # from Azure using the Azure resource name (target_vm_name).
              connect_addr = None
              if subscription_id and target_rg:
                  print("[INFO] Resolving private IP for VM: %s (OS hostname: %s)" % (azure_vm_name, os_hostname))
                  connect_addr = get_vm_private_ip(target_rg, azure_vm_name, subscription_id)
                  if connect_addr:
                      print("[INFO] Resolved private IP: %s" % connect_addr)
                  else:
                      print("[WARN] Could not resolve private IP for %s" % azure_vm_name)

              if not connect_addr:
                  print("[FAIL] Cannot determine connect address for %s" % azure_vm_name)
                  failed.append(azure_vm_name)
                  continue

              print("[INFO] Testing WinRM TCP %s:%d (Azure VM: %s)" % (connect_addr, port, azure_vm_name))
              try:
                  with socket.create_connection((connect_addr, port), timeout=10):
                      print("[OK] WinRM reachable: %s:%d" % (connect_addr, port))
              except (socket.timeout, ConnectionRefusedError, OSError) as ex:
                  print("[FAIL] WinRM not reachable on %s:%d - %s" % (connect_addr, port, ex))
                  failed.append("%s (%s)" % (azure_vm_name, connect_addr))

          if failed:
              print("[FAIL] WinRM TCP test failed for: %s" % ", ".join(failed))
              sys.exit(1)

          print("[OK] All WinRM ports reachable")
          PYEOF
        shell: bash
        env:
          MANIFEST_FILE: ansible/vars/${{ inputs.manifest }}/manifest.yml

      # ------------------------------------------------------------------
      # Display configuration
      # ------------------------------------------------------------------

      - name: Display configuration
        run: |
          echo "[INFO] Manifest:      ${{ inputs.manifest }}"
          echo "[INFO] Dry run:       ${{ inputs.dry_run }}"
          echo "[INFO] Force rejoin:  ${{ inputs.force_rejoin }}"
          echo "[INFO] Subscription:  ${{ steps.read_subscription.outputs.subscription_id }}"
          echo "[INFO] Domain admin:  cpoe-automation (from DOMAIN_ADMIN_PASSWORD secret)"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "[INFO] Running in DRY RUN mode - no actual changes will be made"
          else
            echo "[INFO] Running LIVE - changes will be applied to the VM"
          fi
        shell: bash

      # ------------------------------------------------------------------
      # Build ansible_extra_vars.json
      # Disjoin step: uses SE-Admin + Delinea password (winrm_password injected by resolve step)
      # Join step:    uses cpoe-automation + DOMAIN_ADMIN_PASSWORD secret
      # ------------------------------------------------------------------

      - name: Build extra vars file for domain join workflow
        run: |
          python3 ansible/roles/python_scripts/json_builder.py join
          chmod 600 ansible_extra_vars.json
          python3 -m json.tool ansible_extra_vars.json > /dev/null \
            && echo "[OK] JSON is valid" \
            || (echo "[FAIL] JSON validation failed" && exit 1)
        shell: bash
        env:
          WORKFLOW_MANIFEST: ${{ inputs.manifest }}
          WORKFLOW_DRY_RUN: ${{ inputs.dry_run }}
          WORKFLOW_FORCE_REJOIN: ${{ inputs.force_rejoin }}
          WORKFLOW_SKIP_HOSTNAME_SETUP: "false"
          SECRET_DOMAIN_ADMIN_VALUE: ${{ secrets.DOMAIN_ADMIN_PASSWORD }}
          SECRET_DOMAIN_OU_PATH: ${{ secrets.DOMAIN_OU_PATH }}
          WORKFLOW_RENAME_USERNAME: Administrator

      - name: Debug extra vars file content
        run: |
          echo "[INFO] Contents of ansible_extra_vars.json:"
          cat ansible_extra_vars.json | python3 -m json.tool
          echo ""
          echo "[INFO] Checking for force_rejoin value:"
          FORCE_REJOIN=$(python3 -c "import json; data = json.load(open('ansible_extra_vars.json')); print(data.get('force_rejoin', 'NOT FOUND'))")
          echo "force_rejoin = ${FORCE_REJOIN}"
        shell: bash

      # ------------------------------------------------------------------
      # Run playbook
      # Order inside the playbook:
      #   1. Disjoin  - SE-Admin + Delinea password  (resolved above per VM)
      #   2. Rename   - Administrator + SE-Admin (Delinea) password
      #   3. Join     - cpoe-automation + DOMAIN_ADMIN_PASSWORD
      # ------------------------------------------------------------------

      - name: Run playbook - join Windows servers to domain
        run: |
          mkdir -p ansible/logs
          ansible-playbook ansible/playbooks/join-windows-domain.yaml \
            -e @ansible_extra_vars.json 2>&1 | tee ansible/logs/ansible-run.log
          rc=${PIPESTATUS[0]}
          rm -f ansible_extra_vars.json
          exit $rc
        shell: bash

      # ------------------------------------------------------------------
      # Upload logs
      # ------------------------------------------------------------------

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-join-logs
          path: ansible/logs/
          if-no-files-found: warn
          retention-days: 90
