name: Ansible-Join-Windows-Domain

# This workflow joins Windows servers to an Active Directory domain using Azure Run Command.
# Steps:
#   1. Login to Azure using target_subscription_id from the manifest
#   2. Resolve the SE-Admin password from Delinea using target_vm_name
#   3. Disjoin VM from domain using Azure Run Command with SE-Admin credentials
#   4. Rename hostname using Azure Run Command as SYSTEM
#   5. Join VM to domain using Azure Run Command with cpoe-automation credentials from DOMAIN_ADMIN_PASSWORD secret
#
# Note: All operations use Azure Run Command API exclusively.

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory in ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run - no changes will be made"
        required: false
        type: boolean
        default: true
      force_rejoin:
        description: "Disjoin then rejoin cycle (recommended for migrated VMs with stale trust)"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  join-windows-domain:
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg
      AZURE_CLOUD_API_PROFILE: latest
      DELINEA_BASE_URL: ${{ vars.DELINEA_BASE_URL != '' && vars.DELINEA_BASE_URL || 'https://dte.secretservercloud.com' }}
      DELINEA_USERNAME: ${{ secrets.DELINEA_USERNAME }}
      DELINEA_PASSWORD: ${{ secrets.DELINEA_PASSWORD }}
      DELINEA_SECRET_ACCOUNT: ${{ vars.DELINEA_SECRET_ACCOUNT != '' && vars.DELINEA_SECRET_ACCOUNT || 'SE-Admin' }}

    steps:
      # ------------------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Display current commit SHA
        run: |
          echo "Running workflow on commit: $(git rev-parse HEAD)"
          echo "Branch: $(git branch --show-current)"
          echo "Last commit message: $(git log -1 --pretty=%B)"
        shell: bash

      - name: Install Python dependencies (includes Azure CLI and SDK)
        run: |
          echo "=== Installing Python dependencies from requirements.txt ==="
          pip install -r requirements.txt
          echo ""
          echo "=== Installed Azure CLI and SDK versions ==="
          az version --output yaml 2>/dev/null | grep azure-cli || echo "Azure CLI may not be properly installed"
          pip list | grep -E "azure-"
        shell: bash

      - name: Install Ansible collections from requirements.yml
        run: |
          echo "=== Installing/Upgrading Ansible collections ==="
          ansible-galaxy collection install -r ansible/requirements.yml --upgrade
          echo ""
          echo "=== Installed Azure collection version ==="
          ansible-galaxy collection list | grep azure.azcollection || echo "Azure collection not found"
        shell: bash

      - name: Install Delinea Platform Secret Server Ansible Collection
        run: ansible-galaxy collection install delinea.platform_secretserver
        shell: bash

      - name: Verify Delinea lookup plugin is installed
        run: ansible-doc -t lookup -l | grep tss
        shell: bash

      # ------------------------------------------------------------------
      # Validate manifest
      # ------------------------------------------------------------------

      - name: Validate manifest
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      # ------------------------------------------------------------------
      # Read target_subscription_id from manifest
      # ------------------------------------------------------------------

      - name: Read target subscription ID from manifest
        id: read_subscription
        run: |
          SUB_ID=$(MANIFEST="${{ inputs.manifest }}" MANIFEST_KEY="target_subscription_id" \
            python3 ansible/roles/python_scripts/read_manifest_value.py)
          echo "subscription_id=${SUB_ID}" >> "$GITHUB_OUTPUT"
          echo "[INFO] Target subscription: ${SUB_ID}"
        shell: bash

      # ------------------------------------------------------------------
      # Azure login using the subscription from the manifest
      # ------------------------------------------------------------------

      - name: Azure login with user-assigned managed identity
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.CLIENT_ID_VM_MIGRATE_DEV_CU_MI }}
          subscription-id: ${{ steps.read_subscription.outputs.subscription_id }}
          allow-no-subscriptions: false
          enable-AzPSSession: true

      - name: Verify Azure CLI authentication
        if: ${{ !inputs.dry_run }}
        run: |
          echo "=== Current Authentication ==="
          az account show --output table
          echo ""
          echo "=== Subscription Context ==="
          CURRENT_SUB=$(az account show --query id -o tsv)
          EXPECTED_SUB="${{ steps.read_subscription.outputs.subscription_id }}"
          echo "Current subscription:  ${CURRENT_SUB}"
          echo "Expected subscription: ${EXPECTED_SUB}"
          if [ "${CURRENT_SUB}" != "${EXPECTED_SUB}" ]; then
            echo "[ERROR] Subscription mismatch!"
            exit 1
          fi
          echo "[OK] Subscription context is correct"
          echo ""
          echo "=== Verifying compute API ==="
          az provider show \
            --namespace Microsoft.Compute \
            --query "resourceTypes[?resourceType=='virtualMachines'].apiVersions[0]" \
            -o tsv || echo "[WARN] Unable to verify compute API"
        shell: bash

      # ------------------------------------------------------------------
      # Extract VM hostname for Delinea lookup
      # Uses target_vm_name from manifest as the Delinea machine filter
      # ------------------------------------------------------------------

      - name: Extract VM hostname for Delinea lookup
        run: |
          MANIFEST_FILE="ansible/vars/${{ inputs.manifest }}/manifest.yml" \
            python3 ansible/roles/python_scripts/extract_vm_hostname.py
        shell: bash

      # ------------------------------------------------------------------
      # Check out SE-Admin password from Delinea using target_vm_name
      # Locks the secret and retrieves the password (may be rotated)
      # Writes per-VM env vars: 
      #   - resolved_credential_<target_vm_name_lowercase> (password)
      #   - delinea_secret_id_<target_vm_name_lowercase> (for check-in)
      # Secrets will be checked in at the end of the workflow
      # ------------------------------------------------------------------

      - name: Check out SE-Admin password from Delinea
        id: delinea_fetch
        run: MANIFEST="${{ inputs.manifest }}" python3 ansible/roles/python_scripts/resolve_delinea_secret_id.py
        shell: bash
        env:
          DELINEA_SECRET_ACCOUNT: SE-Admin

      # ------------------------------------------------------------------
      # Display configuration
      # ------------------------------------------------------------------

      - name: Display configuration
        run: |
          echo "[INFO] Manifest:      ${{ inputs.manifest }}"
          echo "[INFO] Dry run:       ${{ inputs.dry_run }}"
          echo "[INFO] Force rejoin:  ${{ inputs.force_rejoin }}"
          echo "[INFO] Subscription:  ${{ steps.read_subscription.outputs.subscription_id }}"
          echo "[INFO] Domain admin:  cpoe-automation (from DOMAIN_ADMIN_PASSWORD secret)"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "[INFO] Running in DRY RUN mode - no actual changes will be made"
          else
            echo "[INFO] Running LIVE - changes will be applied to the VM"
          fi
        shell: bash

      # ------------------------------------------------------------------
      # Build ansible_extra_vars.json
      # Disjoin: Uses SE-Admin with -LocalCredential via Azure Run Command
      # Join:    Uses cpoe-automation domain admin from DOMAIN_ADMIN_PASSWORD secret via Azure Run Command
      # ------------------------------------------------------------------

      - name: Build extra vars file for domain join workflow
        run: |
          python3 ansible/roles/python_scripts/json_builder.py join
          chmod 600 ansible_extra_vars.json
          python3 -m json.tool ansible_extra_vars.json > /dev/null \
            && echo "[OK] JSON is valid" \
            || (echo "[FAIL] JSON validation failed" && exit 1)
        shell: bash
        env:
          WORKFLOW_MANIFEST: ${{ inputs.manifest }}
          WORKFLOW_DRY_RUN: ${{ inputs.dry_run }}
          WORKFLOW_FORCE_REJOIN: ${{ inputs.force_rejoin }}
          WORKFLOW_SKIP_HOSTNAME_SETUP: "false"
          SECRET_DOMAIN_ADMIN_VALUE: ${{ secrets.DOMAIN_ADMIN_PASSWORD }}
          SECRET_DOMAIN_OU_PATH: ${{ secrets.DOMAIN_OU_PATH }}
          WORKFLOW_RENAME_USERNAME: Administrator

      - name: Debug extra vars file content
        run: |
          echo "[INFO] Contents of ansible_extra_vars.json:"
          cat ansible_extra_vars.json | python3 -m json.tool
          echo ""
          echo "[INFO] Checking for force_rejoin value:"
          FORCE_REJOIN=$(python3 -c "import json; data = json.load(open('ansible_extra_vars.json')); print(data.get('force_rejoin', 'NOT FOUND'))")
          echo "force_rejoin = ${FORCE_REJOIN}"
        shell: bash

      # ------------------------------------------------------------------
      # Run playbook
      # Order inside the playbook:
      #   1. Disjoin  - SE-Admin + Delinea password  (resolved above per VM)
      #   2. Rename   - Administrator + SE-Admin (Delinea) password
      #   3. Join     - cpoe-automation + DOMAIN_ADMIN_PASSWORD
      # ------------------------------------------------------------------

      - name: Run playbook - join Windows servers to domain
        run: |
          mkdir -p ansible/logs
          ansible-playbook ansible/playbooks/join-windows-domain.yaml \
            -e @ansible_extra_vars.json 2>&1 | tee ansible/logs/ansible-run.log
          rc=${PIPESTATUS[0]}
          rm -f ansible_extra_vars.json
          exit $rc
        shell: bash

      # ------------------------------------------------------------------
      # Check in Delinea secrets
      # Releases the secrets that were checked out at the beginning
      # Runs even if playbook fails to ensure secrets are not left locked
      # ------------------------------------------------------------------

      - name: Check in Delinea secrets
        if: always()
        run: MANIFEST="${{ inputs.manifest }}" python3 ansible/roles/python_scripts/checkin_delinea_secrets.py
        shell: bash
        env:
          FAILURE_MODE: continue

      # ------------------------------------------------------------------
      # Upload logs
      # ------------------------------------------------------------------

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-join-logs
          path: ansible/logs/
          if-no-files-found: warn
          retention-days: 90
