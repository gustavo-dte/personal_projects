name: Ansible-Join-Windows-Domain

# Joins Windows VMs to Active Directory with optional disjoin-rename-join cycle.
# When force_rejoin=true (default): Disjoins -> Renames -> Rejoins (recommended for migrated VMs with stale trust)
# When force_rejoin=false: Only joins if VM is not already in the domain
# Calls: ansible/roles/python_scripts/resolve_delinea_secret_id.py for per-VM password retrieval  # pragma: allowlist secret
# Calls: ansible/playbooks/join-windows-domain.yaml
#
# Steps executed when force_rejoin=true:
#   1 - Fetch per-VM SE-Admin passwords from Delinea Secret Server (for WinRM connectivity)  # pragma: allowlist secret
#       Uses ansible/roles/python_scripts/resolve_delinea_secret_id.py to dynamically query Delinea for each VM
#       based on vm_winrm_connect_hostname from manifest, or uses vm_delinea_secret_id if explicitly set
#   2 - Disjoin from current domain (if joined)
#   3 - Rename VM hostname (if needed)
#   4 - Join to target domain using cpoe-automation domain account
#
# Required GitHub Secrets:
#   DELINEA_USERNAME          Service account that authenticates to Delinea Secret Server
#   DELINEA_PASSWORD          Secret value for the Delinea service account  # pragma: allowlist secret
#   DOMAIN_ADMIN_PASSWORD     Secret value for the cpoe-automation domain account  # pragma: allowlist secret
#   AZURE_TENANT_ID           Azure tenant for managed-identity login
#   VM_MIGRATE_MI_CLIENT_ID   Client ID of the user-assigned managed identity
#
# Required GitHub Variables (vars.*):
#   DELINEA_BASE_URL          Delinea Secret Server base URL (defaults to https://dte.secretservercloud.com)
#   DELINEA_DOMAIN_SUFFIX     Domain suffix appended to hostnames (defaults to .dtenet.com)

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory under ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run - no changes applied"
        required: false
        type: boolean
        default: true
      force_rejoin:
        description: "Disjoin -> Rename -> Rejoin cycle (recommended for migrated VMs with stale trust)"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  join-windows-domain:
    name: "Join — ${{ inputs.manifest }}${{ inputs.dry_run && ' [DRY RUN]' || '' }}"
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg
      DELINEA_BASE_URL: ${{ vars.DELINEA_BASE_URL != '' && vars.DELINEA_BASE_URL || 'https://dte.secretservercloud.com' }}
      DELINEA_USERNAME: ${{ secrets.DELINEA_USERNAME }}
      DELINEA_PASSWORD: ${{ secrets.DELINEA_PASSWORD }}  # pragma: allowlist secret
      DELINEA_DOMAIN_SUFFIX: ${{ vars.DELINEA_DOMAIN_SUFFIX != '' && vars.DELINEA_DOMAIN_SUFFIX || '.dtenet.com' }}

    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Ansible environment"
        uses: ./.github/actions/setup-ansible-environment

      - name: "Install PyYAML for manifest parsing"
        run: pip install PyYAML

      - name: "Validate manifest"
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      - name: "Azure Login"
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: true

      - name: "Ensure WinRM NSG rule exists for VM connectivity"
        if: ${{ !inputs.dry_run }}
        env:
          MANIFEST: ${{ inputs.manifest }}
        run: |
          echo "[INFO] Checking WinRM NSG rules for VMs in manifest: ${MANIFEST}"
          
          # Load manifest to get VM details
          python3 << 'EOF'
          import yaml
          import os
          import subprocess
          import sys
          
          manifest_path = f"ansible/vars/{os.environ['MANIFEST']}/manifest.yml"
          with open(manifest_path, 'r') as f:
              manifest = yaml.safe_load(f)
          
          vms = manifest.get('vms', [])
          target_rg = manifest.get('target_resource_group', '')
          
          if not target_rg:
              print("[ERROR] target_resource_group not found in manifest")
              sys.exit(1)
          
          target_subscription_id = manifest.get('target_subscription_id', '')
          if target_subscription_id:
              print(f"[INFO] Setting Azure subscription context: {target_subscription_id}")
              subprocess.run(['az', 'account', 'set', '--subscription', target_subscription_id], check=True)
          
          for vm in vms:
              # name = Azure VM resource name
              # target_vm_name = Windows hostname (may differ, used for WinRM after firewall configured)
              azure_vm_name = vm.get('name', '')
              target_vm_name = vm.get('target_vm_name', azure_vm_name)
              
              if not azure_vm_name:
                  print("[WARN] VM has no 'name' field, skipping")
                  continue
              
              print(f"[INFO] Checking NSG for Azure VM: {azure_vm_name} (target hostname: {target_vm_name})")
              
              # Get NIC name for VM
              nic_result = subprocess.run(
                  ['az', 'vm', 'nic', 'list', '--resource-group', target_rg, '--vm-name', azure_vm_name, '--query', '[0].id', '-o', 'tsv'],
                  capture_output=True, text=True, check=False
              )
              
              if nic_result.returncode != 0:
                  print(f"[WARN] Could not get NIC for Azure VM {azure_vm_name}")
                  continue
              
              nic_id = nic_result.stdout.strip()
              if not nic_id:
                  print(f"[WARN] No NIC found for Azure VM {azure_vm_name}")
                  continue
              
              nic_name = nic_id.split('/')[-1]
              
              # Get NSG attached to NIC
              nsg_result = subprocess.run(
                  ['az', 'network', 'nic', 'show', '--ids', nic_id, '--query', 'networkSecurityGroup.id', '-o', 'tsv'],
                  capture_output=True, text=True, check=False
              )
              
              if nsg_result.returncode != 0:
                  print(f"[WARN] Could not get NSG for NIC {nic_name}")
                  continue
              
              nsg_id = nsg_result.stdout.strip()
              if not nsg_id:
                  print(f"[WARN] No NSG attached to NIC {nic_name}")
                  continue
              
              nsg_name = nsg_id.split('/')[-1]
              nsg_rg = nsg_id.split('/')[4]
              
              print(f"[INFO] Found NSG: {nsg_name} in RG: {nsg_rg}")
              
              # Check if WinRM rule exists
              rule_check = subprocess.run(
                  ['az', 'network', 'nsg', 'rule', 'show', '--resource-group', nsg_rg, '--nsg-name', nsg_name, '--name', 'allow-winrm'],
                  capture_output=True, text=True, check=False
              )
              
              if rule_check.returncode == 0:
                  print(f"[OK] WinRM NSG rule already exists for Azure VM {azure_vm_name}")
              else:
                  print(f"[INFO] Creating WinRM HTTP NSG rule for Azure VM {azure_vm_name}")
                  create_result = subprocess.run(
                      [
                          'az', 'network', 'nsg', 'rule', 'create',
                          '--resource-group', nsg_rg,
                          '--nsg-name', nsg_name,
                          '--name', 'allow-winrm',
                          '--priority', '1001',
                          '--direction', 'Inbound',
                          '--access', 'Allow',
                          '--protocol', 'Tcp',
                          '--destination-port-ranges', '5985',
                          '--source-address-prefixes', '10.0.0.0/8',
                          '--description', 'Allow WinRM HTTP from internal network for GitHub Actions runner'
                      ],
                      capture_output=True, text=True, check=False
                  )
                  
                  if create_result.returncode == 0:
                      print(f"[OK] WinRM NSG rule created for Azure VM {azure_vm_name}")
                  else:
                      print(f"[ERROR] Failed to create WinRM NSG rule for Azure VM {azure_vm_name}: {create_result.stderr}")
                      sys.exit(1)
          EOF

      - name: "Configure Windows Firewall on VMs for WinRM (Azure Run Command)"
        if: ${{ !inputs.dry_run }}
        env:
          MANIFEST: ${{ inputs.manifest }}
        run: |
          echo "[INFO] Configuring Windows Firewall on VMs to allow WinRM"
          python3 << 'EOF'
          import yaml, os, subprocess, sys, json, time
          
          manifest_path = f"ansible/vars/{os.environ['MANIFEST']}/manifest.yml"
          
          try:
              with open(manifest_path, 'r') as f:
                  manifest = yaml.safe_load(f)
          except Exception as e:
              print(f"[ERROR] Failed to load manifest: {e}")
              sys.exit(1)
          
          vms = manifest.get('vms', [])
          if not vms:
              print("[WARNING] No VMs found in manifest")
              sys.exit(0)
          
          target_rg = manifest.get('target_resource_group', '')
          if not target_rg:
              print("[ERROR] target_resource_group not found in manifest")
              sys.exit(1)
          
          target_subscription_id = manifest.get('target_subscription_id', '')
          if target_subscription_id:
              print(f"[INFO] Setting Azure subscription context: {target_subscription_id}")
              subprocess.run(['az', 'account', 'set', '--subscription', target_subscription_id], check=True)
          
          # PowerShell script to configure Windows Firewall for WinRM and RDP
          ps_script = """
          # Configure Windows Firewall to allow WinRM and RDP traffic
          Write-Output "Configuring Windows Firewall rules for WinRM and RDP..."
          
          # Ensure firewall is enabled for all profiles
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled True
          Write-Output "Windows Firewall is enabled"
          
          # Allow WinRM HTTP (port 5985) from any source
          $winrmHttpRule = Get-NetFirewallRule -Name "WINRM-HTTP-In-TCP-Custom" -ErrorAction SilentlyContinue
          if (-not $winrmHttpRule) {
              New-NetFirewallRule -Name "WINRM-HTTP-In-TCP-Custom" `
                                  -DisplayName "Windows Remote Management (HTTP-In) - Custom" `
                                  -Enabled True `
                                  -Direction Inbound `
                                  -Protocol TCP `
                                  -LocalPort 5985 `
                                  -Action Allow `
                                  -Profile Any
              Write-Output "Created WinRM HTTP (5985) allow rule"
          } else {
              Set-NetFirewallRule -Name "WINRM-HTTP-In-TCP-Custom" -Enabled True -Action Allow
              Write-Output "Enabled existing WinRM HTTP (5985) rule"
          }
          
          # Allow WinRM HTTPS (port 5986) from any source
          $winrmHttpsRule = Get-NetFirewallRule -Name "WINRM-HTTPS-In-TCP-Custom" -ErrorAction SilentlyContinue
          if (-not $winrmHttpsRule) {
              New-NetFirewallRule -Name "WINRM-HTTPS-In-TCP-Custom" `
                                  -DisplayName "Windows Remote Management (HTTPS-In) - Custom" `
                                  -Enabled True `
                                  -Direction Inbound `
                                  -Protocol TCP `
                                  -LocalPort 5986 `
                                  -Action Allow `
                                  -Profile Any
              Write-Output "Created WinRM HTTPS (5986) allow rule"
          } else {
              Set-NetFirewallRule -Name "WINRM-HTTPS-In-TCP-Custom" -Enabled True -Action Allow
              Write-Output "Enabled existing WinRM HTTPS (5986) rule"
          }
          
          # Allow RDP (port 3389) from any source
          $rdpRule = Get-NetFirewallRule -Name "RDP-In-TCP-Custom" -ErrorAction SilentlyContinue
          if (-not $rdpRule) {
              New-NetFirewallRule -Name "RDP-In-TCP-Custom" `
                                  -DisplayName "Remote Desktop (RDP-In) - Custom" `
                                  -Enabled True `
                                  -Direction Inbound `
                                  -Protocol TCP `
                                  -LocalPort 3389 `
                                  -Action Allow `
                                  -Profile Any
              Write-Output "Created RDP (3389) allow rule"
          } else {
              Set-NetFirewallRule -Name "RDP-In-TCP-Custom" -Enabled True -Action Allow
              Write-Output "Enabled existing RDP (3389) rule"
          }
          
          # Enable default WinRM firewall rules (if they exist)
          Enable-NetFirewallRule -DisplayGroup "Windows Remote Management" -ErrorAction SilentlyContinue
          Write-Output "Enabled default WinRM firewall rules"
          
          # Enable default RDP firewall rules (if they exist)
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          Write-Output "Enabled default RDP firewall rules"
          
          # Ensure WinRM service is enabled and running
          Set-Service -Name WinRM -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name WinRM -ErrorAction SilentlyContinue
          Write-Output "WinRM service is running"
          
          # Configure WinRM to allow connections
          Enable-PSRemoting -Force -SkipNetworkProfileCheck -ErrorAction SilentlyContinue
          Write-Output "PSRemoting enabled"
          
          Write-Output "Windows Firewall configured successfully - WinRM and RDP traffic allowed"
          """
          
          for vm in vms:
              # name = Azure VM resource name
              # target_vm_name = Windows hostname (may differ after rename)
              azure_vm_name = vm.get('name', '')
              target_vm_name = vm.get('target_vm_name', azure_vm_name)
              
              if not azure_vm_name:
                  print("[WARN] VM has no 'name' field, skipping")
                  continue
              
              print(f"[INFO] Configuring Windows Firewall on Azure VM: {azure_vm_name} (target hostname: {target_vm_name})")
              
              # Verify VM exists
              verify_result = subprocess.run(
                  ['az', 'vm', 'show', '--resource-group', target_rg, '--name', azure_vm_name, '--query', 'name', '-o', 'tsv'],
                  capture_output=True, text=True, check=False
              )
              
              if verify_result.returncode != 0:
                  print(f"[ERROR] VM '{azure_vm_name}' not found in resource group '{target_rg}'")
                  print(f"        Verify VM exists with: az vm show --resource-group {target_rg} --name {azure_vm_name}")
                  sys.exit(1)
              
              # Use Azure Run Command to execute PowerShell on VM (works regardless of firewall/NSG)
              result = subprocess.run(
                  [
                      'az', 'vm', 'run-command', 'invoke',
                      '--resource-group', target_rg,
                      '--name', azure_vm_name,
                      '--command-id', 'RunPowerShellScript',
                      '--scripts', ps_script
                  ],
                  capture_output=True, text=True, check=False
              )
              
              if result.returncode == 0:
                  print(f"[OK] Windows Firewall configured on Azure VM {azure_vm_name}")
                  # Parse and display output
                  try:
                      output = json.loads(result.stdout)
                      if 'value' in output and len(output['value']) > 0:
                          messages = output['value'][0].get('message', '')
                          if messages:
                              print(f"     Output: {messages[:200]}")
                  except:
                      pass
              else:
                  print(f"[ERROR] Failed to configure Windows Firewall on Azure VM {azure_vm_name}")
                  print(f"        {result.stderr[:300]}")
                  sys.exit(1)
              
              # Small delay between VMs
              time.sleep(2)
          
          print("[INFO] All VMs configured successfully")
          EOF

      - name: "Display configuration"
        run: |
          echo "========================================================"
          echo "  Ansible-Join-Windows-Domain - ${{ inputs.manifest }}"
          echo "========================================================"
          echo "  Dry run         : ${{ inputs.dry_run }}"
          echo "  Force rejoin    : ${{ inputs.force_rejoin }}"
          echo ""
          echo "  Step 1 - Fetch per-VM SE-Admin values from Delinea (WinRM connectivity)"
          echo "           URL             : ${DELINEA_BASE_URL}"
          echo "           Config user     : ${DELINEA_USERNAME}"
          echo "           Domain suffix   : ${DELINEA_DOMAIN_SUFFIX}"
          echo ""
          if [ "${{ inputs.force_rejoin }}" = "true" ]; then
            echo "  Step 2 - Disjoin from current domain (if joined)    [SE-Admin]"
            echo "  Step 3 - Rename VM hostname (if needed)              [Administrator]"
            echo "  Step 4 - Join VM to target domain                    [cpoe-automation]"
            echo ""
            echo "  Mode: Full disjoin-rename-join cycle (recommended for migrated VMs)"
          else
            echo "  Step 2 - Join VM to domain (only if not already joined) [cpoe-automation]"
            echo ""
            echo "  Mode: Join only (skips disjoin/rename if VM is in target domain)"
          fi
          echo "========================================================"
          [ "${{ inputs.dry_run }}" = "true" ] \
            && echo "DRY RUN - no changes will be made." \
            || echo "LIVE RUN - changes will be applied."

      - name: "Fetch WinRM passwords from Delinea for all VMs"  # pragma: allowlist secret
        env:
          MANIFEST: ${{ inputs.manifest }}
        run: |
          echo "[INFO] Fetching Delinea secrets for VMs in manifest: ${MANIFEST}"
          python3 ansible/roles/python_scripts/resolve_delinea_secret_id.py
          if [ $? -ne 0 ]; then
            echo "[FAIL] Failed to fetch Delinea secrets"
            exit 1
          fi
          echo "[OK] Delinea secrets fetched successfully"

      - name: "Verify environment variables were written"  # pragma: allowlist secret
        run: |
          echo "[INFO] Checking environment variables written to GITHUB_ENV"
          if [ -f "$GITHUB_ENV" ]; then
            echo "[INFO] GITHUB_ENV contents:"
            grep "^winrm_value_" "$GITHUB_ENV" | sed 's/=.*/=***MASKED***/' || echo "[WARN] No winrm_value_* variables found"
          else
            echo "[WARN] GITHUB_ENV file not found"
          fi
          echo "[INFO] Current environment variables:"
          env | grep "^winrm_value_" | sed 's/=.*/=***MASKED***/' || echo "[WARN] No winrm_value_* in current environment"

      - name: "Prepare Ansible extra-vars"
        env:
          WORKFLOW_MANIFEST:            ${{ inputs.manifest }}
          WORKFLOW_DRY_RUN:             ${{ inputs.dry_run }}
          WORKFLOW_FORCE_REJOIN:        ${{ inputs.force_rejoin }}
          SECRET_DOMAIN_ADMIN_VALUE:    ${{ secrets.DOMAIN_ADMIN_PASSWORD }}  # pragma: allowlist secret
          SECRET_DOMAIN_OU_PATH:        ${{ secrets.DOMAIN_OU_PATH }}
        run: |
          python3 ansible/roles/python_scripts/json_builder.py join
          chmod 600 ansible_extra_vars.json
          python3 -m json.tool ansible_extra_vars.json > /dev/null \
            && echo "JSON valid" \
            || (echo "JSON invalid" && exit 1)

      - name: "Run join playbook"
        env:
          # Inherit all environment variables from previous steps (including winrm_value_* from Python script)
          # GitHub Actions automatically loads vars written to $GITHUB_ENV, but we need to ensure they're
          # available in the ansible-playbook subprocess environment
          ANSIBLE_LOAD_CALLBACK_PLUGINS: "true"
        run: |
          mkdir -p ansible/logs
          # Export all current environment variables so ansible-playbook inherits them
          # Using set -a to auto-export all sourced variables
          set -a
          source <(cat $GITHUB_ENV | sed 's/^/export /')
          set +a
          
          echo "=== Environment variables available to ansible-playbook ==="
          env | grep "^winrm_value_" | sed 's/=.*/=***MASKED***/' || echo "No winrm_value_* variables found"
          echo "==========================================================="
          
          ansible-playbook ansible/playbooks/join-windows-domain.yaml \
            -e @ansible_extra_vars.json 2>&1 | tee ansible/logs/join.log
          rc=${PIPESTATUS[0]}
          rm -f ansible_extra_vars.json
          exit $rc

      - name: "Upload logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: join-logs-${{ inputs.manifest }}
          path: ansible/logs/
          if-no-files-found: warn
          retention-days: 90