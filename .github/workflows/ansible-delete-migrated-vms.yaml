name: Ansible-Delete-Migrated-VMs

# Deletes migrated VMs and their associated resources (NICs and disks).
# Requires explicit VM names and DELETE confirmation for safety.
# Calls: ansible/roles/python_scripts/read_manifest_value.py to read subscription ID from manifest
# Calls: ansible/playbooks/delete-migrated-vms.yml

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory in ansible/vars/)"
        required: true
        type: string
      vm_names:
        description: "Comma-delimited VM names to delete (source VM names from manifest)"
        required: true
        type: string
      confirm_delete:
        description: "Type 'DELETE' to confirm (irreversible operation)"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  delete-migrated-vms:
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Install PyYAML for manifest parsing"
        run: pip install PyYAML

      - name: "Validate manifest"
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      - name: "Fail early if no VM names provided"
        run: |
          if [ -z "${{ inputs.vm_names }}" ]; then
            echo "[ERROR] No VM names provided. Each VM must be explicitly specified — there is no DELETE_ALL option."
            exit 1
          fi

      - name: "Verify DELETE confirmation"
        run: |
          CONFIRM=$(echo "${{ inputs.confirm_delete }}" | tr '[:lower:]' '[:upper:]')
          if [ "$CONFIRM" != "DELETE" ]; then
            echo "[ERROR] Confirmation failed. You must type 'DELETE' to proceed. Received: '${{ inputs.confirm_delete }}'"
            exit 1
          fi
          echo "[OK] Deletion confirmed"

      - name: "Read subscription ID from manifest"
        id: manifest_sub
        env:
          MANIFEST: ${{ inputs.manifest }}
          MANIFEST_KEY: target_subscription_id
        run: |
          SUB_ID=$(python3 ansible/roles/python_scripts/read_manifest_value.py)
          echo "subscription_id=${SUB_ID}" >> $GITHUB_OUTPUT
          echo "[INFO] Target subscription: ${SUB_ID}"

      - name: "Azure Login"
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          subscription-id: ${{ steps.manifest_sub.outputs.subscription_id }}
          enable-AzPSSession: true

      - name: "Display configuration"
        run: |
          echo "[INFO] Manifest  : ${{ inputs.manifest }}"
          echo "[INFO] VM names  : ${{ inputs.vm_names }}"
          echo "[INFO] Dry run   : ${{ inputs.dry_run }}"

      - name: "Prepare extra vars"
        run: |
          cat > ansible_extra_vars.json <<JSON
          {
            "manifest": "${{ inputs.manifest }}",
            "dry_run": ${{ inputs.dry_run }},
            "vm_names": "${{ inputs.vm_names }}",
            "migration_action": "delete_migrated_vms"
          }
          JSON

      - name: "Run playbook - delete migrated VMs"
        run: |
          ansible-playbook ansible/playbooks/delete-migrated-vms.yml \
            -e @ansible_extra_vars.json
          rc=$?
          rm -f ansible_extra_vars.json
          exit $rc
