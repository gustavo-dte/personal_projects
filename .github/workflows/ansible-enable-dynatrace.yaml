# TODO: Code is not tested yet, needs to be tested against actual VMs.

name: Ansible-Windows-VM-Enable-Monitoring-Dynatrace

# Enables Dynatrace monitoring on Azure VMs.
# Calls: ansible/roles/python_scripts/read_manifest_value.py to read subscription ID from manifest
# Calls: ansible/playbooks/enable-dynatrace-for-vm.yml

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest name (directory in ansible/vars/)"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  enable-dynatrace:
    environment: dev
    runs-on:
      - self-hosted
      - linux
      - non-prod
      - vm-migrate
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
      ANSIBLE_CONFIG: ansible/ansible.cfg

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Install PyYAML for manifest parsing"
        run: pip install PyYAML

      - name: "Validate manifest"
        uses: ./.github/actions/validate-manifest
        with:
          manifest: ${{ inputs.manifest }}

      - name: "Read subscription ID from manifest"
        if: ${{ !inputs.dry_run }}
        id: manifest_sub
        env:
          MANIFEST: ${{ inputs.manifest }}
          MANIFEST_KEY: target_subscription_id
        run: |
          SUB_ID=$(python3 ansible/roles/python_scripts/read_manifest_value.py)
          echo "subscription_id=${SUB_ID}" >> $GITHUB_OUTPUT
          echo "[INFO] Target subscription: ${SUB_ID}"

      - name: "Azure Login"
        if: ${{ !inputs.dry_run }}
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.VM_MIGRATE_MI_CLIENT_ID }}
          subscription-id: ${{ steps.manifest_sub.outputs.subscription_id }}
          enable-AzPSSession: true

      - name: "Display configuration"
        run: |
          echo "[INFO] Manifest  : ${{ inputs.manifest }}"
          echo "[INFO] Dry run   : ${{ inputs.dry_run }}"

      - name: "Prepare extra vars"
        run: |
          cat > ansible_extra_vars.json <<JSON
          {
            "manifest": "${{ inputs.manifest }}",
            "dry_run": ${{ inputs.dry_run }},
            "dynatrace_token": "${{ secrets.DYNATRACE_TOKEN }}"
          }
          JSON

      - name: "Run playbook - enable Dynatrace"
        run: |
          ansible-playbook ansible/playbooks/enable-dynatrace-for-vm.yml \
            -e @ansible_extra_vars.json
          rc=$?
          rm -f ansible_extra_vars.json
          exit $rc
